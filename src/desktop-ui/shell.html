<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ClawOS</title>
    <script src="views://clawos/bridge.js"></script>
    <style>
      :root {
        color-scheme: light;
        --boot-bg: #f8fafc;
        --boot-panel: #ffffff;
        --boot-border: #dbe2ea;
        --boot-text: #0f172a;
        --boot-muted: #64748b;
      }
      body {
        margin: 0;
        font-family:
          "Microsoft YaHei UI",
          "Microsoft YaHei",
          "PingFang SC",
          "Noto Sans CJK SC",
          "Segoe UI",
          sans-serif;
        background: radial-gradient(1200px 700px at 50% -120px, #e2e8f0 0%, var(--boot-bg) 58%);
        color: var(--boot-text);
      }
      .boot {
        min-height: 100vh;
        display: grid;
        place-items: center;
      }
      .card {
        width: min(360px, calc(100vw - 40px));
        border-radius: 16px;
        border: 1px solid var(--boot-border);
        background: color-mix(in srgb, var(--boot-panel) 88%, transparent);
        backdrop-filter: blur(8px);
        padding: 28px 24px;
        display: grid;
        justify-items: center;
        gap: 14px;
      }
      .logo {
        width: 54px;
        height: 54px;
        display: block;
      }
      .name {
        margin: 0;
        font-size: 22px;
        font-weight: 700;
        letter-spacing: 0.02em;
      }
      .version {
        margin: 0;
        color: var(--boot-muted);
        font-size: 14px;
        font-weight: 500;
      }
    </style>
  </head>
  <body>
    <main class="boot">
      <section class="card">
        <svg class="logo" viewBox="0 0 64 64" aria-hidden="true">
          <defs>
            <linearGradient id="clawos-boot-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#2563eb"></stop>
              <stop offset="100%" stop-color="#0ea5e9"></stop>
            </linearGradient>
          </defs>
          <rect x="5" y="5" width="54" height="54" rx="14" fill="url(#clawos-boot-gradient)"></rect>
          <path
            d="M41.2 20.5H31.3c-7.1 0-12.1 4.7-12.1 11.4 0 7 5.2 11.6 12.9 11.6h8.8v-6.1h-8.5c-3.9 0-6.3-2.2-6.3-5.7 0-3.4 2.3-5.5 6.1-5.5h9z"
            fill="#ffffff"
          ></path>
        </svg>
        <h1 class="name">ClawOS</h1>
        <p class="version" data-boot-version>v-</p>
      </section>
    </main>
    <script>
      (function setBootVersion() {
        const versionEl = document.querySelector("[data-boot-version]");
        if (!versionEl) return;
        const params = new URLSearchParams(window.location.search || "");
        const fromQuery = String(params.get("appVersion") || "").trim();
        const fromInline = String("__CLAWOS_APP_VERSION__").trim();
        const fallback = fromInline === "__CLAWOS_APP_VERSION__" ? "" : fromInline;
        const version = fromQuery || fallback;
        versionEl.textContent = version ? `v${version}` : "v-";
      })();
    </script>
  </body>
</html>
