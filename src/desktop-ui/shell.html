<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ClawOS</title>
    <script src="views://clawos/bridge.js"></script>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        font-family:
          "Microsoft YaHei UI",
          "Microsoft YaHei",
          "PingFang SC",
          "Noto Sans CJK SC",
          "Segoe UI",
          sans-serif;
        background: #f8fafc;
        color: #0f172a;
      }
      .boot {
        min-height: 100vh;
        display: grid;
        place-items: center;
      }
      .card {
        width: min(540px, calc(100vw - 40px));
        border-radius: 12px;
        border: 1px solid #dbe2ea;
        background: #fff;
        padding: 20px;
      }
      .title {
        margin: 0 0 8px;
        font-size: 18px;
        font-weight: 600;
      }
      .desc {
        margin: 0;
        color: #475569;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <main class="boot">
      <section class="card">
        <h1 class="title">ClawOS &#27491;&#22312;&#21551;&#21160;...</h1>
        <p class="desc">&#27491;&#22312;&#21152;&#36733;&#26700;&#38754;&#30028;&#38754;&#65292;&#35831;&#31245;&#20505;&#12290;</p>
      </section>
    </main>
  </body>
</html>
