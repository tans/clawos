<!doctype html>
<html lang="zh-CN" data-theme="silk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ClawOS 澶фā鍨?/title>
    <link rel="stylesheet" href="/styles.css" />
</head>
  <body class="bg-base-100 text-base-content overflow-x-auto">
    <div class="grid min-h-screen min-w-[980px] grid-cols-[240px_1fr]">
      <aside class="flex flex-col gap-4 border-r border-base-200 bg-base-100 px-4 py-4">
        <div class="text-sm text-base-content/60">鍔犺浇涓?..</div>
      </aside>

      <main class="flex min-h-screen flex-col">
        <header class="flex flex-wrap items-center justify-between gap-3 border-b border-base-200 px-6 py-4">
          <h1 class="text-lg font-semibold">澶фā鍨?/h1>
          <div class="flex flex-wrap items-center gap-2">
            <button class="btn btn-outline btn-xs" type="button" data-action="reload">閲嶆柊鍔犺浇</button>
          </div>
        </header>

        <section class="flex-1 p-6">
          <section class="card card-compact border border-base-200 bg-base-100">
            <div class="card-body gap-3">
              <div class="flex items-center justify-between gap-2">
                <h2 class="card-title text-base">妯″瀷璺敱</h2>
                <span class="text-[11px] text-base-content/60">涓绘ā鍨嬪彧鑳介€変竴涓紝澶囩敤妯″瀷鍙閫夈€?/span>
              </div>
              <div class="grid gap-3 xl:grid-cols-2" data-model-list></div>
            </div>
          </section>

          <div class="mt-3 text-xs text-base-content/70" data-meta>灏氭湭鍔犺浇</div>
        </section>
      </main>
    </div>

    <script src="/sidebar-update.js"></script>

    <script>
      const MODEL_SECTION = "models";
      const AGENT_SECTION = "agents";
      const PROVIDER_PRESETS = [
        {
          key: "kimi",
          title: "Kimi API",
          baseUrl: "https://api.moonshot.cn/v1",
          api: "openai-completions",
          modelId: "moonshot-v1-8k",
        },
        {
          key: "kimi-coding",
          title: "Kimi Code Plan",
          baseUrl: "https://api.kimi.com/coding/",
          api: "anthropic-messages",
          modelId: "k2p5",
        },
        {
          key: "minimax",
          title: "MiniMax",
          baseUrl: "https://api.minimax.io/anthropic",
          api: "anthropic-messages",
          modelId: "MiniMax-M2.1",
        },
      ];
      const PROVIDER_ALIASES = {};

      const presetByProviderKey = new Map(PROVIDER_PRESETS.map((item) => [item.key, item]));
      const presetOrder = new Map(PROVIDER_PRESETS.map((item, index) => [item.key, index]));
      const metaEl = document.querySelector("[data-meta]");
      const modelListEl = document.querySelector("[data-model-list]");
      const reloadBtn = document.querySelector('[data-action="reload"]');

      let modelsConfig = {};
      let agentsConfig = {};
      let providerDrafts = [];

      function isObject(value) {
        return Boolean(value) && typeof value === "object" && !Array.isArray(value);
      }

      function ensureObject(value, field) {
        if (!isObject(value)) {
          throw new Error(`${field} 蹇呴』鏄?JSON 瀵硅薄`);
        }
        return value;
      }

      function cloneObject(value) {
        return JSON.parse(JSON.stringify(value || {}));
      }

      function readOptionalText(value) {
        if (typeof value !== "string") {
          return "";
        }
        return value.trim();
      }

      function normalizeProviderKey(rawProviderKey) {
        const key = readOptionalText(rawProviderKey);
        if (!key) {
          return "";
        }
        return PROVIDER_ALIASES[key] || key;
      }

      function escapeHtml(raw) {
        return String(raw)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function parseProviderModel(raw) {
        const text = readOptionalText(raw);
        if (!text) {
          return null;
        }

        const slashIndex = text.indexOf("/");
        if (slashIndex <= 0 || slashIndex >= text.length - 1) {
          return null;
        }

        const provider = text.slice(0, slashIndex).trim();
        const model = text.slice(slashIndex + 1).trim();
        const normalizedProvider = normalizeProviderKey(provider);
        if (!normalizedProvider || !model) {
          return null;
        }

        return {
          provider: normalizedProvider,
          model,
          key: `${normalizedProvider}/${model}`,
        };
      }

      function readProviderModels(provider) {
        const models = Array.isArray(provider?.models) ? provider.models : [];
        return models.filter((item) => isObject(item) && readOptionalText(item.id));
      }

      function buildModelOptions(existingModels, preset, referencedModelId, catalogModels) {
        const optionMap = new Map();

        for (const item of existingModels) {
          const id = readOptionalText(item.id);
          if (!id || optionMap.has(id)) {
            continue;
          }
          const name = readOptionalText(item.name) || id;
          optionMap.set(id, { id, name });
        }

        for (const item of Array.isArray(catalogModels) ? catalogModels : []) {
          const id = readOptionalText(item?.id);
          if (!id || optionMap.has(id)) {
            continue;
          }
          const name = readOptionalText(item?.name) || id;
          optionMap.set(id, { id, name });
        }

        const presetModelId = readOptionalText(preset?.modelId);
        if (presetModelId && !optionMap.has(presetModelId)) {
          optionMap.set(presetModelId, { id: presetModelId, name: presetModelId });
        }

        const refModelId = readOptionalText(referencedModelId);
        if (refModelId && !optionMap.has(refModelId)) {
          optionMap.set(refModelId, { id: refModelId, name: refModelId });
        }

        return Array.from(optionMap.values());
      }

      function resolveTitle(providerKey) {
        const preset = presetByProviderKey.get(providerKey);
        if (preset && readOptionalText(preset.title)) {
          return preset.title;
        }
        return providerKey || "鏈懡鍚?;
      }

      function isPresetProvider(providerKey) {
        return presetByProviderKey.has(providerKey);
      }

      function resolveProviderEntry(providers, providerKey) {
        if (isObject(providers[providerKey])) {
          return providers[providerKey];
        }

        for (const [aliasKey, normalizedKey] of Object.entries(PROVIDER_ALIASES)) {
          if (normalizedKey === providerKey && isObject(providers[aliasKey])) {
            return providers[aliasKey];
          }
        }
        return {};
      }

      function readAgentRouting(sourceAgents) {
        const agents = ensureObject(sourceAgents || {}, AGENT_SECTION);
        const defaults = isObject(agents.defaults) ? agents.defaults : {};
        const model = isObject(defaults.model) ? defaults.model : {};

        const primaryRef = parseProviderModel(model.primary);
        const fallbackRefs = Array.isArray(model.fallbacks)
          ? model.fallbacks.map((item) => parseProviderModel(item)).filter(Boolean)
          : [];

        const modelByProvider = new Map();
        const fallbackProviderSet = new Set();
        const modelCatalogByProvider = new Map();

        if (primaryRef) {
          modelByProvider.set(primaryRef.provider, primaryRef.model);
        }

        for (const ref of fallbackRefs) {
          fallbackProviderSet.add(ref.provider);
          if (!modelByProvider.has(ref.provider)) {
            modelByProvider.set(ref.provider, ref.model);
          }
        }

        const modelCatalog = isObject(defaults.models) ? defaults.models : {};
        for (const [rawKey, rawEntry] of Object.entries(modelCatalog)) {
          const parsed = parseProviderModel(rawKey);
          if (!parsed) {
            continue;
          }

          const bucket = modelCatalogByProvider.get(parsed.provider) || [];
          if (bucket.some((item) => item.id === parsed.model)) {
            continue;
          }

          const alias = isObject(rawEntry) ? readOptionalText(rawEntry.alias) : "";
          bucket.push({
            id: parsed.model,
            name: alias || parsed.model,
          });
          modelCatalogByProvider.set(parsed.provider, bucket);
        }

        return {
          primaryRef,
          fallbackProviderSet,
          modelByProvider,
          modelCatalogByProvider,
        };
      }

      function buildProviderDrafts(sourceModels, sourceAgents) {
        const models = ensureObject(sourceModels || {}, MODEL_SECTION);
        const providers = isObject(models.providers) ? models.providers : {};
        const routing = readAgentRouting(sourceAgents);
        const providerKeys = new Set(PROVIDER_PRESETS.map((item) => item.key));

        for (const rawProviderKey of Object.keys(providers)) {
          const providerKey = normalizeProviderKey(rawProviderKey);
          if (isPresetProvider(providerKey)) {
            providerKeys.add(providerKey);
          }
        }

        if (routing.primaryRef && isPresetProvider(routing.primaryRef.provider)) {
          providerKeys.add(routing.primaryRef.provider);
        }
        for (const providerKey of routing.fallbackProviderSet) {
          if (isPresetProvider(providerKey)) {
            providerKeys.add(providerKey);
          }
        }

        const keys = Array.from(providerKeys);
        keys.sort((left, right) => {
          const leftOrder = presetOrder.has(left) ? presetOrder.get(left) : 10_000;
          const rightOrder = presetOrder.has(right) ? presetOrder.get(right) : 10_000;
          if (leftOrder !== rightOrder) {
            return leftOrder - rightOrder;
          }
          return left.localeCompare(right);
        });

        const drafts = keys.map((providerKey) => {
          const provider = resolveProviderEntry(providers, providerKey);
          const preset = presetByProviderKey.get(providerKey);
          const existingModels = readProviderModels(provider);
          const referencedModelId = routing.modelByProvider.get(providerKey) || "";
          const catalogModels = routing.modelCatalogByProvider.get(providerKey) || [];
          const modelOptions = buildModelOptions(existingModels, preset, referencedModelId, catalogModels);
          const firstModel = existingModels[0] || null;
          const modelId =
            referencedModelId ||
            readOptionalText(firstModel?.id) ||
            readOptionalText(modelOptions[0]?.id) ||
            readOptionalText(preset?.modelId);
          const exactModel = existingModels.find((item) => readOptionalText(item.id) === modelId) || firstModel;
          const optionModel = modelOptions.find((item) => item.id === modelId);
          const modelName = readOptionalText(exactModel?.name) || readOptionalText(optionModel?.name) || modelId;

          return {
            providerKey,
            title: resolveTitle(providerKey),
            existing: isObject(provider) && Object.keys(provider).length > 0,
            baseUrl: readOptionalText(provider.baseUrl) || readOptionalText(preset?.baseUrl),
            api: readOptionalText(provider.api) || readOptionalText(preset?.api),
            apiKey: readOptionalText(provider.apiKey),
            modelId,
            modelName,
            modelOptions,
            primary: routing.primaryRef ? routing.primaryRef.provider === providerKey : false,
            fallback: routing.fallbackProviderSet.has(providerKey),
          };
        });

        const hasPrimary = drafts.some((item) => item.primary);
        if (!hasPrimary && drafts.length > 0) {
          drafts[0].primary = true;
        }

        for (const item of drafts) {
          if (item.primary) {
            item.fallback = false;
          }
        }

        return drafts;
      }

      function renderCards() {
        if (!modelListEl) {
          return;
        }

        function renderModelOptions(options, selectedModelId) {
          const selectedId = readOptionalText(selectedModelId);
          return options
            .map((option) => {
              const id = readOptionalText(option?.id);
              const name = readOptionalText(option?.name) || id;
              const selected = id === selectedId ? "selected" : "";
              const label = name === id ? id : `${name} (${id})`;
              return `<option value="${escapeHtml(id)}" data-model-name="${escapeHtml(name)}" ${selected}>${escapeHtml(label)}</option>`;
            })
            .join("");
        }

        modelListEl.innerHTML = providerDrafts
          .map((item) => {
            const primaryChecked = item.primary ? "checked" : "";
            const fallbackChecked = item.primary ? "" : item.fallback ? "checked" : "";
            const fallbackDisabled = item.primary ? "disabled" : "";
            return `
              <section class="rounded-lg border border-base-200 p-3" data-provider-card data-provider-key="${escapeHtml(item.providerKey)}">
                <div class="flex items-start justify-between gap-3">
                  <div class="min-w-0">
                    <div class="text-sm font-medium">${escapeHtml(item.title)}</div>
                    <div class="text-[11px] text-base-content/60 font-mono">${escapeHtml(item.providerKey)}</div>
                  </div>
                  <div class="flex items-center gap-2 flex-wrap justify-end">
                    <label class="label cursor-pointer gap-2 rounded-lg border border-base-200 px-2 py-1">
                      <span class="text-xs">涓绘ā鍨?/span>
                      <input class="radio radio-xs" type="radio" name="primary-model" value="${escapeHtml(item.providerKey)}" ${primaryChecked} />
                    </label>
                    <label class="label cursor-pointer gap-2 rounded-lg border border-base-200 px-2 py-1">
                      <span class="text-xs">澶囩敤</span>
                      <input class="checkbox checkbox-xs" type="checkbox" data-field="fallback" ${fallbackChecked} ${fallbackDisabled} />
                    </label>
                    <button class="btn btn-primary btn-xs" type="button" data-action="save-card" data-provider-key="${escapeHtml(item.providerKey)}">淇濆瓨姝ゅ崱鐗?/button>
                  </div>
                </div>

                <div class="mt-3 grid gap-3">
                  <label class="form-control w-full gap-1">
                    <span class="text-xs text-base-content/70">褰撳墠妯″瀷</span>
                    <select class="select select-bordered select-sm w-full font-mono" data-field="model-id">
                      ${renderModelOptions(item.modelOptions || [], item.modelId)}
                    </select>
                  </label>

                  <label class="form-control w-full gap-1">
                    <span class="text-xs text-base-content/70">API Key</span>
                    <input class="input input-bordered input-sm font-mono" type="password" data-field="api-key" value="${escapeHtml(item.apiKey)}" placeholder="sk-..." />
                  </label>
                </div>
              </section>
            `;
          })
          .join("");

        syncSelectionUI();
      }

      function readProviderDraftsFromDom() {
        const cards = Array.from(modelListEl.querySelectorAll("[data-provider-card]"));
        return cards.map((card) => {
          const providerKey = readOptionalText(card.getAttribute("data-provider-key"));
          const origin = providerDrafts.find((item) => item.providerKey === providerKey);
          const modelIdInput = card.querySelector('[data-field="model-id"]');
          const apiKeyInput = card.querySelector('[data-field="api-key"]');
          const fallbackInput = card.querySelector('[data-field="fallback"]');
          const primaryInput = card.querySelector('input[name="primary-model"]');
          const selectedOption =
            modelIdInput instanceof HTMLSelectElement && modelIdInput.selectedIndex >= 0
              ? modelIdInput.options[modelIdInput.selectedIndex]
              : null;
          const selectedModelId = readOptionalText(modelIdInput?.value);
          const selectedModelName =
            readOptionalText(selectedOption?.getAttribute("data-model-name")) ||
            readOptionalText(selectedOption?.textContent) ||
            selectedModelId;

          return {
            providerKey,
            title: origin ? origin.title : resolveTitle(providerKey),
            existing: origin ? origin.existing : false,
            modelId: selectedModelId,
            modelName: selectedModelName,
            modelOptions: origin ? cloneObject(origin.modelOptions || []) : [],
            apiKey: readOptionalText(apiKeyInput?.value),
            baseUrl: origin ? origin.baseUrl : "",
            api: origin ? origin.api : "",
            fallback: Boolean(fallbackInput?.checked),
            primary: Boolean(primaryInput?.checked),
          };
        });
      }

      function syncSelectionUI() {
        const checkedPrimary = modelListEl.querySelector('input[name="primary-model"]:checked');
        const primaryProvider = readOptionalText(checkedPrimary?.value);
        const cards = Array.from(modelListEl.querySelectorAll("[data-provider-card]"));

        for (const card of cards) {
          const providerKey = readOptionalText(card.getAttribute("data-provider-key"));
          const fallbackInput = card.querySelector('[data-field="fallback"]');
          if (!(fallbackInput instanceof HTMLInputElement)) {
            continue;
          }

          if (providerKey && providerKey === primaryProvider) {
            fallbackInput.checked = false;
            fallbackInput.disabled = true;
          } else {
            fallbackInput.disabled = false;
          }
        }
      }

      function buildNextModelsConfig(baseConfig, drafts) {
        const next = ensureObject(cloneObject(baseConfig || {}), MODEL_SECTION);
        const providers = isObject(next.providers) ? cloneObject(next.providers) : {};

        for (const draft of drafts) {
          const providerKey = normalizeProviderKey(draft.providerKey);
          if (!providerKey) {
            continue;
          }

          const keepProvider = Boolean(draft.existing || draft.primary || draft.fallback || draft.apiKey || draft.modelId);
          if (!keepProvider) {
            continue;
          }

          const preset = presetByProviderKey.get(providerKey);
          const currentProvider = cloneObject(resolveProviderEntry(providers, providerKey));
          const currentModels = readProviderModels(currentProvider);
          const modelId = readOptionalText(draft.modelId);
          if (!modelId) {
            throw new Error(`${resolveTitle(providerKey)} 鐨勬ā鍨?ID 涓嶈兘涓虹┖`);
          }

          const baseUrl = readOptionalText(draft.baseUrl) || readOptionalText(currentProvider.baseUrl) || readOptionalText(preset?.baseUrl);
          if (!baseUrl) {
            throw new Error(`${resolveTitle(providerKey)} 鐨?Base URL 涓嶈兘涓虹┖`);
          }

          const existingModel = currentModels.find((item) => readOptionalText(item.id) === modelId);
          const modelName = readOptionalText(draft.modelName) || readOptionalText(existingModel?.name) || modelId;
          const nextModel = existingModel ? { ...existingModel, id: modelId, name: modelName } : { id: modelId, name: modelName };

          currentProvider.baseUrl = baseUrl;
          currentProvider.models = [nextModel];

          const api = readOptionalText(draft.api) || readOptionalText(currentProvider.api) || readOptionalText(preset?.api);
          if (api) {
            currentProvider.api = api;
          } else {
            delete currentProvider.api;
          }

          if (draft.apiKey) {
            currentProvider.apiKey = draft.apiKey;
          } else {
            delete currentProvider.apiKey;
          }

          providers[providerKey] = currentProvider;

          for (const [aliasKey, normalizedKey] of Object.entries(PROVIDER_ALIASES)) {
            if (normalizedKey === providerKey && aliasKey !== providerKey && Object.prototype.hasOwnProperty.call(providers, aliasKey)) {
              delete providers[aliasKey];
            }
          }
        }

        next.providers = providers;
        return next;
      }

      function buildNextAgentsConfigForProvider(baseConfig, draft) {
        const next = ensureObject(cloneObject(baseConfig || {}), AGENT_SECTION);
        const defaults = isObject(next.defaults) ? cloneObject(next.defaults) : {};
        const model = isObject(defaults.model) ? cloneObject(defaults.model) : {};
        const providerKey = normalizeProviderKey(draft.providerKey);
        const modelId = readOptionalText(draft.modelId);

        if (!providerKey || !modelId) {
          throw new Error(`${resolveTitle(providerKey || draft.providerKey)} 鐨勬ā鍨嬩笉鑳戒负绌篳);
        }

        const targetKey = `${providerKey}/${modelId}`;
        const currentPrimaryRef = parseProviderModel(model.primary);

        if (draft.primary) {
          model.primary = targetKey;
        } else if (currentPrimaryRef && currentPrimaryRef.provider === providerKey) {
          model.primary = targetKey;
        }

        const nextFallbacks = [];
        const seen = new Set();
        const sourceFallbacks = Array.isArray(model.fallbacks) ? model.fallbacks : [];
        for (const raw of sourceFallbacks) {
          const parsed = parseProviderModel(raw);
          if (!parsed) {
            continue;
          }
          if (parsed.provider === providerKey) {
            continue;
          }
          if (parsed.key === model.primary || seen.has(parsed.key)) {
            continue;
          }
          seen.add(parsed.key);
          nextFallbacks.push(parsed.key);
        }

        if (draft.fallback && targetKey !== model.primary && !seen.has(targetKey)) {
          nextFallbacks.push(targetKey);
        }

        model.fallbacks = nextFallbacks;
        defaults.model = model;
        next.defaults = defaults;
        return next;
      }

      async function api(path, options = {}) {
        const res = await fetch(path, {
          headers: { "content-type": "application/json" },
          ...options,
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok || !data.ok) {
          const apiError = new Error(data.error || `璇锋眰澶辫触: ${res.status}`);
          apiError.isApiError = true;
          throw apiError;
        }
        return data;
      }

      function readUserErrorMessage(error, fallback) {
        if (error && typeof error === "object" && error.isApiError === true) {
          return fallback;
        }
        const message = error instanceof Error ? String(error.message || "").trim() : "";
        return message || fallback;
      }

      async function loadSections() {
        const [modelsData, agentsData] = await Promise.all([api(`/api/config/${MODEL_SECTION}`), api(`/api/config/${AGENT_SECTION}`)]);

        modelsConfig = ensureObject(modelsData.data || {}, MODEL_SECTION);
        agentsConfig = ensureObject(agentsData.data || {}, AGENT_SECTION);
        providerDrafts = buildProviderDrafts(modelsConfig, agentsConfig);
        renderCards();
        metaEl.textContent = "澶фā鍨嬮厤缃凡鍔犺浇";
      }

      async function saveSingleProvider(providerKey) {
        const drafts = readProviderDraftsFromDom();
        const targetDraft = drafts.find((item) => normalizeProviderKey(item.providerKey) === normalizeProviderKey(providerKey));
        if (!targetDraft) {
          throw new Error(`鏈壘鍒?provider锛?{providerKey}`);
        }

        const nextModels = buildNextModelsConfig(modelsConfig, [targetDraft]);
        const nextAgents = buildNextAgentsConfigForProvider(agentsConfig, targetDraft);

        await api(`/api/config/${MODEL_SECTION}`, {
          method: "PUT",
          body: JSON.stringify({ data: nextModels }),
        });
        await api(`/api/config/${AGENT_SECTION}`, {
          method: "PUT",
          body: JSON.stringify({ data: nextAgents }),
        });

        modelsConfig = nextModels;
        agentsConfig = nextAgents;
        providerDrafts = buildProviderDrafts(modelsConfig, agentsConfig);
        renderCards();
        metaEl.textContent = `${resolveTitle(normalizeProviderKey(providerKey))} 宸蹭繚瀛榒;
      }

      if (modelListEl) {
        modelListEl.addEventListener("change", (event) => {
          const target = event.target;
          if (!(target instanceof HTMLElement)) {
            return;
          }

          const isPrimaryRadio = target.matches('input[name="primary-model"]');
          const isFallback = target.matches('[data-field="fallback"]');
          if (!isPrimaryRadio && !isFallback) {
            return;
          }
          syncSelectionUI();
        });

        modelListEl.addEventListener("click", async (event) => {
          const button = event.target.closest("[data-action='save-card']");
          if (!(button instanceof HTMLButtonElement)) {
            return;
          }

          const providerKey = readOptionalText(button.getAttribute("data-provider-key"));
          if (!providerKey) {
            return;
          }

          button.disabled = true;
          const originalText = button.textContent;
          button.textContent = "淇濆瓨涓?..";
          try {
            await saveSingleProvider(providerKey);
          } catch (error) {
            metaEl.textContent = readUserErrorMessage(error, "淇濆瓨澶辫触锛岃绋嶅悗閲嶈瘯銆?);
          } finally {
            button.disabled = false;
            button.textContent = originalText || "淇濆瓨姝ゅ崱鐗?;
          }
        });
      }

      if (reloadBtn) {
        reloadBtn.addEventListener("click", async () => {
          reloadBtn.disabled = true;
          try {
            await loadSections();
          } catch (error) {
            metaEl.textContent = readUserErrorMessage(error, "鍔犺浇澶辫触锛岃妫€鏌ユ湇鍔″悗閲嶈瘯銆?);
          } finally {
            reloadBtn.disabled = false;
          }
        });
      }

      (async function init() {
        try {
          await loadSections();
        } catch (error) {
          metaEl.textContent = readUserErrorMessage(error, "鍒濆鍖栧け璐ワ紝璇峰埛鏂伴〉闈㈤噸璇曘€?);
        }
      })();
    </script>
  </body>
</html>
