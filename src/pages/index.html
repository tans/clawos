<!doctype html>
<html lang="zh-CN" data-theme="silk">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>ClawOS 鎺у埗鍙?/title>
        <link rel="stylesheet" href="/styles.css" />
</head>
    <body class="bg-base-100 text-base-content overflow-x-auto">
        <div class="grid min-h-screen min-w-[980px] grid-cols-[240px_1fr]">
            <aside class="flex flex-col gap-4 border-r border-base-200 bg-base-100 px-4 py-4">
        <div class="text-sm text-base-content/60">鍔犺浇涓?..</div>
      </aside>

            <main class="flex min-h-screen flex-col">
                <header
                    class="flex flex-wrap items-center justify-between gap-3 border-b border-base-200 px-6 py-4"
                >
                    <h1 class="text-lg font-semibold">鎺у埗鍙?/h1>
                </header>

                <section class="flex-1 p-6">
                    <div class="grid gap-4 xl:grid-cols-2">
                        <section
                            class="card card-compact border border-base-200 bg-base-100"
                        >
                            <div class="card-body gap-3">
                                <h2 class="card-title text-base">openclaw</h2>
                                <div
                                    class="rounded-md border border-base-200 bg-base-200/20 px-3 py-2 text-xs text-base-content/75"
                                    data-openclaw-version

                                    鐗堟湰: 鏈煡
                                </div>
                                <div class="flex flex-wrap gap-2">
                                    <button
                                        class="btn btn-primary btn-sm"
                                        data-action="restart-gateway"

                                        閲嶅惎 openclaw
                                    </button>
                                    <button
                                        class="btn btn-warning btn-sm"
                                        data-action="update-openclaw"
                                    >
                                        鍗囩骇 openclaw
                                    </button>
                                </div>
                            </div>
                        </section>

                        <section
                            class="card card-compact border border-base-200 bg-base-100"
                        >
                            <div class="card-body gap-3">
                                <h2 class="card-title text-base">浼佸井</h2>
                                <div
                                    class="rounded-md border border-base-200 bg-base-200/20 px-3 py-2 text-xs text-base-content/75"
                                    data-qw-gateway-status
                                >
                                    鍚姩鐘舵€? 鏈娴?
                                </div>
                                <div
                                    class="text-[11px] text-base-content/60"
                                    data-qw-gateway-status-detail
                                >
                                    绛夊緟鐘舵€佹洿鏂?..
                                </div>
                                <div class="flex flex-wrap gap-2">
                                    <button
                                        class="btn btn-primary btn-sm"
                                        data-action="restart-qw-gateway"
                                    >
                                        閲嶅惎浼佸井缃戝叧
                                    </button>
                                </div>
                            </div>
                        </section>

                        <section
                            class="card card-compact border border-base-200 bg-base-100"
                        >
                            <div class="card-body gap-3">
                                <h2 class="card-title text-base">
                                    閰嶇疆澶囦唤鍒囨崲
                                </h2>
                                <div
                                    class="rounded-md border border-base-200 bg-base-200/20 px-3 py-2 text-xs text-base-content/75"
                                    data-openclaw-backup-summary
                                >
                                    姝ｅ湪鍔犺浇澶囦唤鍒楄〃...
                                </div>
                                <label class="form-control w-full gap-1.5">
                                    <span class="label-text text-xs text-base-content/70"
                                        >澶囦唤鏂囦欢</span
                                    >
                                    <select
                                        class="select select-sm select-bordered w-full"
                                        data-openclaw-backup-select
                                    >
                                        <option value="">姝ｅ湪鍔犺浇...</option>
                                    </select>
                                </label>
                                <div class="flex flex-wrap gap-2">
                                    <button
                                        class="btn btn-outline btn-sm"
                                        data-action="refresh-openclaw-backups"
                                    >
                                        鍒锋柊澶囦唤
                                    </button>
                                    <button
                                        class="btn btn-warning btn-sm"
                                        data-action="rollback-openclaw-backup"
                                    >
                                        鍒囨崲鍒拌澶囦唤
                                    </button>
                                </div>
                                <div
                                    class="rounded-md border border-base-200 bg-base-200/20 px-3 py-2 text-[11px] text-base-content/70"
                                    data-openclaw-backup-detail
                                >
                                    褰撳墠澶囦唤淇℃伅锛氳鍙栦腑...
                                </div>
                            </div>
                        </section>

                        <section
                            class="card card-compact border border-base-200 bg-base-100"
                        >
                            <div class="card-body gap-3">
                                <h2 class="card-title text-base">鏃ュ織</h2>
                                <div
                                    class="text-xs text-base-content/70"
                                    data-task-meta
                                >
                                    鏆傛棤浠诲姟
                                </div>
                                <progress
                                    class="progress progress-neutral w-full hidden"
                                    value="0"
                                    max="100"
                                    data-task-progress
                                ></progress>
                                <pre
                                    class="max-h-80 overflow-auto rounded-lg border border-base-200 bg-base-200/30 p-3 text-[11px] leading-5"
                                    data-task-output
                                >
绛夊緟浠诲姟鎵ц...</pre
                                >
                            </div>
                        </section>
                    </div>
                </section>
            </main>
        </div>

        <script src="/sidebar-update.js"></script>

        <script>
            const statusBadges = {
                execution: document.querySelector('[data-status="execution"]'),
                openclawVersion: document.querySelector(
                    "[data-openclaw-version]",
                ),
                wslLabel: document.querySelector('[data-status-label="wsl"]'),
                openclawLabel: document.querySelector(
                    '[data-status-label="openclaw"]',
                ),
                gatewayLabel: document.querySelector(
                    '[data-status-label="gateway"]',
                ),
                browserLabel: document.querySelector(
                    '[data-status-label="browser"]',
                ),
                wslLight: document.querySelector('[data-status-light="wsl"]'),
                openclawLight: document.querySelector(
                    '[data-status-light="openclaw"]',
                ),
                gatewayLight: document.querySelector(
                    '[data-status-light="gateway"]',
                ),
                browserLight: document.querySelector(
                    '[data-status-light="browser"]',
                ),
                qwGatewayStatus: document.querySelector(
                    "[data-qw-gateway-status]",
                ),
                qwGatewayStatusDetail: document.querySelector(
                    "[data-qw-gateway-status-detail]",
                ),
            };

            const taskMeta = document.querySelector("[data-task-meta]");
            const taskProgress = document.querySelector("[data-task-progress]");
            const taskOutput = document.querySelector("[data-task-output]");
            const openclawBackupUI = {
                select: document.querySelector("[data-openclaw-backup-select]"),
                summary: document.querySelector("[data-openclaw-backup-summary]"),
                detail: document.querySelector("[data-openclaw-backup-detail]"),
            };
            const openclawBackupState = {
                backups: [],
                selectedPath: "",
            };

            let pollTimer = null;
            let qwGatewayStatusTimer = null;

            async function api(path, options = {}) {
                const res = await fetch(path, {
                    headers: { "content-type": "application/json" },
                    ...options,
                });

                const data = await res.json().catch(() => ({}));
                if (!res.ok || !data.ok) {
                    const apiError = new Error(data.error || `璇锋眰澶辫触: ${res.status}`);
                    apiError.isApiError = true;
                    throw apiError;
                }
                return data;
            }

            function readUserErrorMessage(error, fallback) {
                if (error && typeof error === "object" && error.isApiError === true) {
                    return fallback;
                }
                const message = error instanceof Error ? String(error.message || "").trim() : "";
                return message || fallback;
            }

            function setLight(labelEl, lightEl, label, state) {
                const disabled = state === null;
                const ok = state === true;
                if (labelEl) {
                    labelEl.textContent = `${label}: ${disabled ? "宸茬鐢? : ok ? "姝ｅ父" : "寮傚父"}`;
                }
                if (!lightEl) return;
                lightEl.classList.remove(
                    "bg-base-300",
                    "bg-success",
                    "bg-error",
                );
                if (disabled) {
                    lightEl.classList.add("bg-base-300");
                    return;
                }
                lightEl.classList.add(ok ? "bg-success" : "bg-error");
            }

            function setQwGatewayStatusTone(state) {
                const statusEl = statusBadges.qwGatewayStatus;
                if (!statusEl) return;
                statusEl.classList.remove(
                    "border-base-200",
                    "border-info/30",
                    "border-success/30",
                    "border-error/30",
                    "bg-base-200/20",
                    "bg-info/10",
                    "bg-success/10",
                    "bg-error/10",
                );
                if (state === "running") {
                    statusEl.classList.add("border-info/30", "bg-info/10");
                    return;
                }
                if (state === "success") {
                    statusEl.classList.add("border-success/30", "bg-success/10");
                    return;
                }
                if (state === "failed") {
                    statusEl.classList.add("border-error/30", "bg-error/10");
                    return;
                }
                statusEl.classList.add("border-base-200", "bg-base-200/20");
            }

            function stopQwGatewayStatusPolling() {
                if (qwGatewayStatusTimer) {
                    clearTimeout(qwGatewayStatusTimer);
                    qwGatewayStatusTimer = null;
                }
            }

            function renderQwGatewayStatus(status) {
                const state =
                    typeof status?.state === "string" ? status.state : "idle";
                const message =
                    typeof status?.message === "string" &&
                    status.message.trim()
                        ? status.message.trim()
                        : "鐘舵€佹湭鐭?;
                const sourceText =
                    status?.source === "startup"
                        ? "鍚姩鑷姩浠诲姟"
                        : status?.source === "manual"
                          ? "鎵嬪姩浠诲姟"
                          : "鏈煡";
                const updatedAt =
                    typeof status?.updatedAt === "string" &&
                    status.updatedAt.trim()
                        ? status.updatedAt.trim()
                        : "";

                let stateText = "鏈墽琛?;
                if (state === "running") stateText = "鍚姩涓?;
                if (state === "success") stateText = "鍚姩鎴愬姛";
                if (state === "failed") stateText = "鍚姩澶辫触";
                if (state === "unsupported") stateText = "绯荤粺涓嶆敮鎸?;

                if (statusBadges.qwGatewayStatus) {
                    statusBadges.qwGatewayStatus.textContent = `鍚姩鐘舵€? ${stateText}`;
                    setQwGatewayStatusTone(state);
                }
                if (statusBadges.qwGatewayStatusDetail) {
                    const parts = [message];
                    if (state !== "idle") {
                        parts.push(`鏉ユ簮: ${sourceText}`);
                    }
                    if (updatedAt) {
                        parts.push(`鏇存柊鏃堕棿: ${updatedAt}`);
                    }
                    statusBadges.qwGatewayStatusDetail.textContent =
                        parts.join(" | ");
                }
            }

            async function refreshQwGatewayStatus() {
                const data = await api("/api/qw-gateway/status");
                const status = data.status || {};
                renderQwGatewayStatus(status);
                return status;
            }

            async function pollQwGatewayStatus() {
                stopQwGatewayStatusPolling();
                try {
                    const status = await refreshQwGatewayStatus();
                    if (status?.state === "running") {
                        qwGatewayStatusTimer = setTimeout(
                            pollQwGatewayStatus,
                            2000,
                        );
                    }
                } catch (error) {
                    if (statusBadges.qwGatewayStatusDetail) {
                        statusBadges.qwGatewayStatusDetail.textContent =
                            readUserErrorMessage(error, "鐘舵€佽幏鍙栧け璐ワ紝璇风◢鍚庨噸璇曘€?);
                    }
                }
            }

            function stopTaskPolling() {
                if (pollTimer) {
                    clearInterval(pollTimer);
                    pollTimer = null;
                }
            }

            function formatBackupTime(value) {
                if (typeof value !== "string" || !value.trim()) return "鏈煡";
                const time = new Date(value);
                if (!Number.isFinite(time.getTime())) return value;
                return time.toLocaleString("zh-CN", { hour12: false });
            }

            function formatBackupSize(value) {
                const size = Number(value);
                if (!Number.isFinite(size) || size < 0) return "鏈煡";
                if (size < 1024) return `${size} B`;
                if (size < 1024 * 1024) return `${(size / 1024).toFixed(1)} KB`;
                return `${(size / (1024 * 1024)).toFixed(2)} MB`;
            }

            function getSelectedOpenclawBackup() {
                const currentPath =
                    openclawBackupUI.select?.value ||
                    openclawBackupState.selectedPath;
                if (!currentPath) return null;
                openclawBackupState.selectedPath = currentPath;
                return (
                    openclawBackupState.backups.find(
                        (item) => item.path === currentPath,
                    ) || null
                );
            }

            function renderOpenclawBackupMeta() {
                const selectedBackup = getSelectedOpenclawBackup();
                if (!selectedBackup) {
                    if (openclawBackupUI.summary) {
                        openclawBackupUI.summary.textContent =
                            "褰撳墠鏈彂鐜伴厤缃浠?;
                    }
                    if (openclawBackupUI.detail) {
                        openclawBackupUI.detail.textContent =
                            "璇峰厛鐢熸垚閰嶇疆澶囦唤鍚庡啀杩涜鍒囨崲銆?;
                    }
                    return;
                }

                if (openclawBackupUI.summary) {
                    openclawBackupUI.summary.textContent = `鍏?${openclawBackupState.backups.length} 涓浠斤紝褰撳墠閫夋嫨锛?{selectedBackup.fileName}`;
                }
                if (openclawBackupUI.detail) {
                    openclawBackupUI.detail.textContent =
                        `鏃堕棿: ${formatBackupTime(selectedBackup.modifiedAt)} | 澶у皬: ${formatBackupSize(selectedBackup.size)}`;
                }
            }

            function renderOpenclawBackupOptions(preferredPath = "") {
                const select = openclawBackupUI.select;
                if (!select) return;

                const backups = openclawBackupState.backups;
                select.innerHTML = "";
                if (backups.length === 0) {
                    const option = document.createElement("option");
                    option.value = "";
                    option.textContent = "鏈壘鍒板浠芥枃浠?;
                    select.append(option);
                    select.disabled = true;
                    openclawBackupState.selectedPath = "";
                    renderOpenclawBackupMeta();
                    return;
                }

                const matchedPath = [preferredPath, openclawBackupState.selectedPath]
                    .filter((item) => typeof item === "string" && item.trim())
                    .find((item) =>
                        backups.some((backup) => backup.path === item),
                    );
                const selectedPath = matchedPath || backups[0].path;

                for (const backup of backups) {
                    const option = document.createElement("option");
                    option.value = backup.path;
                    option.textContent = `${backup.fileName} | ${formatBackupTime(backup.modifiedAt)}`;
                    select.append(option);
                }

                select.disabled = false;
                select.value = selectedPath;
                openclawBackupState.selectedPath = selectedPath;
                renderOpenclawBackupMeta();
            }

            async function refreshOpenclawBackups(preferredPath = "") {
                taskProgress.classList.add("hidden");
                taskMeta.textContent = "姝ｅ湪璇诲彇閰嶇疆澶囦唤鍒楄〃...";
                const data = await api("/api/gateway/config/backups");
                const command =
                    typeof data.command === "string" ? data.command.trim() : "";
                const backups = Array.isArray(data.backups) ? data.backups : [];
                openclawBackupState.backups = backups.filter(
                    (item) => item && typeof item.path === "string",
                );
                renderOpenclawBackupOptions(preferredPath);

                if (openclawBackupState.backups.length === 0) {
                    taskMeta.textContent = "鏈壘鍒伴厤缃浠?;
                    taskOutput.textContent = "鏈壘鍒板彲鐢ㄧ殑閰嶇疆澶囦唤鏂囦欢銆?;
                    taskOutput.scrollTop = taskOutput.scrollHeight;
                    return;
                }

                const selectedBackup = getSelectedOpenclawBackup();
                if (!selectedBackup) return;
                taskMeta.textContent = `宸插姞杞藉浠?${openclawBackupState.backups.length} 涓猔;
                taskOutput.textContent = [
                    command ? `鍛戒护: ${command}` : "",
                    `褰撳墠閫夋嫨: ${selectedBackup.fileName}`,
                    `鏃堕棿: ${formatBackupTime(selectedBackup.modifiedAt)}`,
                    `澶у皬: ${formatBackupSize(selectedBackup.size)}`,
                ].filter(Boolean).join("\n");
                taskOutput.scrollTop = taskOutput.scrollHeight;
            }

            async function rollbackOpenclawBackup() {
                const selectedBackup = getSelectedOpenclawBackup();
                if (!selectedBackup) {
                    throw new Error("璇峰厛閫夋嫨鍙敤澶囦唤銆?);
                }

                const confirmed = window.confirm(
                    `灏嗗垏鎹㈠埌澶囦唤 ${selectedBackup.fileName}銆俓n姝ゆ搷浣滀細瑕嗙洊褰撳墠閰嶇疆骞堕噸鍚湇鍔★紝鏄惁缁х画锛焋,
                );
                if (!confirmed) {
                    taskProgress.classList.add("hidden");
                    taskMeta.textContent = "宸插彇娑堝浠藉垏鎹€?;
                    return;
                }

                await startTask("/api/gateway/config/rollback", {
                    backupPath: selectedBackup.path,
                });
                await refreshOpenclawBackups(selectedBackup.path);
            }

            function formatHealthState(value) {
                return value ? "姝ｅ父" : "寮傚父";
            }

            function renderEnvironmentReport(info) {
                taskProgress.classList.add("hidden");
                const warnings = Array.isArray(info?.warnings)
                    ? info.warnings.filter((item) => typeof item === "string")
                    : [];
                taskMeta.textContent =
                    warnings.length > 0
                        ? `鐜妫€鏌ュ畬鎴愶紙鍛婅 ${warnings.length} 鏉★級`
                        : "鐜妫€鏌ュ畬鎴愶紙鏃犲憡璀︼級";

                const openclawVersion =
                    typeof info?.openclawVersion === "string" &&
                    info.openclawVersion.trim()
                        ? info.openclawVersion.trim()
                        : "鏈煡";
                const openclawVersionSource =
                    typeof info?.openclawVersionSource === "string" &&
                    info.openclawVersionSource.trim()
                        ? info.openclawVersionSource.trim()
                        : "";
                const gatewayReportedVersion =
                    typeof info?.gatewayReportedVersion === "string" &&
                    info.gatewayReportedVersion.trim()
                        ? info.gatewayReportedVersion.trim()
                        : "";

                const browserMode = info?.browserMode === "local" ? "鏈湴" : "CDP";
                const browserState =
                    info?.browserEnabled === false
                        ? "宸茬鐢?
                        : formatHealthState(Boolean(info?.browserReady));

                const lines = [
                    `鎵ц妯″紡: ${info?.execution || "鏈煡"}`,
                    `WSL: ${formatHealthState(Boolean(info?.wslReady))}`,
                    `openclaw: ${formatHealthState(Boolean(info?.openclawReady))}`,
                    `openclaw 鐗堟湰: ${openclawVersion}`,
                    `gateway: ${formatHealthState(Boolean(info?.gatewayReady))}`,
                    `娴忚鍣?${browserMode}): ${browserState}`,
                ];

                if (openclawVersionSource) {
                    lines.push("鐗堟湰鏉ユ簮: 绯荤粺妫€娴?);
                }
                if (gatewayReportedVersion) {
                    lines.push(`鏈嶅姟涓婃姤鐗堟湰: ${gatewayReportedVersion}`);
                }

                if (warnings.length > 0) {
                    lines.push("");
                    lines.push("妫€娴嬪埌寮傚父锛岃鍏堟墽琛屸€滅幆澧冧慨澶嶁€濆悗閲嶈瘯銆?);
                }

                taskOutput.textContent = lines.join("\n");
                taskOutput.scrollTop = taskOutput.scrollHeight;
            }

            function renderTask(task) {
                const statusTextMap = {
                    pending: "绛夊緟涓?,
                    running: "鎵ц涓?,
                    success: "宸插畬鎴?,
                    failed: "澶辫触",
                };
                const percent =
                    task.totalSteps > 0
                        ? Math.round((task.step / task.totalSteps) * 100)
                        : 0;
                taskProgress.value = percent;
                const running =
                    task.status === "running" || task.status === "pending";
                taskProgress.classList.toggle("hidden", !running);
                const statusText =
                    statusTextMap[task.status] || "鏈煡";
                taskMeta.textContent = `${task.title} | ${statusText} | ${task.step}/${task.totalSteps}`;

                const lines = task.logs.map(
                    (item) =>
                        `[${item.timestamp}] ${item.level.toUpperCase()} ${item.message}`,
                );
                taskOutput.textContent = lines.join("\n") || "鏆傛棤鏃ュ織";
                taskOutput.scrollTop = taskOutput.scrollHeight;
            }

            async function pollTask(taskId) {
                if (pollTimer) {
                    clearInterval(pollTimer);
                    pollTimer = null;
                }

                const tick = async () => {
                    try {
                        const data = await api(`/api/tasks/${taskId}`);
                        const task = data.task;
                        renderTask(task);
                        if (
                            task.status === "success" ||
                            task.status === "failed"
                        ) {
                            clearInterval(pollTimer);
                            pollTimer = null;
                        }
                    } catch (error) {
                        clearInterval(pollTimer);
                        pollTimer = null;
                        taskProgress.classList.add("hidden");
                        taskMeta.textContent = readUserErrorMessage(
                            error,
                            "浠诲姟鐘舵€佸埛鏂板け璐ワ紝璇风◢鍚庨噸璇曘€?,
                        );
                    }
                };

                await tick();
                pollTimer = setInterval(tick, 1000);
            }

            async function startTask(url, body = null) {
                const data = await api(url, {
                    method: "POST",
                    body: body ? JSON.stringify(body) : "{}",
                });

                if (!data.taskId) {
                    throw new Error("鏈嶅姟绔湭杩斿洖浠诲姟 ID");
                }

                if (data.reused) {
                    taskMeta.textContent =
                        "宸叉湁鍚岀被浠诲姟鍦ㄦ墽琛岋紝宸插垏鎹㈠埌褰撳墠浠诲姟鏃ュ織";
                }

                await pollTask(data.taskId);
            }

            async function checkEnvironment() {
                stopTaskPolling();
                const data = await api("/api/system/check");
                const info = data.info || {};

                if (statusBadges.execution) {
                    statusBadges.execution.textContent = `鎵ц妯″紡: ${info.execution || "鏈煡"}`;
                }

                setLight(
                    statusBadges.wslLabel,
                    statusBadges.wslLight,
                    "WSL",
                    Boolean(info.wslReady),
                );
                setLight(
                    statusBadges.openclawLabel,
                    statusBadges.openclawLight,
                    "openclaw",
                    Boolean(info.openclawReady),
                );
                if (statusBadges.openclawVersion) {
                    const openclawVersion =
                        typeof info.openclawVersion === "string" &&
                        info.openclawVersion.trim()
                            ? info.openclawVersion.trim()
                            : "鏈煡";
                    statusBadges.openclawVersion.textContent = `鐗堟湰: ${openclawVersion}`;
                }
                setLight(
                    statusBadges.gatewayLabel,
                    statusBadges.gatewayLight,
                    "gateway",
                    Boolean(info.gatewayReady),
                );

                const browserMode =
                    info.browserMode === "local" ? "鏈湴" : "CDP";
                const browserState =
                    info.browserEnabled === false
                        ? null
                        : Boolean(info.browserReady);
                setLight(
                    statusBadges.browserLabel,
                    statusBadges.browserLight,
                    `娴忚鍣?${browserMode})`,
                    browserState,
                );

                renderEnvironmentReport(info);
            }

            async function runAction(action) {
                switch (action) {
                    case "check-env":
                        await checkEnvironment();
                        return;
                    case "repair-env":
                        await startTask("/api/system/repair");
                        return;
                    case "refresh-openclaw-backups":
                        await refreshOpenclawBackups();
                        return;
                    case "rollback-openclaw-backup":
                        await rollbackOpenclawBackup();
                        return;
                    case "update-openclaw":
                        await startTask("/api/gateway/update");
                        return;
                    case "restart-gateway":
                        await startTask("/api/gateway/action", {
                            action: "restart",
                        });
                        return;
                    case "restart-qw-gateway":
                        await startTask("/api/gateway/action", {
                            action: "restart-qw-gateway",
                        });
                        await pollQwGatewayStatus();
                        return;
                    case "gateway-status":
                        await startTask("/api/gateway/action", {
                            action: "status",
                        });
                        return;
                    case "gateway-start":
                        await startTask("/api/gateway/action", {
                            action: "start",
                        });
                        return;
                    case "gateway-stop":
                        await startTask("/api/gateway/action", {
                            action: "stop",
                        });
                        return;
                    default:
                        throw new Error("鏆備笉鏀寔璇ユ搷浣溿€?);
                }
            }

            document.querySelectorAll("[data-action]").forEach((button) => {
                button.addEventListener("click", async () => {
                    const action = button.getAttribute("data-action");
                    if (!action) return;
                    button.disabled = true;
                    try {
                        await runAction(action);
                    } catch (error) {
                        taskProgress.classList.add("hidden");
                        taskMeta.textContent = readUserErrorMessage(
                            error,
                            "鎿嶄綔澶辫触锛岃绋嶅悗閲嶈瘯銆?,
                        );
                    } finally {
                        button.disabled = false;
                    }
                });
            });

            if (openclawBackupUI.select) {
                openclawBackupUI.select.addEventListener("change", () => {
                    openclawBackupState.selectedPath =
                        openclawBackupUI.select.value;
                    renderOpenclawBackupMeta();
                });
            }

            (async function init() {
                try {
                    await checkEnvironment();
                    await refreshOpenclawBackups();
                } catch (error) {
                    taskProgress.classList.add("hidden");
                    taskMeta.textContent = readUserErrorMessage(
                        error,
                        "鍒濆鍖栧け璐ワ紝璇峰埛鏂伴〉闈㈤噸璇曘€?,
                    );
                }
                await pollQwGatewayStatus();
            })();
        </script>
    </body>
</html>
