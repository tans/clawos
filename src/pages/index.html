<!doctype html>
<html lang="zh-CN" data-theme="silk">

        <meta charset="utf-8" />

        <style>
            body[data-theme="silk"] main > header .text-xs,
            body[data-theme="silk"] main > header p,
            body[data-theme="silk"] main section p,
            body[data-theme="silk"] .badge.badge-outline.badge-lg,
            body[data-theme="silk"] [data-qw-gateway-status-detail],
            body[data-theme="silk"] main .btn span + span,
            body[data-theme="silk"] section > header .text-xs,
            body[data-theme="silk"] main section h2,
            body[data-theme="silk"] main section h3,
            body[data-theme="silk"] main section .mt-2.text-lg.font-semibold {
                display: none;
            }

            body[data-theme="silk"] main > header {
                padding: 0.75rem 1.25rem;
            }

            body[data-theme="silk"] main > header > div:last-child {
                gap: 0.5rem;
                align-items: center;
            }

            body[data-theme="silk"] main > header h1 {
                font-size: 1.25rem;
                line-height: 1.2;
            }

            body[data-theme="silk"] main > section {
                padding: 0.5rem;
            }

            body[data-theme="silk"] main > section > div {
                gap: 0.5rem;
            }

            body[data-theme="silk"] main > section > div > section {
                border-radius: 0.5rem;
                box-shadow: none;
            }

            body[data-theme="silk"] main > section > div > section:first-child > div:first-child,
            body[data-theme="silk"] main > section > div > section:first-child > div:last-child,
            body[data-theme="silk"] main > section > div > section:last-child > header,
            body[data-theme="silk"] main > section > div > section:last-child > section {
                padding: 0.75rem 1rem;
            }

            body[data-theme="silk"] main .btn {
                min-height: 2.25rem;
                height: 2.25rem;
                padding: 0.25rem 0.75rem;
                border-radius: 0.75rem;
            }

            body[data-theme="silk"] main [data-openclaw-entry],
            body[data-theme="silk"] main [data-action="restart-gateway"],
            body[data-theme="silk"] main [data-action="update-openclaw"],
            body[data-theme="silk"] main [data-action="check-env"],
            body[data-theme="silk"] main [data-action="repair-env"],
            body[data-theme="silk"] main [data-action="restart-qw-gateway"] {
                justify-content: flex-start;

            body[data-theme="silk"] main [data-qw-gateway-status],
            body[data-theme="silk"] main [data-openclaw-backup-summary],
            body[data-theme="silk"] main [data-task-meta] {
                padding: 0.5rem 0.75rem;
                font-size: 12px;
                border-radius: 0.75rem;
            }

            body[data-theme="silk"] main [data-openclaw-backup-detail] {
                padding: 0.5rem 0.75rem;
                font-size: 11px;
                line-height: 1.35;
                border-radius: 0.75rem;
            }

            body[data-theme="silk"] main [data-openclaw-backup-select] {
                min-height: 2.25rem;
                height: 2.25rem;
                border-radius: 0.75rem;
                font-size: 12px;

            body[data-theme="silk"] main [data-task-output] {
                min-height: 220px;
                padding: 0.75rem;
                line-height: 1.35;
                border-radius: 0.75rem;
            }
        </style>

        <script src="/sidebar-update.js"></script>

        <script>
            const statusBadges = {
                qwGatewayStatus: document.querySelector("[data-qw-gateway-status]"),
                qwGatewayStatusDetail: document.querySelector("[data-qw-gateway-status-detail]"),
            };

            const taskMeta = document.querySelector("[data-task-meta]");
            const taskProgress = document.querySelector("[data-task-progress]");
            const taskOutput = document.querySelector("[data-task-output]");
            const openclawBackupUI = {
                select: document.querySelector("[data-openclaw-backup-select]"),
                summary: document.querySelector("[data-openclaw-backup-summary]"),
                detail: document.querySelector("[data-openclaw-backup-detail]"),
            };
            const openclawBackupState = {
                backups: [],
                selectedPath: "",
            };
            const ACTIVE_TASK_STORAGE_KEY = "clawos.activeTaskId";

            let pollTimer = null;
            let qwGatewayStatusTimer = null;
            // 临时下线：运行状态与 Token 用量轮询暂停发布。

            async function api(path, options = {}) {
                const res = await fetch(path, {
                    headers: { "content-type": "application/json" },
                    ...options,
                });

                const data = await res.json().catch(() => ({}));
                if (!res.ok || !data.ok) {
                    const apiError = new Error(data.error || `请求失败: ${res.status}`);
                    apiError.isApiError = true;
                    throw apiError;
                }
                return data;
            }

            function readUserErrorMessage(error, fallback) {
                if (error && typeof error === "object" && error.isApiError === true) {
                    return fallback;
                }
                const message = error instanceof Error ? String(error.message || "").trim() : "";
                return message || fallback;
            }

            function setLight(labelEl, lightEl, label, state) {
                const disabled = state === null;
                const ok = state === true;
                if (labelEl) {
                    labelEl.textContent = `${label}: ${disabled ? "已禁用" : ok ? "正常" : "异常"}`;
                }
                if (!lightEl) return;
                lightEl.classList.remove(
                    "bg-base-300",
                    "bg-success",
                    "bg-error",
                );
                if (disabled) {
                    lightEl.classList.add("bg-base-300");
                    return;
                }
                lightEl.classList.add(ok ? "bg-success" : "bg-error");
            }

            function setQwGatewayStatusTone(state) {
                const statusEl = statusBadges.qwGatewayStatus;
                if (!statusEl) return;
                statusEl.classList.remove(
                    "border-base-200",
                    "border-info/30",
                    "border-success/30",
                    "border-error/30",
                    "bg-base-200/20",
                    "bg-info/10",
                    "bg-success/10",
                    "bg-error/10",
                );
                if (state === "running") {
                    statusEl.classList.add("border-info/30", "bg-info/10");
                    return;
                }
                if (state === "success") {
                    statusEl.classList.add("border-success/30", "bg-success/10");
                    return;
                }
                if (state === "failed") {
                    statusEl.classList.add("border-error/30", "bg-error/10");
                    return;
                }
                statusEl.classList.add("border-base-200", "bg-base-200/20");
            }

            function stopQwGatewayStatusPolling() {
                if (qwGatewayStatusTimer) {
                    clearTimeout(qwGatewayStatusTimer);
                    qwGatewayStatusTimer = null;
                }
            }

            function renderQwGatewayStatus(status) {
                const state =
                    typeof status?.state === "string" ? status.state : "idle";
                const message =
                    typeof status?.message === "string" &&
                    status.message.trim()
                        ? status.message.trim()
                        : "状态未知";
                const sourceText =
                    status?.source === "startup"
                        ? "启动自动任务"
                        : status?.source === "manual"
                          ? "手动任务"
                          : "未知";
                const updatedAt =
                    typeof status?.updatedAt === "string" &&
                    status.updatedAt.trim()
                        ? status.updatedAt.trim()
                        : "";

                let stateText = "未执行";
                if (state === "running") stateText = "启动中";
                if (state === "success") stateText = "启动成功";
                if (state === "failed") stateText = "启动失败";
                if (state === "unsupported") stateText = "系统不支持";

                if (statusBadges.qwGatewayStatus) {
                    statusBadges.qwGatewayStatus.textContent = `启动状态: ${stateText}`;
                    setQwGatewayStatusTone(state);
                }
                if (statusBadges.qwGatewayStatusDetail) {
                    const parts = [message];
                    if (state !== "idle") {
                        parts.push(`来源: ${sourceText}`);
                    }
                    if (updatedAt) {
                        parts.push(`更新时间: ${updatedAt}`);
                    }
                    statusBadges.qwGatewayStatusDetail.textContent =
                        parts.join(" | ");
                }
            }

            async function refreshQwGatewayStatus() {
                const data = await api("/api/qw-gateway/status");
                const status = data.status || {};
                renderQwGatewayStatus(status);
                return status;
            }

            async function pollQwGatewayStatus() {
                stopQwGatewayStatusPolling();
                try {
                    const status = await refreshQwGatewayStatus();
                    if (status?.state === "running") {
                        qwGatewayStatusTimer = setTimeout(
                            pollQwGatewayStatus,
                            2000,
                        );
                    }
                } catch (error) {
                    if (statusBadges.qwGatewayStatusDetail) {
                        statusBadges.qwGatewayStatusDetail.textContent =
                            readUserErrorMessage(error, "状态获取失败，请稍后重试。");
                    }
                }
            }

            // 临时下线：运行状态与 Token 用量面板不发布，相关请求先停用。

            function stopTaskPolling() {
                if (pollTimer) {
                    clearInterval(pollTimer);
                    pollTimer = null;
                }
            }

            function formatBackupTime(value) {
                if (typeof value !== "string" || !value.trim()) return "未知";
                const time = new Date(value);
                if (!Number.isFinite(time.getTime())) return value;
                return time.toLocaleString("zh-CN", { hour12: false });
            }

            function formatBackupSize(value) {
                const size = Number(value);
                if (!Number.isFinite(size) || size < 0) return "未知";
                if (size < 1024) return `${size} B`;
                if (size < 1024 * 1024) return `${(size / 1024).toFixed(1)} KB`;
                return `${(size / (1024 * 1024)).toFixed(2)} MB`;
            }

            function getSelectedOpenclawBackup() {
                const currentPath =
                    openclawBackupUI.select?.value ||
                    openclawBackupState.selectedPath;
                if (!currentPath) return null;
                openclawBackupState.selectedPath = currentPath;
                return (
                    openclawBackupState.backups.find(
                        (item) => item.path === currentPath,
                    ) || null
                );
            }

            function renderOpenclawBackupMeta() {
                const selectedBackup = getSelectedOpenclawBackup();
                if (!selectedBackup) {
                    if (openclawBackupUI.summary) {
                        openclawBackupUI.summary.textContent =
                            "当前未发现配置备份";
                    }
                    if (openclawBackupUI.detail) {
                        openclawBackupUI.detail.textContent =
                            "请先生成配置备份后再进行切换。";
                    }
                    return;
                }

                if (openclawBackupUI.summary) {
                    openclawBackupUI.summary.textContent = `共 ${openclawBackupState.backups.length} 个备份，当前选择：${selectedBackup.fileName}`;
                }
                if (openclawBackupUI.detail) {
                    openclawBackupUI.detail.textContent =
                        `时间: ${formatBackupTime(selectedBackup.modifiedAt)} | 大小: ${formatBackupSize(selectedBackup.size)}`;
                }
            }

            function renderOpenclawBackupOptions(preferredPath = "") {
                const select = openclawBackupUI.select;
                if (!select) return;

                const backups = openclawBackupState.backups;
                select.innerHTML = "";
                if (backups.length === 0) {
                    const option = document.createElement("option");
                    option.value = "";
                    option.textContent = "未找到备份文件";
                    select.append(option);
                    select.disabled = true;
                    openclawBackupState.selectedPath = "";
                    renderOpenclawBackupMeta();
                    return;
                }

                const matchedPath = [preferredPath, openclawBackupState.selectedPath]
                    .filter((item) => typeof item === "string" && item.trim())
                    .find((item) =>
                        backups.some((backup) => backup.path === item),
                    );
                const selectedPath = matchedPath || backups[0].path;

                for (const backup of backups) {
                    const option = document.createElement("option");
                    option.value = backup.path;
                    option.textContent = `${backup.fileName} | ${formatBackupTime(backup.modifiedAt)}`;
                    select.append(option);
                }

                select.disabled = false;
                select.value = selectedPath;
                openclawBackupState.selectedPath = selectedPath;
                renderOpenclawBackupMeta();
            }

            async function refreshOpenclawBackups(preferredPath = "") {
                taskProgress.classList.add("hidden");
                taskMeta.textContent = "正在读取配置备份列表...";
                const data = await api("/api/gateway/config/backups");
                const command =
                    typeof data.command === "string" ? data.command.trim() : "";
                const backups = Array.isArray(data.backups) ? data.backups : [];
                openclawBackupState.backups = backups.filter(
                    (item) => item && typeof item.path === "string",
                );
                renderOpenclawBackupOptions(preferredPath);

                if (openclawBackupState.backups.length === 0) {
                    taskMeta.textContent = "未找到配置备份";
                    taskOutput.textContent = "未找到可用的配置备份文件。";
                    taskOutput.scrollTop = taskOutput.scrollHeight;
                    return;
                }

                const selectedBackup = getSelectedOpenclawBackup();
                if (!selectedBackup) return;
                taskMeta.textContent = `已加载备份 ${openclawBackupState.backups.length} 个`;
                taskOutput.textContent = [
                    command ? `命令: ${command}` : "",
                    `当前选择: ${selectedBackup.fileName}`,
                    `时间: ${formatBackupTime(selectedBackup.modifiedAt)}`,
                    `大小: ${formatBackupSize(selectedBackup.size)}`,
                ].filter(Boolean).join("\n");
                taskOutput.scrollTop = taskOutput.scrollHeight;
            }

            async function rollbackOpenclawBackup() {
                const selectedBackup = getSelectedOpenclawBackup();
                if (!selectedBackup) {
                    throw new Error("请先选择可用备份。");
                }

                const confirmed = window.confirm(
                    `将切换到备份 ${selectedBackup.fileName}。\n此操作会覆盖当前配置并重启服务，是否继续？`,
                );
                if (!confirmed) {
                    taskProgress.classList.add("hidden");
                    taskMeta.textContent = "已取消备份切换。";
                    return;
                }

                await startTask("/api/gateway/config/rollback", {
                    backupPath: selectedBackup.path,
                });
                await refreshOpenclawBackups(selectedBackup.path);
            }

            function formatHealthState(value) {
                return value ? "正常" : "异常";
            }

            function renderEnvironmentReport(info) {
                taskProgress.classList.add("hidden");
                const warnings = Array.isArray(info?.warnings)
                    ? info.warnings.filter((item) => typeof item === "string")
                    : [];
                taskMeta.textContent =
                    warnings.length > 0
                        ? `环境检查完成（告警 ${warnings.length} 条）`
                        : "环境检查完成（无告警）";

                const openclawVersion =
                    typeof info?.openclawVersion === "string" &&
                    info.openclawVersion.trim()
                        ? info.openclawVersion.trim()
                        : "未知";
                const openclawVersionSource =
                    typeof info?.openclawVersionSource === "string" &&
                    info.openclawVersionSource.trim()
                        ? info.openclawVersionSource.trim()
                        : "";
                const gatewayReportedVersion =
                    typeof info?.gatewayReportedVersion === "string" &&
                    info.gatewayReportedVersion.trim()
                        ? info.gatewayReportedVersion.trim()
                        : "";

                const browserMode = info?.browserMode === "local" ? "本地" : "CDP";
                const browserState =
                    info?.browserEnabled === false
                        ? "已禁用"
                        : formatHealthState(Boolean(info?.browserReady));

                const lines = [
                    `执行模式: ${info?.execution || "未知"}`,
                    `WSL: ${formatHealthState(Boolean(info?.wslReady))}`,
                    `openclaw: ${formatHealthState(Boolean(info?.openclawReady))}`,
                    `openclaw 版本: ${openclawVersion}`,
                    `gateway: ${formatHealthState(Boolean(info?.gatewayReady))}`,
                    `浏览器(${browserMode}): ${browserState}`,
                ];

                if (openclawVersionSource) {
                    lines.push("版本来源: 系统检测");
                }
                if (gatewayReportedVersion) {
                    lines.push(`服务上报版本: ${gatewayReportedVersion}`);
                }

                if (warnings.length > 0) {
                    lines.push("");
                    lines.push("检测到异常，请先执行“环境修复”后重试。");
                }

                taskOutput.textContent = lines.join("\n");
                taskOutput.scrollTop = taskOutput.scrollHeight;
            }

            function setActiveTaskId(taskId) {
                try {
                    if (typeof taskId === "string" && taskId.trim()) {
                        window.sessionStorage.setItem(
                            ACTIVE_TASK_STORAGE_KEY,
                            taskId.trim(),
                        );
                    }
                } catch {
                    // ignore storage errors
                }
            }

            function readActiveTaskId() {
                try {
                    const value = window.sessionStorage.getItem(
                        ACTIVE_TASK_STORAGE_KEY,
                    );
                    return typeof value === "string" && value.trim()
                        ? value.trim()
                        : "";
                } catch {
                    return "";
                }
            }

            function clearActiveTaskId(taskId = "") {
                try {
                    const current = window.sessionStorage.getItem(
                        ACTIVE_TASK_STORAGE_KEY,
                    );
                    if (!taskId || current === taskId) {
                        window.sessionStorage.removeItem(
                            ACTIVE_TASK_STORAGE_KEY,
                        );
                    }
                } catch {
                    // ignore storage errors
                }
            }

            function renderTask(task) {
                const statusTextMap = {
                    pending: "等待中",
                    running: "执行中",
                    success: "已完成",
                    failed: "失败",
                };
                const percent =
                    task.totalSteps > 0
                        ? Math.round((task.step / task.totalSteps) * 100)
                        : 0;
                taskProgress.value = percent;
                const running =
                    task.status === "running" || task.status === "pending";
                taskProgress.classList.toggle("hidden", !running);
                const statusText =
                    statusTextMap[task.status] || "未知";
                taskMeta.textContent = `${task.title} | ${statusText} | ${task.step}/${task.totalSteps}`;

                const lines = task.logs.map(
                    (item) =>
                        `[${item.timestamp}] ${item.level.toUpperCase()} ${item.message}`,
                );
                taskOutput.textContent = lines.join("\n") || "暂无日志";
                taskOutput.scrollTop = taskOutput.scrollHeight;
            }

            async function pollTask(taskId) {
                if (pollTimer) {
                    clearInterval(pollTimer);
                    pollTimer = null;
                }
                setActiveTaskId(taskId);

                const tick = async () => {
                    try {
                        const data = await api(`/api/tasks/${taskId}`);
                        const task = data.task;
                        renderTask(task);
                        if (
                            task.status === "success" ||
                            task.status === "failed"
                        ) {
                            clearActiveTaskId(taskId);
                            clearInterval(pollTimer);
                            pollTimer = null;
                        }
                    } catch (error) {
                        clearActiveTaskId(taskId);
                        clearInterval(pollTimer);
                        pollTimer = null;
                        taskProgress.classList.add("hidden");
                        taskMeta.textContent = readUserErrorMessage(
                            error,
                            "任务状态刷新失败，请稍后重试。",
                        );
                    }
                };

                await tick();
                pollTimer = setInterval(tick, 1000);
            }

            async function startTask(url, body = null) {
                const data = await api(url, {
                    method: "POST",
                    body: body ? JSON.stringify(body) : "{}",
                });

                if (!data.taskId) {
                    throw new Error("服务端未返回任务 ID");
                }

                if (data.reused) {
                    taskMeta.textContent =
                        "已有同类任务在执行，已切换到当前任务日志";
                }

                setActiveTaskId(data.taskId);
                await pollTask(data.taskId);
            }

            async function checkEnvironment() {
                stopTaskPolling();
                const data = await api("/api/system/check");
                const info = data.info || {};

                if (statusBadges.execution) {
                    statusBadges.execution.textContent = `执行模式: ${info.execution || "未知"}`;
                }

                setLight(
                    statusBadges.wslLabel,
                    statusBadges.wslLight,
                    "WSL",
                    Boolean(info.wslReady),
                );
                setLight(
                    statusBadges.openclawLabel,
                    statusBadges.openclawLight,
                    "openclaw",
                    Boolean(info.openclawReady),
                );
                if (statusBadges.openclawVersion) {
                    const openclawVersion =
                        typeof info.openclawVersion === "string" &&
                        info.openclawVersion.trim()
                            ? info.openclawVersion.trim()
                            : "未知";
                    statusBadges.openclawVersion.textContent = `版本: ${openclawVersion}`;
                }
                setLight(
                    statusBadges.gatewayLabel,
                    statusBadges.gatewayLight,
                    "gateway",
                    Boolean(info.gatewayReady),
                );

                const browserMode =
                    info.browserMode === "local" ? "本地" : "CDP";
                const browserState =
                    info.browserEnabled === false
                        ? null
                        : Boolean(info.browserReady);
                setLight(
                    statusBadges.browserLabel,
                    statusBadges.browserLight,
                    `浏览器(${browserMode})`,
                    browserState,
                );

                renderEnvironmentReport(info);
            }

            async function runAction(action) {
                switch (action) {
                    case "restart-qw-gateway":
                        await startTask("/api/gateway/action", {
                            action: "restart-qw-gateway",
                        });
                        void pollQwGatewayStatus();
                        return;
                    case "refresh-openclaw-backups":
                        await refreshOpenclawBackups();
                        return;
                    case "rollback-openclaw-backup":
                        await rollbackOpenclawBackup();
                        return;
                    case "update-openclaw":
                        await startTask("/api/gateway/update");
                        return;
                    case "restart-gateway":
                        await startTask("/api/gateway/action", {
                            action: "restart",
                        });
                        return;
                    case "gateway-status":
                        await startTask("/api/gateway/action", {
                            action: "status",
                        });
                        return;
                    case "gateway-start":
                        await startTask("/api/gateway/action", {
                            action: "start",
                        });
                        return;
                    case "gateway-stop":
                        await startTask("/api/gateway/action", {
                            action: "stop",
                        });
                        return;
                    default:
                        throw new Error("暂不支持该操作。");
                }
            }

            document.querySelectorAll("[data-action]").forEach((button) => {
                button.addEventListener("click", async () => {
                    const action = button.getAttribute("data-action");
                    if (!action) return;
                    button.disabled = true;
                    try {
                        await runAction(action);
                    } catch (error) {
                        taskProgress.classList.add("hidden");
                        taskMeta.textContent = readUserErrorMessage(
                            error,
                            "操作失败，请稍后重试。",
                        );
                    } finally {
                        button.disabled = false;
                    }
                });
            });

            if (openclawBackupUI.select) {
                openclawBackupUI.select.addEventListener("change", () => {
                    openclawBackupState.selectedPath =
                        openclawBackupUI.select.value;
                    renderOpenclawBackupMeta();
                });
            }

            window.addEventListener("clawos:self-update-started", (event) => {
                const taskId = event?.detail?.taskId;
                if (typeof taskId === "string" && taskId.trim()) {
                    void pollTask(taskId.trim());
                }
            });

            (async function init() {
                try {
                    await refreshOpenclawBackups();
                } catch (error) {
                    taskProgress.classList.add("hidden");
                    taskMeta.textContent = readUserErrorMessage(
                        error,
                        "初始化失败，请刷新页面重试。",
                    );
                }
                const activeTaskId = readActiveTaskId();
                if (activeTaskId) {
                    await pollTask(activeTaskId);
                }
                await pollQwGatewayStatus().catch(() => null);
                // 临时下线：运行状态与 Token 用量轮询暂停发布。
            })();
        </script>
    </body>
</html>
