<!doctype html>
<html lang="zh-CN" data-theme="silk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ClawOS 通讯渠道</title>
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.7.2/css/all.min.css" />
  </head>
  <body class="bg-base-100 text-base-content overflow-x-auto">
    <div class="grid min-h-screen min-w-[980px] grid-cols-[240px_1fr]">
      <aside class="flex flex-col gap-4 border-r border-base-200 bg-base-100 px-4 py-4">
        <div class="text-sm text-base-content/60">加载中...</div>
      </aside>

      <main class="flex min-h-screen flex-col">
        <header class="flex flex-wrap items-center justify-between gap-3 border-b border-base-200 px-6 py-4">
          <h1 class="text-lg font-semibold">通讯渠道</h1>
          <div class="flex flex-wrap items-center gap-2">
            <button class="btn btn-outline btn-xs" data-action="reload">重新加载</button>
          </div>
        </header>

        <section class="flex-1 p-6">
          <section class="card card-compact border border-base-200 bg-base-100" data-card-editor>
            <div class="card-body gap-3">
              <div class="flex flex-wrap items-center justify-between gap-2">
                <h2 class="card-title text-base">渠道开关与参数入口</h2>
                <span class="text-[11px] text-base-content/60">仅展示当前常用渠道</span>
              </div>
              <div class="grid gap-3 xl:grid-cols-2" data-channel-list></div>
            </div>
          </section>

          <div class="mt-3 text-xs text-base-content/70" data-meta>尚未加载</div>
        </section>
      </main>
    </div>

    <dialog class="modal" data-channel-modal>
      <div class="modal-box max-w-3xl">
        <div class="mb-2 flex items-start justify-between gap-3">
          <div>
            <h3 class="text-base font-semibold" data-modal-title>渠道参数</h3>
            <div class="text-[11px] text-base-content/60" data-modal-subtitle>仅展示当前可编辑参数。</div>
          </div>
          <button class="btn btn-ghost btn-xs" type="button" data-modal-close>关闭</button>
        </div>

        <div class="grid gap-3" data-modal-fields></div>

        <div class="modal-action">
          <button class="btn btn-ghost btn-sm" type="button" data-modal-cancel>取消</button>
          <button class="btn btn-primary btn-sm" type="button" data-modal-save>保存</button>
        </div>
      </div>
      <form method="dialog" class="modal-backdrop">
        <button aria-label="关闭">close</button>
      </form>
    </dialog>

    <script src="/sidebar-update.js"></script>

    <script>
      const SECTION = "channels";
      const LEGACY_WECOM_KEYS = ["wework", "wxwork", "qywx", "wechatWork", "enterpriseWechat"];
      const REDACTED_SENTINEL = "__OPENCLAW_REDACTED__";

      const CHANNEL_SPECS = [
        {
          key: "feishu",
          title: "飞书",
          icon: "fa-solid fa-feather-pointed",
          fields: [
            { path: "appId", label: "appId", type: "text" },
            { path: "secret", label: "secret", type: "password" },
          ],
        },
        {
          key: "wecom",
          title: "企业微信",
          icon: "fa-brands fa-weixin",
          fields: [],
        },
      ];

      const specByKey = new Map(CHANNEL_SPECS.map((spec) => [spec.key, spec]));

      const metaEl = document.querySelector("[data-meta]");
      const channelListEl = document.querySelector("[data-channel-list]");

      const modalEl = document.querySelector("[data-channel-modal]");
      const modalTitleEl = document.querySelector("[data-modal-title]");
      const modalSubtitleEl = document.querySelector("[data-modal-subtitle]");
      const modalFieldsEl = document.querySelector("[data-modal-fields]");
      const modalCloseEl = document.querySelector("[data-modal-close]");
      const modalCancelEl = document.querySelector("[data-modal-cancel]");
      const modalSaveEl = document.querySelector("[data-modal-save]");

      let channelsConfig = {};
      let activeSpec = null;
      let activeDraft = {};

      function isObject(value) {
        return Boolean(value) && typeof value === "object" && !Array.isArray(value);
      }

      function ensureObject(value, field) {
        if (!isObject(value)) {
          throw new Error(`${field} 必须是 JSON 对象`);
        }
        return value;
      }

      function cloneObject(value) {
        return JSON.parse(JSON.stringify(value || {}));
      }

      function escapeHtml(raw) {
        return String(raw)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function getPath(source, path) {
        const parts = path.split(".");
        let current = source;
        for (const part of parts) {
          if (!isObject(current) || !Object.prototype.hasOwnProperty.call(current, part)) {
            return undefined;
          }
          current = current[part];
        }
        return current;
      }

      function setPath(target, path, value) {
        const parts = path.split(".");
        let current = target;

        for (let i = 0; i < parts.length - 1; i += 1) {
          const key = parts[i];
          if (!isObject(current[key])) {
            current[key] = {};
          }
          current = current[key];
        }

        current[parts[parts.length - 1]] = value;
      }

      function deletePath(target, path) {
        const parts = path.split(".");
        const parents = [];
        let current = target;

        for (let i = 0; i < parts.length - 1; i += 1) {
          const key = parts[i];
          if (!isObject(current[key])) {
            return;
          }
          parents.push({ obj: current, key });
          current = current[key];
        }

        delete current[parts[parts.length - 1]];

        for (let i = parents.length - 1; i >= 0; i -= 1) {
          const { obj, key } = parents[i];
          if (isObject(obj[key]) && Object.keys(obj[key]).length === 0) {
            delete obj[key];
          }
        }
      }

      function parseList(rawText) {
        return String(rawText || "")
          .split("\n")
          .map((item) => item.trim())
          .filter(Boolean);
      }

      function joinList(value) {
        if (!Array.isArray(value)) {
          return "";
        }

        return value
          .map((item) => (typeof item === "string" ? item.trim() : ""))
          .filter(Boolean)
          .join("\n");
      }

      function parseNumberValue(rawText, fieldLabel, field) {
        const text = String(rawText || "").trim();
        if (!text) {
          return undefined;
        }

        const value = Number(text);
        if (!Number.isFinite(value)) {
          throw new Error(`${fieldLabel} 必须是数字`);
        }

        const integer = field.integer !== false;
        if (integer && !Number.isInteger(value)) {
          throw new Error(`${fieldLabel} 必须是整数`);
        }

        if (typeof field.min === "number" && value < field.min) {
          throw new Error(`${fieldLabel} 不能小于 ${field.min}`);
        }

        if (typeof field.max === "number" && value > field.max) {
          throw new Error(`${fieldLabel} 不能大于 ${field.max}`);
        }

        return value;
      }

      function readOptionalText(value) {
        if (typeof value !== "string") {
          return undefined;
        }
        const trimmed = value.trim();
        if (!trimmed || trimmed === REDACTED_SENTINEL) {
          return undefined;
        }
        return trimmed || undefined;
      }

      function resolveRawWecomEntry(config) {
        if (isObject(config.wecom)) {
          return config.wecom;
        }

        for (const key of LEGACY_WECOM_KEYS) {
          if (isObject(config[key])) {
            return config[key];
          }
        }
        return {};
      }

      function readEnableFlag(source) {
        if (source.enable === true || source.enabled === true) {
          return true;
        }
        if (source.enable === false || source.enabled === false) {
          return false;
        }
        return undefined;
      }

      function sanitizeFeishuEntry(rawEntry) {
        const source = isObject(rawEntry) ? rawEntry : {};
        const draft = {};
        const appId = readOptionalText(source.appId);
        const secret = readOptionalText(source.secret) || readOptionalText(source.appSecret);
        const enable = readEnableFlag(source);

        if (typeof enable === "boolean") {
          draft.enable = enable;
        }

        if (appId) {
          draft.appId = appId;
        }

        if (secret) {
          draft.secret = secret;
        }

        return draft;
      }

      function sanitizeWecomEntry(rawEntry) {
        const source = isObject(rawEntry) ? rawEntry : {};
        const draft = {};
        const enable = readEnableFlag(source);

        if (typeof enable === "boolean") {
          draft.enable = enable;
        }

        return draft;
      }

      function sanitizeChannelsConfig(config) {
        const source = isObject(config) ? config : {};
        const next = {};

        const feishu = sanitizeFeishuEntry(source.feishu);
        if (Object.keys(feishu).length > 0) {
          next.feishu = feishu;
        }

        const wecom = sanitizeWecomEntry(resolveRawWecomEntry(source));
        if (Object.keys(wecom).length > 0) {
          next.wecom = wecom;
        }

        return next;
      }

      function sanitizeChannelDraft(specKey, draft) {
        if (specKey === "feishu") {
          return sanitizeFeishuEntry(draft);
        }
        if (specKey === "wecom") {
          return sanitizeWecomEntry(draft);
        }
        throw new Error(`未知渠道：${specKey}`);
      }

      function getChannelEntry(config, specKey) {
        const value = isObject(config[specKey]) ? config[specKey] : {};
        return { key: specKey, value };
      }

      function setChannelEntry(config, specKey, channel) {
        const channelObj = isObject(channel) ? channel : {};

        if (Object.keys(channelObj).length > 0) {
          config[specKey] = channelObj;
        } else {
          delete config[specKey];
        }
      }

      function isFilledValue(value) {
        if (typeof value === "string") {
          return value.trim().length > 0;
        }

        if (typeof value === "number") {
          return Number.isFinite(value);
        }

        if (typeof value === "boolean") {
          return value === true;
        }

        if (Array.isArray(value)) {
          return value.length > 0;
        }

        if (isObject(value)) {
          return Object.keys(value).length > 0;
        }

        return false;
      }

      function countConfiguredBySpec(channel, spec) {
        if (!isObject(channel)) {
          return 0;
        }

        let count = 0;
        for (const field of spec.fields) {
          const value = getPath(channel, field.path);
          if (isFilledValue(value)) {
            count += 1;
          }
        }
        return count;
      }

      function renderChannelCards() {
        channelListEl.innerHTML = CHANNEL_SPECS.map((spec) => {
          const iconClass = typeof spec.icon === "string" && spec.icon.trim() ? spec.icon : "fa-solid fa-comment-dots";
          return `
            <section class="rounded-lg border border-base-200 p-3" data-channel-card data-channel-key="${spec.key}">
              <div class="flex items-start justify-between gap-3">
                <div class="min-w-0">
                  <div class="flex items-center gap-2 text-sm font-medium">
                    <i class="${iconClass} w-4 text-center text-base-content/70" aria-hidden="true"></i>
                    <span>${spec.title}</span>
                  </div>
                  <div class="mt-1 text-[11px] text-base-content/60" data-channel-summary>未配置参数</div>
                </div>
                <div class="flex items-center gap-2">
                  <label class="label cursor-pointer gap-2 rounded-lg border border-base-200 px-2 py-1">
                    <span class="text-xs">开启</span>
                    <input class="toggle toggle-sm" type="checkbox" data-channel-enabled data-channel-key="${spec.key}" />
                  </label>
                  ${spec.fields.length > 0 ? `<button class="btn btn-outline btn-xs" type="button" data-action="open-config" data-channel-key="${spec.key}">配置参数</button>` : ""}
                </div>
              </div>
            </section>
          `;
        }).join("");
      }

      function getChannelCardElements(specKey) {
        const card = channelListEl.querySelector(`[data-channel-card][data-channel-key="${specKey}"]`);
        if (!card) {
          return null;
        }

        return {
          card,
          enabled: card.querySelector("[data-channel-enabled]"),
          summary: card.querySelector("[data-channel-summary]"),
        };
      }

      function updateCardState(spec, config) {
        const cardEls = getChannelCardElements(spec.key);
        if (!cardEls) {
          return;
        }

        const entry = getChannelEntry(config, spec.key);
        const channel = entry.value;
        const configured = countConfiguredBySpec(channel, spec);

        cardEls.enabled.checked = channel.enable === true;

        if (spec.fields.length === 0) {
          cardEls.summary.textContent = channel.enable === true ? "已开启" : "已关闭";
          return;
        }

        if (configured > 0) {
          cardEls.summary.textContent = `已配置 ${configured} 项参数`;
        } else {
          cardEls.summary.textContent = "未配置参数";
        }
      }

      function fillCardForm(config) {
        for (const spec of CHANNEL_SPECS) {
          updateCardState(spec, config);
        }
      }

      function findSpec(specKey) {
        const spec = specByKey.get(specKey);
        if (!spec) {
          throw new Error(`未知渠道：${specKey}`);
        }
        return spec;
      }

      function closeModal() {
        if (typeof modalEl.close === "function") {
          modalEl.close();
        } else {
          modalEl.removeAttribute("open");
        }
      }

      function showModal() {
        if (typeof modalEl.showModal === "function") {
          modalEl.showModal();
        } else {
          modalEl.setAttribute("open", "open");
        }
      }

      function renderModalField(specKey, field, draft) {
        const value = getPath(draft, field.path);
        const attrSpec = `data-modal-spec="${escapeHtml(specKey)}"`;
        const attrPath = `data-modal-field="${escapeHtml(field.path)}"`;
        const rowClass = "grid grid-cols-[170px_minmax(0,1fr)] items-start gap-3 rounded-lg border border-base-200 px-3 py-2";
        const labelClass = "pt-2 text-xs text-base-content/80";

        if (field.type === "boolean") {
          const checked = value === true ? "checked" : "";
          return `
            <div class="${rowClass}">
              <div class="${labelClass}">${escapeHtml(field.label)}</div>
              <label class="flex h-9 items-center">
                <input class="toggle toggle-sm" type="checkbox" ${attrSpec} ${attrPath} ${checked} />
              </label>
            </div>
          `;
        }

        if (field.type === "list") {
          const text = joinList(value);
          return `
            <div class="${rowClass}">
              <div class="${labelClass}">${escapeHtml(field.label)}</div>
              <textarea class="textarea textarea-bordered h-24 w-full font-mono text-xs" ${attrSpec} ${attrPath}>${escapeHtml(text)}</textarea>
            </div>
          `;
        }

        if (field.type === "select") {
          const current = typeof value === "string" ? value : "";
          const options = (field.options || []).map((option) => {
            const selected = option === current ? "selected" : "";
            const text = option || "默认";
            return `<option value="${escapeHtml(option)}" ${selected}>${escapeHtml(text)}</option>`;
          }).join("");

          return `
            <div class="${rowClass}">
              <div class="${labelClass}">${escapeHtml(field.label)}</div>
              <select class="select select-bordered select-sm w-full" ${attrSpec} ${attrPath}>${options}</select>
            </div>
          `;
        }

        if (field.type === "number") {
          const min = typeof field.min === "number" ? `min="${field.min}"` : "";
          const max = typeof field.max === "number" ? `max="${field.max}"` : "";
          const step = field.integer === false ? 'step="0.1"' : 'step="1"';
          const text = Number.isFinite(value) ? String(value) : "";

          return `
            <div class="${rowClass}">
              <div class="${labelClass}">${escapeHtml(field.label)}</div>
              <input class="input input-bordered input-sm w-full" type="number" ${min} ${max} ${step} value="${escapeHtml(text)}" ${attrSpec} ${attrPath} />
            </div>
          `;
        }

        const type = field.type === "password" ? "password" : "text";
        const text = typeof value === "string" ? value : "";
        return `
          <div class="${rowClass}">
            <div class="${labelClass}">${escapeHtml(field.label)}</div>
            <input class="input input-bordered input-sm w-full" type="${type}" value="${escapeHtml(text)}" ${attrSpec} ${attrPath} />
          </div>
        `;
      }

      function openChannelConfig(specKey) {
        const spec = findSpec(specKey);
        if (spec.fields.length === 0) {
          throw new Error(`${spec.title}仅支持开关，不需要额外参数`);
        }

        const entry = getChannelEntry(channelsConfig, spec.key);

        activeSpec = spec;
        activeDraft = cloneObject(entry.value);

        modalTitleEl.textContent = `${spec.title} 参数配置`;
        modalSubtitleEl.textContent = "仅展示当前可编辑参数。";
        modalFieldsEl.innerHTML = spec.fields.map((field) => renderModalField(spec.key, field, activeDraft)).join("");

        showModal();
      }

      function readModalField(field, inputEl, draft, specTitle) {
        let value;

        if (field.type === "boolean") {
          value = inputEl.checked;
        } else if (field.type === "list") {
          value = parseList(inputEl.value);
        } else if (field.type === "number") {
          value = parseNumberValue(inputEl.value, `${specTitle}.${field.path}`, field);
        } else {
          value = String(inputEl.value || "").trim();
        }

        const shouldDelete =
          value === undefined ||
          value === "" ||
          (Array.isArray(value) && value.length === 0) ||
          (isObject(value) && Object.keys(value).length === 0);

        if (shouldDelete) {
          deletePath(draft, field.path);
        } else {
          setPath(draft, field.path, value);
        }
      }

      function collectActiveModalDraft() {
        if (!activeSpec) {
          return null;
        }

        const nextDraft = cloneObject(activeDraft);

        for (const field of activeSpec.fields) {
          const fieldEl = modalFieldsEl.querySelector(`[data-modal-field="${field.path}"]`);
          if (!fieldEl) {
            continue;
          }

          readModalField(field, fieldEl, nextDraft, activeSpec.title);
        }

        return sanitizeChannelDraft(activeSpec.key, nextDraft);
      }

      function buildEnabledDraft(specKey, enabled) {
        const entry = getChannelEntry(channelsConfig, specKey);
        const draft = cloneObject(entry.value);
        delete draft.enabled;
        draft.enable = Boolean(enabled);
        return sanitizeChannelDraft(specKey, draft);
      }

      async function api(path, options = {}) {
        const res = await fetch(path, {
          headers: { "content-type": "application/json" },
          ...options,
        });

        const data = await res.json().catch(() => ({}));
        if (!res.ok || !data.ok) {
          const apiError = new Error(data.error || `请求失败: ${res.status}`);
          apiError.isApiError = true;
          throw apiError;
        }
        return data;
      }

      function readUserErrorMessage(error, fallback) {
        if (error && typeof error === "object" && error.isApiError === true) {
          return fallback;
        }
        const message = error instanceof Error ? String(error.message || "").trim() : "";
        return message || fallback;
      }

      function updateLocalChannelState(specKey, channelDraft) {
        setChannelEntry(channelsConfig, specKey, channelDraft);
        fillCardForm(channelsConfig);
      }

      async function saveChannelDraft(specKey, channelDraft) {
        const payload = sanitizeChannelDraft(specKey, channelDraft);
        const data = await api(`/api/config/channels/channel/${encodeURIComponent(specKey)}`, {
          method: "PATCH",
          body: JSON.stringify({ data: payload }),
        });
        const saved = sanitizeChannelDraft(specKey, data.data || payload);
        updateLocalChannelState(specKey, saved);
        return saved;
      }

      async function loadSection() {
        const data = await api(`/api/config/${SECTION}`);
        channelsConfig = sanitizeChannelsConfig(ensureObject(data.data || {}, SECTION));
        fillCardForm(channelsConfig);
        metaEl.textContent = `${SECTION} 已加载`;
      }

      channelListEl.addEventListener("click", (event) => {
        const btn = event.target.closest("[data-action='open-config']");
        if (!btn) {
          return;
        }

        const specKey = btn.getAttribute("data-channel-key");
        if (!specKey) {
          return;
        }

        try {
          openChannelConfig(specKey);
        } catch (error) {
          metaEl.textContent = readUserErrorMessage(error, "打开配置失败，请稍后重试。");
        }
      });

      channelListEl.addEventListener("change", async (event) => {
        const input = event.target.closest("[data-channel-enabled]");
        if (!input) {
          return;
        }

        const specKey = input.getAttribute("data-channel-key");
        if (!specKey) {
          return;
        }

        const previousChecked = getChannelEntry(channelsConfig, specKey).value.enable === true;
        input.disabled = true;
        try {
          const draft = buildEnabledDraft(specKey, Boolean(input.checked));
          await saveChannelDraft(specKey, draft);
          metaEl.textContent = `${findSpec(specKey).title} 开关已保存`;
        } catch (error) {
          input.checked = previousChecked;
          metaEl.textContent = readUserErrorMessage(error, "更新开关失败，请稍后重试。");
        } finally {
          input.disabled = false;
        }
      });

      modalSaveEl.addEventListener("click", async () => {
        modalSaveEl.disabled = true;
        try {
          if (!activeSpec) {
            throw new Error("当前没有可保存的渠道");
          }
          const nextDraft = collectActiveModalDraft();
          if (!nextDraft) {
            throw new Error("当前没有可保存的渠道");
          }
          await saveChannelDraft(activeSpec.key, nextDraft);
          metaEl.textContent = `${activeSpec.title} 参数已保存`;
          closeModal();
        } catch (error) {
          metaEl.textContent = readUserErrorMessage(error, "保存失败，请稍后重试。");
        } finally {
          modalSaveEl.disabled = false;
        }
      });

      const closeModalHandlers = [modalCloseEl, modalCancelEl];
      for (const el of closeModalHandlers) {
        el.addEventListener("click", () => {
          closeModal();
        });
      }

      document.querySelector('[data-action="reload"]').addEventListener("click", async (event) => {
        event.currentTarget.disabled = true;
        try {
          await loadSection();
        } catch (error) {
          metaEl.textContent = readUserErrorMessage(error, "加载失败，请检查服务后重试。");
        } finally {
          event.currentTarget.disabled = false;
        }
      });

      (async function init() {
        try {
          renderChannelCards();
          await loadSection();
        } catch (error) {
          metaEl.textContent = readUserErrorMessage(error, "初始化失败，请刷新页面重试。");
        }
      })();
    </script>
  </body>
</html>
