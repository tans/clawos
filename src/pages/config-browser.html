<!doctype html>
<html lang="zh-CN" data-theme="silk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ClawOS &#27983;&#35272;&#22120;</title>
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="/pages-shell.css" />
  </head>
  <body class="clawos-page-shell bg-base-100 text-base-content overflow-x-auto">
    <div class="grid min-h-screen min-w-[980px] grid-cols-[240px_1fr]">
      <aside class="flex flex-col gap-4 border-r border-base-200 bg-base-100 px-4 py-4">
        <div class="text-sm text-base-content/60">&#21152;&#36733;&#20013;...</div>
      </aside>

      <main class="flex min-h-screen flex-col">
        <header class="flex flex-wrap items-center justify-between gap-3 border-b border-base-200 px-6 py-4">
          <h1 class="text-lg font-semibold">&#27983;&#35272;&#22120;&#20462;&#22797;</h1>
        </header>

        <section class="flex-1 p-6">
          <section class="card card-compact border border-base-200 bg-base-100">
            <div class="card-body gap-4">
              <div class="flex flex-wrap items-center justify-between gap-3">
                <h2 class="card-title text-base">&#26816;&#27979;&#19982;&#20462;&#22797;</h2>
                <div class="flex flex-wrap gap-2">
                <button class="btn btn-outline btn-sm" data-browser-connectivity-check>&#26816;&#27979;</button>
                <button class="btn btn-primary btn-sm" data-browser-action="repair">&#20462;&#22797;</button>
              </div>
              </div>

              <div
                class="text-xs text-base-content/70 rounded-md border border-base-200 bg-base-200/20 px-3 py-2"
                data-browser-connectivity-status
              >
                &#31561;&#24453;&#26816;&#27979;...
              </div>
              <pre
                class="max-h-56 overflow-auto rounded-lg border border-base-200 bg-base-200/30 p-3 text-[11px] leading-5"
                data-browser-connectivity-output
              >&#26816;&#27979;&#35814;&#24773;&#20250;&#26174;&#31034;&#22312;&#36825;&#37324;...</pre>

              <div
                class="text-xs text-base-content/70 rounded-md border border-base-200 bg-base-200/20 px-3 py-2"
                data-browser-op-status
              >
                &#31561;&#24453;&#25191;&#34892;...
              </div>

              <div class="text-xs text-base-content/70" data-browser-task-meta>&#24403;&#21069;&#26080;&#20219;&#21153;</div>
              <progress class="progress progress-neutral hidden w-full" value="0" max="100" data-browser-task-progress></progress>
              <pre
                class="max-h-80 overflow-auto rounded-lg border border-base-200 bg-base-200/30 p-3 text-[11px] leading-5"
                data-browser-task-output
              >&#25805;&#20316;&#35760;&#24405;&#20250;&#26174;&#31034;&#22312;&#36825;&#37324;...</pre>
            </div>
          </section>
        </section>
      </main>
    </div>

    <script src="/sidebar-update.js"></script>

    <script>
      const browserOpStatusEl = document.querySelector("[data-browser-op-status]");
      const browserTaskMetaEl = document.querySelector("[data-browser-task-meta]");
      const browserTaskProgressEl = document.querySelector("[data-browser-task-progress]");
      const browserTaskOutputEl = document.querySelector("[data-browser-task-output]");
      const browserConnectivityStatusEl = document.querySelector("[data-browser-connectivity-status]");
      const browserConnectivityOutputEl = document.querySelector("[data-browser-connectivity-output]");
      const browserConnectivityCheckBtn = document.querySelector("[data-browser-connectivity-check]");
      let taskPollTimer = null;

      async function api(path, options = {}) {
        const res = await fetch(path, {
          headers: { "content-type": "application/json" },
          ...options,
        });

        const data = await res.json().catch(() => ({}));
        if (!res.ok || !data.ok) {
          const apiError = new Error(data.error || `\u8bf7\u6c42\u5931\u8d25: ${res.status}`);
          apiError.isApiError = true;
          throw apiError;
        }
        return data;
      }

      function readUserErrorMessage(error, fallback) {
        if (error && typeof error === "object" && error.isApiError === true) {
          return fallback;
        }
        const message = error instanceof Error ? String(error.message || "").trim() : "";
        return message || fallback;
      }

      function stopTaskPolling() {
        if (taskPollTimer) {
          clearInterval(taskPollTimer);
          taskPollTimer = null;
        }
      }

      function formatCheckTime(raw) {
        if (typeof raw !== "string" || !raw.trim()) {
          return "";
        }
        const time = new Date(raw);
        if (!Number.isFinite(time.getTime())) {
          return raw;
        }
        return time.toLocaleString("zh-CN", { hour12: false });
      }

      function connectivityStatusText(status) {
        switch (status) {
          case "ok":
            return "\u6b63\u5e38";
          case "local-only":
            return "\u4ec5\u672c\u673a\u53ef\u8fbe";
          case "cdp-only":
            return "\u4ec5\u8fdc\u7a0b\u5165\u53e3\u53ef\u8fbe";
          case "disabled":
            return "\u5df2\u7981\u7528";
          case "not-configured":
            return "\u672a\u914d\u7f6e";
          case "gateway-error":
            return "\u7f51\u5173\u5f02\u5e38";
          case "probe-error":
            return "\u8fde\u901a\u5931\u8d25";
          default:
            return "\u672a\u77e5";
        }
      }

      function renderBrowserConnectivity(info) {
        if (!(browserConnectivityStatusEl instanceof HTMLElement) || !(browserConnectivityOutputEl instanceof HTMLElement)) {
          return;
        }

        const mode = info?.mode === "local" ? "\u672c\u5730" : "CDP";
        const statusText = connectivityStatusText(info?.status);
        browserConnectivityStatusEl.textContent = `\u8fde\u901a\u72b6\u6001: ${statusText}\uff08\u6a21\u5f0f: ${mode}\uff09`;

        const lines = [
          `\u72b6\u6001: ${statusText}`,
          `\u6a21\u5f0f: ${mode}`,
          `\u542f\u7528: ${info?.enabled === false ? "\u5426" : "\u662f"}`,
          `\u5df2\u914d\u7f6e: ${info?.configured === true ? "\u662f" : "\u5426"}`,
        ];

        const checkedAt = formatCheckTime(info?.checkedAt);
        if (checkedAt) {
          lines.push(`\u68c0\u6d4b\u65f6\u95f4: ${checkedAt}`);
        }

        if (info?.cdpUrl) {
          lines.push(`cdpUrl: ${info.cdpUrl}`);
        }

        if (info?.direct127 && typeof info.direct127 === "object") {
          lines.push(
            `\u672c\u673a\u68c0\u6d4b: ${info.direct127.ok === true ? "\u6210\u529f" : "\u5931\u8d25"}${info.direct127.error ? ` (${info.direct127.error})` : ""}`
          );
        }

        if (info?.wslCdp && typeof info.wslCdp === "object") {
          lines.push(
            `WSL \u68c0\u6d4b: ${info.wslCdp.ok === true ? "\u6210\u529f" : "\u5931\u8d25"}${info.wslCdp.error ? ` (${info.wslCdp.error})` : ""}`
          );
          if (typeof info.wslCdp.command === "string" && info.wslCdp.command.trim()) {
            lines.push(`WSL \u547d\u4ee4: ${info.wslCdp.command}`);
          }
        }

        if (Array.isArray(info?.warnings) && info.warnings.length > 0) {
          lines.push("");
          lines.push("\u63d0\u793a:");
          for (const warning of info.warnings) {
            if (typeof warning === "string" && warning.trim()) {
              lines.push(`- ${warning.trim()}`);
            }
          }
        }

        browserConnectivityOutputEl.textContent = lines.join("\n");
        browserConnectivityOutputEl.scrollTop = browserConnectivityOutputEl.scrollHeight;
      }

      async function checkBrowserConnectivity(silent = false) {
        if (!(browserConnectivityStatusEl instanceof HTMLElement) || !(browserConnectivityOutputEl instanceof HTMLElement)) {
          return;
        }

        if (!silent) {
          browserConnectivityStatusEl.textContent = "\u8fde\u901a\u72b6\u6001: \u68c0\u6d4b\u4e2d...";
          browserConnectivityOutputEl.textContent = "\u6b63\u5728\u68c0\u6d4b\u6d4f\u89c8\u5668\u8fde\u901a\u6027...";
        }

        const data = await api("/api/system/browser/check");
        const info = data.info || {};
        renderBrowserConnectivity(info);
      }

      function renderTask(task) {
        const logs = Array.isArray(task?.logs) ? task.logs : [];
        const step = Number.isFinite(task?.step) ? task.step : 0;
        const totalSteps = Number.isFinite(task?.totalSteps) ? task.totalSteps : 0;
        const percent = totalSteps > 0 ? Math.round((step / totalSteps) * 100) : 0;
        const status = typeof task?.status === "string" ? task.status : "unknown";
        const title = typeof task?.title === "string" ? task.title : "\u672a\u77e5\u4efb\u52a1";
        const running = status === "running" || status === "pending";
        const statusText =
          status === "running" || status === "pending"
            ? "\u6267\u884c\u4e2d"
            : status === "success"
              ? "\u5df2\u5b8c\u6210"
              : status === "failed"
                ? "\u5931\u8d25"
                : "\u672a\u77e5";

        browserTaskProgressEl.value = percent;
        browserTaskProgressEl.classList.toggle("hidden", !running);
        browserTaskMetaEl.textContent = `${title}\uff0c${statusText}`;

        const lines = logs.map((item) => `[${item.timestamp}] ${String(item.level || "info").toUpperCase()} ${item.message}`);
        browserTaskOutputEl.textContent = lines.join("\n") || "\u6682\u65e0\u65e5\u5fd7";
        browserTaskOutputEl.scrollTop = browserTaskOutputEl.scrollHeight;
      }

      async function pollTask(taskId) {
        stopTaskPolling();

        const tick = async () => {
          try {
            const data = await api(`/api/tasks/${taskId}`);
            const task = data.task || {};
            renderTask(task);

            if (task.status === "success" || task.status === "failed") {
              stopTaskPolling();
              if (task.status === "success") {
                browserOpStatusEl.textContent = "\u64cd\u4f5c\u5b8c\u6210\u3002";
              } else {
                browserOpStatusEl.textContent = "\u64cd\u4f5c\u672a\u5b8c\u6210\uff0c\u8bf7\u7a0d\u540e\u91cd\u8bd5\u3002";
              }
            }
          } catch (error) {
            stopTaskPolling();
            browserTaskProgressEl.classList.add("hidden");
            browserTaskMetaEl.textContent = readUserErrorMessage(error, "\u72b6\u6001\u5237\u65b0\u5931\u8d25\uff0c\u8bf7\u7a0d\u540e\u91cd\u8bd5\u3002");
            browserOpStatusEl.textContent = readUserErrorMessage(error, "\u64cd\u4f5c\u5931\u8d25\uff0c\u8bf7\u7a0d\u540e\u91cd\u8bd5\u3002");
          }
        };

        await tick();
        taskPollTimer = setInterval(tick, 1000);
      }

      async function runBrowserAction(action) {
        const label = action === "repair" ? "\u4fee\u590d" : action;
        browserOpStatusEl.textContent = `\u6b63\u5728\u6267\u884c\uff1a${label}`;
        browserTaskOutputEl.textContent = "\u4efb\u52a1\u542f\u52a8\u4e2d...";
        browserTaskMetaEl.textContent = "\u4efb\u52a1\u542f\u52a8\u4e2d...";
        browserTaskProgressEl.classList.remove("hidden");
        browserTaskProgressEl.value = 0;

        const data = await api("/api/browser/action", {
          method: "POST",
          body: JSON.stringify({ action, confirmed: true }),
        });

        if (!data.taskId) {
          throw new Error("\u670d\u52a1\u7aef\u672a\u8fd4\u56de\u4efb\u52a1 ID");
        }

        if (data.reused) {
          browserOpStatusEl.textContent = `\u68c0\u6d4b\u5230\u540c\u7c7b\u4efb\u52a1\u6b63\u5728\u6267\u884c\uff0c\u5df2\u5207\u6362\u65e5\u5fd7\uff1a${label}`;
        }

        await pollTask(data.taskId);
      }

      function confirmBrowserAction(action) {
        if (
          action !== "repair" &&
          action !== "restart" &&
          action !== "restart-browser" &&
          action !== "restart-cdp" &&
          action !== "reset" &&
          action !== "reset-config"
        ) {
          return true;
        }

        return window.confirm(
          "\u6d4f\u89c8\u5668\u4fee\u590d\u4f1a\u91cd\u542f Chrome\uff0c\u5e76\u4fee\u6539 Windows \u7aef\u53e3\u4ee3\u7406\u548c\u9632\u706b\u5899\u3002\n\u5982\u679c\u5f53\u524d\u4e0d\u662f\u7ba1\u7406\u5458\u8fd0\u884c\uff0c\u63a5\u4e0b\u6765\u4f1a\u5f39\u51fa\u7cfb\u7edf\u6388\u6743\u7a97\u53e3\uff08UAC\uff09\u3002\n\u662f\u5426\u7ee7\u7eed\uff1f"
        );
      }

      document.querySelectorAll("[data-browser-action]").forEach((button) => {
        button.addEventListener("click", async () => {
          const action = button.getAttribute("data-browser-action");
          if (!action) {
            return;
          }

          if (!confirmBrowserAction(action)) {
            browserTaskProgressEl.classList.add("hidden");
            browserTaskMetaEl.textContent = "\u5df2\u53d6\u6d88\u672c\u6b21\u6d4f\u89c8\u5668\u4fee\u590d\u3002";
            browserOpStatusEl.textContent = "\u5df2\u53d6\u6d88\u672c\u6b21\u6d4f\u89c8\u5668\u4fee\u590d\u3002";
            return;
          }

          button.disabled = true;
          try {
            await runBrowserAction(action);
          } catch (error) {
            browserTaskProgressEl.classList.add("hidden");
            browserTaskMetaEl.textContent = readUserErrorMessage(error, "\u64cd\u4f5c\u5931\u8d25\uff0c\u8bf7\u7a0d\u540e\u91cd\u8bd5\u3002");
            browserOpStatusEl.textContent = readUserErrorMessage(error, "\u64cd\u4f5c\u5931\u8d25\uff0c\u8bf7\u7a0d\u540e\u91cd\u8bd5\u3002");
          } finally {
            button.disabled = false;
          }
        });
      });

      if (browserConnectivityCheckBtn instanceof HTMLButtonElement) {
        browserConnectivityCheckBtn.addEventListener("click", async () => {
          browserConnectivityCheckBtn.disabled = true;
          try {
            await checkBrowserConnectivity(false);
          } catch (error) {
            if (browserConnectivityStatusEl instanceof HTMLElement) {
              browserConnectivityStatusEl.textContent = readUserErrorMessage(error, "\u8fde\u901a\u6027\u68c0\u6d4b\u5931\u8d25\uff0c\u8bf7\u7a0d\u540e\u91cd\u8bd5\u3002");
            }
          } finally {
            browserConnectivityCheckBtn.disabled = false;
          }
        });
      }

      void checkBrowserConnectivity(true).catch((error) => {
        if (browserConnectivityStatusEl instanceof HTMLElement) {
          browserConnectivityStatusEl.textContent = readUserErrorMessage(error, "\u521d\u59cb\u5316\u8fde\u901a\u6027\u68c0\u6d4b\u5931\u8d25\u3002");
        }
      });
    </script>
  </body>
</html>
