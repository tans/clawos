<!doctype html>
<html lang="zh-CN" data-theme="silk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ClawOS 浏览器</title>
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.7.2/css/all.min.css" />
  </head>
  <body class="bg-base-100 text-base-content overflow-x-auto">
    <div class="grid min-h-screen min-w-[980px] grid-cols-[240px_1fr]">
      <aside class="flex flex-col gap-4 border-r border-base-200 bg-base-100 px-4 py-4">
        <div class="flex items-center justify-between gap-2 text-sm font-semibold">
          <div class="flex items-center gap-2">
            <span class="h-2 w-2 rounded-full bg-neutral" aria-hidden="true"></span>
            <span>ClawOS</span>
          </div>
          <button class="btn btn-ghost btn-xs gap-1" type="button" data-openclaw-entry>
            <i class="fa-solid fa-up-right-from-square text-[10px]" aria-hidden="true"></i>
            <span>Openclaw</span>
          </button>
        </div>
        <nav class="flex flex-col gap-2">
          <a class="btn btn-ghost btn-sm justify-start gap-2" href="/"><i class="fa-solid fa-gauge-high w-4 text-center" aria-hidden="true"></i><span>控制台</span></a>
          <a class="btn btn-ghost btn-sm justify-start gap-2" href="/config/channels"><i class="fa-solid fa-comments w-4 text-center" aria-hidden="true"></i><span>通讯渠道</span></a>
          <a class="btn btn-ghost btn-sm justify-start gap-2" href="/config/agents"><i class="fa-solid fa-brain w-4 text-center" aria-hidden="true"></i><span>大模型</span></a>
          <a class="btn btn-ghost btn-sm justify-start gap-2" href="/config/skills"><i class="fa-solid fa-graduation-cap w-4 text-center" aria-hidden="true"></i><span>技能学习</span></a>
          <a class="btn btn-primary btn-sm justify-start gap-2" href="/config/browser"><i class="fa-solid fa-globe w-4 text-center" aria-hidden="true"></i><span>浏览器</span></a>
          <a class="btn btn-ghost btn-sm justify-start gap-2" href="/config/gateway"><i class="fa-solid fa-power-off w-4 text-center" aria-hidden="true"></i><span>开机启动</span></a>
          <a class="btn btn-ghost btn-sm justify-start gap-2" href="/sessions"><i class="fa-solid fa-message w-4 text-center" aria-hidden="true"></i><span>会话</span></a>
        </nav>

        <div class="mt-auto border-t border-base-200 pt-3" data-app-update-widget>
          <div class="text-xs text-base-content/70">版本：<span data-app-version>v-</span></div>
          <button class="btn btn-primary btn-xs mt-2 hidden w-full" type="button" data-app-update-button>更新</button>
          <div class="mt-2 text-[11px] text-base-content/60" data-app-update-meta>正在检查更新...</div>
        </div>
      </aside>

      <main class="flex min-h-screen flex-col">
        <header class="flex flex-wrap items-center justify-between gap-3 border-b border-base-200 px-6 py-4">
          <h1 class="text-lg font-semibold">浏览器</h1>
          <div class="flex flex-wrap items-center gap-2">
            <label class="label cursor-pointer gap-2 rounded-lg border border-base-200 px-3 py-1">
              <span class="text-xs">JSON 编辑</span>
              <input class="toggle toggle-xs" type="checkbox" data-mode-toggle />
            </label>
            <button class="btn btn-outline btn-xs" data-action="reload">重新加载</button>
            <button class="btn btn-primary btn-xs" data-action="save">保存配置</button>
          </div>
        </header>

        <section class="flex-1 p-6">
          <section class="grid gap-4 xl:grid-cols-2" data-card-editor>
            <div class="card card-compact border border-base-200 bg-base-100">
              <div class="card-body gap-4">
                <h2 class="card-title text-base">基础开关</h2>

                <label class="flex items-center justify-between rounded-lg border border-base-200 px-3 py-2">
                  <span class="text-xs">browser.enabled</span>
                  <input class="toggle toggle-sm" type="checkbox" data-field="enabled" />
                </label>

                <label class="flex items-center justify-between rounded-lg border border-base-200 px-3 py-2">
                  <span class="text-xs">browser.useChrome</span>
                  <input class="toggle toggle-sm" type="checkbox" data-field="useChrome" />
                </label>

                <label class="flex items-center justify-between rounded-lg border border-base-200 px-3 py-2">
                  <span class="text-xs">browser.headless</span>
                  <input class="toggle toggle-sm" type="checkbox" data-field="headless" />
                </label>

                <div class="text-[11px] text-base-content/60">
                  根据官方文档，`enabled/useChrome/headless` 为布尔字段，适合直接开关配置。
                </div>
              </div>
            </div>

            <div class="card card-compact border border-base-200 bg-base-100">
              <div class="card-body gap-3">
                <h2 class="card-title text-base">连接参数</h2>

                <label class="form-control gap-1">
                  <span class="label-text text-xs">browser.cdpEndpoint</span>
                  <input class="input input-bordered input-sm" type="text" placeholder="ws://127.0.0.1:9222/devtools/browser/..." data-field="cdpEndpoint" />
                </label>

                <div class="grid gap-2 sm:grid-cols-2">
                  <label class="form-control gap-1">
                    <span class="label-text text-xs">browser.host</span>
                    <input class="input input-bordered input-sm" type="text" placeholder="127.0.0.1" data-field="host" />
                  </label>
                  <label class="form-control gap-1">
                    <span class="label-text text-xs">browser.port</span>
                    <input class="input input-bordered input-sm" type="number" min="1" max="65535" placeholder="9222" data-field="port" />
                  </label>
                </div>

                <label class="form-control gap-1">
                  <span class="label-text text-xs">browser.debugPort</span>
                  <input class="input input-bordered input-sm" type="number" min="1" max="65535" placeholder="9223" data-field="debugPort" />
                </label>
              </div>
            </div>

            <div class="card card-compact border border-base-200 bg-base-100 xl:col-span-2">
              <div class="card-body gap-2">
                <h2 class="card-title text-base">启动参数</h2>
                <label class="form-control gap-1">
                  <span class="label-text text-xs">browser.args（一行一个参数）</span>
                  <textarea class="textarea textarea-bordered h-36 font-mono text-xs" placeholder="--no-sandbox
--disable-dev-shm-usage" data-field="args"></textarea>
                </label>
                <div class="text-[11px] text-base-content/60">会保存为字符串数组，例如 `["--no-sandbox", "--disable-dev-shm-usage"]`。</div>
              </div>
            </div>
          </section>

          <section class="hidden card card-compact border border-base-200 bg-base-100" data-json-editor>
            <div class="card-body gap-3">
              <h2 class="card-title text-base">browser JSON（高级模式）</h2>
              <textarea class="textarea textarea-bordered h-[62vh] w-full font-mono text-xs" data-json-input></textarea>
            </div>
          </section>

          <div class="mt-3 text-xs text-base-content/70" data-meta>尚未加载</div>
        </section>
      </main>
    </div>

    <script src="/sidebar-update.js"></script>

    <script>
      const SECTION = "browser";

      const metaEl = document.querySelector("[data-meta]");
      const modeToggle = document.querySelector("[data-mode-toggle]");
      const cardEditorEl = document.querySelector("[data-card-editor]");
      const jsonEditorEl = document.querySelector("[data-json-editor]");
      const jsonInputEl = document.querySelector("[data-json-input]");

      const fieldEls = {
        enabled: document.querySelector('[data-field="enabled"]'),
        useChrome: document.querySelector('[data-field="useChrome"]'),
        headless: document.querySelector('[data-field="headless"]'),
        cdpEndpoint: document.querySelector('[data-field="cdpEndpoint"]'),
        host: document.querySelector('[data-field="host"]'),
        port: document.querySelector('[data-field="port"]'),
        debugPort: document.querySelector('[data-field="debugPort"]'),
        args: document.querySelector('[data-field="args"]'),
      };

      let browserConfig = {};
      let mode = "card";

      function pretty(value) {
        return JSON.stringify(value || {}, null, 2);
      }

      function isObject(value) {
        return Boolean(value) && typeof value === "object" && !Array.isArray(value);
      }

      function ensureObject(value, field) {
        if (!isObject(value)) {
          throw new Error(`${field} 必须是 JSON 对象`);
        }
        return value;
      }

      function parseJsonObject(text, field) {
        const raw = String(text || "").trim();
        if (!raw) {
          return {};
        }

        let parsed;
        try {
          parsed = JSON.parse(raw);
        } catch (error) {
          throw new Error(`${field} JSON 格式错误: ${error.message}`);
        }
        return ensureObject(parsed, field);
      }

      function cloneObject(value) {
        return JSON.parse(JSON.stringify(value || {}));
      }

      function parsePort(raw, field) {
        const trimmed = String(raw || "").trim();
        if (!trimmed) {
          return undefined;
        }

        const n = Number(trimmed);
        if (!Number.isInteger(n) || n < 1 || n > 65535) {
          throw new Error(`${field} 必须是 1-65535 的整数`);
        }

        return n;
      }

      function parseArgs(text) {
        const list = String(text || "")
          .split("\n")
          .map((item) => item.trim())
          .filter(Boolean);
        return list;
      }

      function joinArgs(value) {
        if (Array.isArray(value)) {
          return value
            .map((item) => (typeof item === "string" ? item.trim() : ""))
            .filter(Boolean)
            .join("\n");
        }
        return "";
      }

      function renderMode() {
        const jsonMode = mode === "json";
        cardEditorEl.classList.toggle("hidden", jsonMode);
        jsonEditorEl.classList.toggle("hidden", !jsonMode);
        modeToggle.checked = jsonMode;
      }

      function fillCardForm(config) {
        fieldEls.enabled.checked = config.enabled === true;
        fieldEls.useChrome.checked = config.useChrome === true;
        fieldEls.headless.checked = config.headless === true;

        fieldEls.cdpEndpoint.value = typeof config.cdpEndpoint === "string" ? config.cdpEndpoint : "";
        fieldEls.host.value = typeof config.host === "string" ? config.host : "";
        fieldEls.port.value = Number.isFinite(config.port) ? String(config.port) : "";
        fieldEls.debugPort.value = Number.isFinite(config.debugPort) ? String(config.debugPort) : "";
        fieldEls.args.value = joinArgs(config.args);
      }

      function buildCardConfig(baseConfig) {
        const next = isObject(baseConfig) ? cloneObject(baseConfig) : {};

        next.enabled = Boolean(fieldEls.enabled.checked);
        next.useChrome = Boolean(fieldEls.useChrome.checked);
        next.headless = Boolean(fieldEls.headless.checked);

        const cdpEndpoint = String(fieldEls.cdpEndpoint.value || "").trim();
        if (cdpEndpoint) {
          const schemeOk = ["ws://", "wss://", "http://", "https://"].some((prefix) => cdpEndpoint.startsWith(prefix));
          if (!schemeOk) {
            throw new Error("browser.cdpEndpoint 必须以 ws://、wss://、http:// 或 https:// 开头");
          }
          next.cdpEndpoint = cdpEndpoint;
        } else {
          delete next.cdpEndpoint;
        }

        const host = String(fieldEls.host.value || "").trim();
        if (host) {
          next.host = host;
        } else {
          delete next.host;
        }

        const port = parsePort(fieldEls.port.value, "browser.port");
        if (typeof port === "number") {
          next.port = port;
        } else {
          delete next.port;
        }

        const debugPort = parsePort(fieldEls.debugPort.value, "browser.debugPort");
        if (typeof debugPort === "number") {
          next.debugPort = debugPort;
        } else {
          delete next.debugPort;
        }

        const args = parseArgs(fieldEls.args.value);
        if (args.length > 0) {
          next.args = args;
        } else {
          delete next.args;
        }

        return next;
      }

      async function api(path, options = {}) {
        const res = await fetch(path, {
          headers: { "content-type": "application/json" },
          ...options,
        });

        const data = await res.json().catch(() => ({}));
        if (!res.ok || !data.ok) {
          throw new Error(data.error || `请求失败: ${res.status}`);
        }
        return data;
      }

      async function loadSection() {
        const data = await api(`/api/config/${SECTION}`);
        browserConfig = ensureObject(data.data || {}, SECTION);
        fillCardForm(browserConfig);
        jsonInputEl.value = pretty(browserConfig);
        metaEl.textContent = `${SECTION} 已加载`;
      }

      function enterJsonMode() {
        const draft = buildCardConfig(browserConfig);
        browserConfig = draft;
        jsonInputEl.value = pretty(draft);
        mode = "json";
        renderMode();
      }

      function leaveJsonMode() {
        const parsed = parseJsonObject(jsonInputEl.value, SECTION);
        browserConfig = parsed;
        fillCardForm(parsed);
        mode = "card";
        renderMode();
      }

      async function saveSection() {
        const payload = mode === "json" ? parseJsonObject(jsonInputEl.value, SECTION) : buildCardConfig(browserConfig);

        await api(`/api/config/${SECTION}`, {
          method: "PUT",
          body: JSON.stringify({ data: payload }),
        });

        browserConfig = payload;
        fillCardForm(payload);
        jsonInputEl.value = pretty(payload);
        metaEl.textContent = `${SECTION} 配置已保存`;
      }

      modeToggle.addEventListener("change", (event) => {
        const enabled = Boolean(event.currentTarget.checked);
        try {
          if (enabled) {
            enterJsonMode();
          } else {
            leaveJsonMode();
          }
          metaEl.textContent = enabled ? "已切换到 JSON 编辑" : "已切换到表单编辑";
        } catch (error) {
          modeToggle.checked = mode === "json";
          metaEl.textContent = `切换失败: ${error.message}`;
        }
      });

      document.querySelector('[data-action="reload"]').addEventListener("click", async (event) => {
        event.currentTarget.disabled = true;
        try {
          await loadSection();
          mode = "card";
          renderMode();
        } catch (error) {
          metaEl.textContent = `加载失败: ${error.message}`;
        } finally {
          event.currentTarget.disabled = false;
        }
      });

      document.querySelector('[data-action="save"]').addEventListener("click", async (event) => {
        event.currentTarget.disabled = true;
        try {
          await saveSection();
        } catch (error) {
          metaEl.textContent = `保存失败: ${error.message}`;
        } finally {
          event.currentTarget.disabled = false;
        }
      });

      (async function init() {
        try {
          renderMode();
          await loadSection();
        } catch (error) {
          metaEl.textContent = `初始化失败: ${error.message}`;
        }
      })();
    </script>
  </body>
</html>
