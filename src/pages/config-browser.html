<!doctype html>
<html lang="zh-CN" data-theme="silk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ClawOS 娴忚鍣?/title>
    <link rel="stylesheet" href="/styles.css" />
</head>
  <body class="bg-base-100 text-base-content overflow-x-auto">
    <div class="grid min-h-screen min-w-[980px] grid-cols-[240px_1fr]">
      <aside class="flex flex-col gap-4 border-r border-base-200 bg-base-100 px-4 py-4">
        <div class="text-sm text-base-content/60">鍔犺浇涓?..</div>
      </aside>

      <main class="flex min-h-screen flex-col">
        <header class="flex flex-wrap items-center justify-between gap-3 border-b border-base-200 px-6 py-4">
          <h1 class="text-lg font-semibold">娴忚鍣ㄤ慨澶?/h1>
        </header>

        <section class="flex-1 p-6">
          <div class="grid gap-4">
          <section class="card card-compact border border-base-200 bg-base-100">
            <div class="card-body gap-4">
              <h2 class="card-title text-base">娴忚鍣ㄨ繛閫氭€?/h2>
              <div class="text-xs text-base-content/70">妫€娴嬫湰鏈轰笌 WSL 瀵规祻瑙堝櫒 CDP 鐨勮繛閫氭儏鍐碉紝渚夸簬瀹氫綅鈥滄祻瑙堝櫒涓嶅彲鐢ㄢ€濋棶棰樸€?/div>

              <div class="flex flex-wrap gap-2">
                <button class="btn btn-outline btn-sm" data-browser-connectivity-check>妫€鏌ユ祻瑙堝櫒杩為€氭€?/button>
              </div>

              <div class="text-xs text-base-content/70 rounded-md border border-base-200 bg-base-200/20 px-3 py-2" data-browser-connectivity-status>
                绛夊緟妫€娴?..
              </div>
              <pre class="max-h-56 overflow-auto rounded-lg border border-base-200 bg-base-200/30 p-3 text-[11px] leading-5" data-browser-connectivity-output>妫€娴嬭鎯呬細鏄剧ず鍦ㄨ繖閲?..</pre>
            </div>
          </section>

          <section class="card card-compact border border-base-200 bg-base-100">
            <div class="card-body gap-4">
              <h2 class="card-title text-base">甯哥敤鎿嶄綔</h2>
              <div class="text-xs text-base-content/70">閬囧埌娴忚鍣ㄩ棶棰樻椂锛屽厛鐐光€滈噸鍚祻瑙堝櫒鈥濓紝浠嶄笉琛屽啀鐐光€滈噸缃祻瑙堝櫒璁剧疆鈥濄€?/div>

              <div class="flex flex-wrap gap-2">
                <button class="btn btn-primary btn-sm" data-browser-action="restart-browser">閲嶅惎娴忚鍣?/button>
                <button class="btn btn-outline btn-sm" data-browser-action="reset-config">閲嶇疆娴忚鍣ㄨ缃?/button>
              </div>

              <div class="text-xs text-base-content/70 rounded-md border border-base-200 bg-base-200/20 px-3 py-2" data-browser-op-status>
                绛夊緟鎵ц...
              </div>

              <div class="text-xs text-base-content/70" data-browser-task-meta>褰撳墠鏃犱换鍔?/div>
              <progress class="progress progress-neutral w-full hidden" value="0" max="100" data-browser-task-progress></progress>
              <pre class="max-h-80 overflow-auto rounded-lg border border-base-200 bg-base-200/30 p-3 text-[11px] leading-5" data-browser-task-output>鎿嶄綔璁板綍浼氭樉绀哄湪杩欓噷...</pre>
            </div>
          </section>
          </div>
        </section>
      </main>
    </div>

    <script src="/sidebar-update.js"></script>

    <script>
      const browserOpStatusEl = document.querySelector("[data-browser-op-status]");
      const browserTaskMetaEl = document.querySelector("[data-browser-task-meta]");
      const browserTaskProgressEl = document.querySelector("[data-browser-task-progress]");
      const browserTaskOutputEl = document.querySelector("[data-browser-task-output]");
      const browserConnectivityStatusEl = document.querySelector("[data-browser-connectivity-status]");
      const browserConnectivityOutputEl = document.querySelector("[data-browser-connectivity-output]");
      const browserConnectivityCheckBtn = document.querySelector("[data-browser-connectivity-check]");
      let taskPollTimer = null;

      async function api(path, options = {}) {
        const res = await fetch(path, {
          headers: { "content-type": "application/json" },
          ...options,
        });

        const data = await res.json().catch(() => ({}));
        if (!res.ok || !data.ok) {
          const apiError = new Error(data.error || `璇锋眰澶辫触: ${res.status}`);
          apiError.isApiError = true;
          throw apiError;
        }
        return data;
      }

      function readUserErrorMessage(error, fallback) {
        if (error && typeof error === "object" && error.isApiError === true) {
          return fallback;
        }
        const message = error instanceof Error ? String(error.message || "").trim() : "";
        return message || fallback;
      }

      function stopTaskPolling() {
        if (taskPollTimer) {
          clearInterval(taskPollTimer);
          taskPollTimer = null;
        }
      }

      function formatCheckTime(raw) {
        if (typeof raw !== "string" || !raw.trim()) {
          return "";
        }
        const time = new Date(raw);
        if (!Number.isFinite(time.getTime())) {
          return raw;
        }
        return time.toLocaleString("zh-CN", { hour12: false });
      }

      function connectivityStatusText(status) {
        switch (status) {
          case "ok":
            return "姝ｅ父";
          case "local-only":
            return "浠呮湰鏈虹洿杩?;
          case "cdp-only":
            return "浠呮湇鍔′晶杩為€?;
          case "disabled":
            return "宸茬鐢?;
          case "not-configured":
            return "鏈厤缃?;
          case "gateway-error":
            return "缃戝叧寮傚父";
          case "probe-error":
            return "杩為€氬け璐?;
          default:
            return "鏈煡";
        }
      }

      function renderBrowserConnectivity(info) {
        if (!(browserConnectivityStatusEl instanceof HTMLElement) || !(browserConnectivityOutputEl instanceof HTMLElement)) {
          return;
        }

        const mode = info?.mode === "local" ? "鏈湴" : "CDP";
        const statusText = connectivityStatusText(info?.status);
        browserConnectivityStatusEl.textContent = `杩為€氱姸鎬? ${statusText}锛堟ā寮? ${mode}锛塦;

        const lines = [
          `鐘舵€? ${statusText}`,
          `妯″紡: ${mode}`,
          `鍚敤: ${info?.enabled === false ? "鍚? : "鏄?}`,
          `宸查厤缃? ${info?.configured === true ? "鏄? : "鍚?}`,
        ];

        const checkedAt = formatCheckTime(info?.checkedAt);
        if (checkedAt) {
          lines.push(`妫€娴嬫椂闂? ${checkedAt}`);
        }

        if (info?.cdpUrl) {
          lines.push(`cdpUrl: ${info.cdpUrl}`);
        }

        if (info?.direct127 && typeof info.direct127 === "object") {
          lines.push(
            `鏈満127妫€娴? ${info.direct127.ok === true ? "鎴愬姛" : "澶辫触"}${info.direct127.error ? ` (${info.direct127.error})` : ""}`
          );
        }

        if (info?.wslCdp && typeof info.wslCdp === "object") {
          lines.push(
            `WSL妫€娴? ${info.wslCdp.ok === true ? "鎴愬姛" : "澶辫触"}${info.wslCdp.error ? ` (${info.wslCdp.error})` : ""}`
          );
          if (typeof info.wslCdp.command === "string" && info.wslCdp.command.trim()) {
            lines.push(`WSL鍛戒护: ${info.wslCdp.command}`);
          }
        }

        if (Array.isArray(info?.warnings) && info.warnings.length > 0) {
          lines.push("");
          lines.push("鍛婅:");
          for (const warning of info.warnings) {
            if (typeof warning === "string" && warning.trim()) {
              lines.push(`- ${warning.trim()}`);
            }
          }
        }

        browserConnectivityOutputEl.textContent = lines.join("\n");
        browserConnectivityOutputEl.scrollTop = browserConnectivityOutputEl.scrollHeight;
      }

      async function checkBrowserConnectivity(silent = false) {
        if (!(browserConnectivityStatusEl instanceof HTMLElement) || !(browserConnectivityOutputEl instanceof HTMLElement)) {
          return;
        }

        if (!silent) {
          browserConnectivityStatusEl.textContent = "杩為€氱姸鎬? 妫€娴嬩腑...";
          browserConnectivityOutputEl.textContent = "姝ｅ湪妫€娴嬫祻瑙堝櫒杩為€氭€?..";
        }

        const data = await api("/api/system/browser/check");
        const info = data.info || {};
        renderBrowserConnectivity(info);
      }

      function renderTask(task) {
        const logs = Array.isArray(task?.logs) ? task.logs : [];
        const step = Number.isFinite(task?.step) ? task.step : 0;
        const totalSteps = Number.isFinite(task?.totalSteps) ? task.totalSteps : 0;
        const percent = totalSteps > 0 ? Math.round((step / totalSteps) * 100) : 0;
        const status = typeof task?.status === "string" ? task.status : "unknown";
        const title = typeof task?.title === "string" ? task.title : "鏈煡浠诲姟";
        const running = status === "running" || status === "pending";
        const statusText =
          status === "running" || status === "pending"
            ? "鎵ц涓?
            : status === "success"
              ? "宸插畬鎴?
              : status === "failed"
                ? "澶辫触"
                : "鏈煡";

        browserTaskProgressEl.value = percent;
        browserTaskProgressEl.classList.toggle("hidden", !running);
        browserTaskMetaEl.textContent = `${title}锛?{statusText}锛塦;

        const lines = logs.map((item) => `[${item.timestamp}] ${String(item.level || "info").toUpperCase()} ${item.message}`);
        browserTaskOutputEl.textContent = lines.join("\n") || "鏆傛棤鏃ュ織";
        browserTaskOutputEl.scrollTop = browserTaskOutputEl.scrollHeight;
      }

      async function pollTask(taskId) {
        stopTaskPolling();

        const tick = async () => {
          try {
            const data = await api(`/api/tasks/${taskId}`);
            const task = data.task || {};
            renderTask(task);

            if (task.status === "success" || task.status === "failed") {
              stopTaskPolling();
              if (task.status === "success") {
                browserOpStatusEl.textContent = "鎿嶄綔瀹屾垚銆?;
              } else {
                browserOpStatusEl.textContent = "鎿嶄綔鏈畬鎴愶紝璇风◢鍚庨噸璇曘€?;
              }
            }
          } catch (error) {
            stopTaskPolling();
            browserTaskProgressEl.classList.add("hidden");
            browserTaskMetaEl.textContent = readUserErrorMessage(error, "鐘舵€佸埛鏂板け璐ワ紝璇风◢鍚庨噸璇曘€?);
            browserOpStatusEl.textContent = readUserErrorMessage(error, "鎿嶄綔澶辫触锛岃绋嶅悗閲嶈瘯銆?);
          }
        };

        await tick();
        taskPollTimer = setInterval(tick, 1000);
      }

      async function runBrowserAction(action) {
        const label = action === "restart-browser" ? "閲嶅惎娴忚鍣? : "閲嶇疆娴忚鍣ㄨ缃?;
        browserOpStatusEl.textContent = `姝ｅ湪鎵ц锛?{label}`;
        browserTaskOutputEl.textContent = "浠诲姟鍚姩涓?..";
        browserTaskMetaEl.textContent = "浠诲姟鍚姩涓?..";
        browserTaskProgressEl.classList.remove("hidden");
        browserTaskProgressEl.value = 0;

        const data = await api("/api/browser/action", {
          method: "POST",
          body: JSON.stringify({ action }),
        });

        if (!data.taskId) {
          throw new Error("鏈嶅姟绔湭杩斿洖浠诲姟 ID");
        }

        if (data.reused) {
          browserOpStatusEl.textContent = `妫€娴嬪埌鍚岀被浠诲姟鍦ㄦ墽琛岋紝宸插垏鎹㈡棩蹇楋細${label}`;
        }

        await pollTask(data.taskId);
      }

      document.querySelectorAll("[data-browser-action]").forEach((button) => {
        button.addEventListener("click", async () => {
          const action = button.getAttribute("data-browser-action");
          if (!action) {
            return;
          }

          button.disabled = true;
          try {
            await runBrowserAction(action);
          } catch (error) {
            browserTaskProgressEl.classList.add("hidden");
            browserTaskMetaEl.textContent = readUserErrorMessage(error, "鎿嶄綔澶辫触锛岃绋嶅悗閲嶈瘯銆?);
            browserOpStatusEl.textContent = readUserErrorMessage(error, "鎿嶄綔澶辫触锛岃绋嶅悗閲嶈瘯銆?);
          } finally {
            button.disabled = false;
          }
        });
      });

      if (browserConnectivityCheckBtn instanceof HTMLButtonElement) {
        browserConnectivityCheckBtn.addEventListener("click", async () => {
          browserConnectivityCheckBtn.disabled = true;
          try {
            await checkBrowserConnectivity(false);
          } catch (error) {
            if (browserConnectivityStatusEl instanceof HTMLElement) {
              browserConnectivityStatusEl.textContent = readUserErrorMessage(error, "杩為€氭€ф娴嬪け璐ワ紝璇风◢鍚庨噸璇曘€?);
            }
          } finally {
            browserConnectivityCheckBtn.disabled = false;
          }
        });
      }

      void checkBrowserConnectivity(true).catch((error) => {
        if (browserConnectivityStatusEl instanceof HTMLElement) {
          browserConnectivityStatusEl.textContent = readUserErrorMessage(error, "鍒濆鍖栬繛閫氭€ф娴嬪け璐ャ€?);
        }
      });
    </script>
  </body>
</html>
