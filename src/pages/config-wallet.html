<!doctype html>
<html lang="zh-CN" data-theme="silk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ClawOS 閽卞寘</title>
    <link rel="stylesheet" href="/styles.css" />
</head>
  <body class="bg-base-100 text-base-content overflow-x-auto">
    <div class="grid min-h-screen min-w-[980px] grid-cols-[240px_1fr]">
      <aside class="flex flex-col gap-4 border-r border-base-200 bg-base-100 px-4 py-4">
        <div class="text-sm text-base-content/60">鍔犺浇涓?..</div>
      </aside>

      <main class="flex min-h-screen flex-col">
        <header class="flex flex-wrap items-center justify-between gap-3 border-b border-base-200 px-6 py-4">
          <h1 class="text-lg font-semibold">閽卞寘</h1>
        </header>

        <section class="flex-1 p-6">
          <div class="card card-compact border border-base-200 bg-base-100">
            <div class="card-body gap-4">
              <h2 class="card-title text-base">鏈湴閽卞寘</h2>
              <div class="flex flex-wrap gap-2">
                <button class="btn btn-primary btn-sm" type="button" data-action="generate-wallet">鐢熸垚閽卞寘</button>
                <button class="btn btn-outline btn-sm" type="button" data-action="reload-wallet">鍒锋柊</button>
              </div>

              <div class="grid gap-2 text-sm">
                <div class="rounded-lg border border-base-200 bg-base-200/20 px-3 py-2">
                  <div class="text-xs text-base-content/60">閽卞寘鍦板潃</div>
                  <div class="font-mono break-all" data-wallet-address>-</div>
                </div>
                <div class="rounded-lg border border-base-200 bg-base-200/20 px-3 py-2">
                  <div class="text-xs text-base-content/60">鍒涘缓鏃堕棿</div>
                  <div class="font-mono" data-wallet-created>-</div>
                </div>
              </div>

              <div class="rounded-lg border border-base-200 bg-base-200/10 p-3">
                <div class="mb-2 text-sm font-semibold">浣欓</div>
                <div class="grid gap-3 xl:grid-cols-3">
                  <div class="rounded-lg border border-base-200 bg-base-100 px-3 py-3">
                    <div class="text-xs font-semibold text-base-content/80">ETH 涓荤綉</div>
                    <div class="mt-2 text-xs text-base-content/60">ETH</div>
                    <div class="font-mono text-sm" data-balance="eth-native">-</div>
                    <div class="mt-2 text-xs text-base-content/60">USDT</div>
                    <div class="font-mono text-sm" data-balance="eth-usdt">-</div>
                    <div class="mt-2 text-[11px] text-error/80" data-balance-error="eth"></div>
                  </div>

                  <div class="rounded-lg border border-base-200 bg-base-100 px-3 py-3">
                    <div class="text-xs font-semibold text-base-content/80">BSC</div>
                    <div class="mt-2 text-xs text-base-content/60">BNB</div>
                    <div class="font-mono text-sm" data-balance="bsc-native">-</div>
                    <div class="mt-2 text-xs text-base-content/60">USDT</div>
                    <div class="font-mono text-sm" data-balance="bsc-usdt">-</div>
                    <div class="mt-2 text-[11px] text-error/80" data-balance-error="bsc"></div>
                  </div>

                  <div class="rounded-lg border border-base-200 bg-base-100 px-3 py-3">
                    <div class="text-xs font-semibold text-base-content/80">Base</div>
                    <div class="mt-2 text-xs text-base-content/60">ETH</div>
                    <div class="font-mono text-sm" data-balance="base-native">-</div>
                    <div class="mt-2 text-xs text-base-content/60">USDT</div>
                    <div class="font-mono text-sm" data-balance="base-usdt">-</div>
                    <div class="mt-2 text-[11px] text-error/80" data-balance-error="base"></div>
                  </div>
                </div>
                <div class="mt-2 text-[11px] text-base-content/60" data-balance-updated>灏氭湭鏌ヨ</div>
              </div>

              <div class="hidden rounded-lg border border-warning/40 bg-warning/10 px-3 py-3" data-wallet-secret-wrap>
                <div class="mb-1 text-xs font-semibold text-warning">鏈鐢熸垚绉侀挜锛堜粎鏈杩斿洖锛?/div>
                <textarea class="textarea textarea-bordered h-20 w-full font-mono text-xs" readonly data-wallet-privatekey></textarea>
              </div>

              <div class="text-xs text-base-content/70" data-wallet-meta>姝ｅ湪璇诲彇閽卞寘鐘舵€?..</div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="/sidebar-update.js"></script>

    <script>
      const addressEl = document.querySelector("[data-wallet-address]");
      const createdEl = document.querySelector("[data-wallet-created]");
      const metaEl = document.querySelector("[data-wallet-meta]");
      const balanceUpdatedEl = document.querySelector("[data-balance-updated]");
      const secretWrapEl = document.querySelector("[data-wallet-secret-wrap]");
      const privateKeyEl = document.querySelector("[data-wallet-privatekey]");
      const generateBtn = document.querySelector('[data-action="generate-wallet"]');
      const reloadBtn = document.querySelector('[data-action="reload-wallet"]');
      let walletExists = false;

      const balanceEls = {
        eth: {
          native: document.querySelector('[data-balance="eth-native"]'),
          usdt: document.querySelector('[data-balance="eth-usdt"]'),
          error: document.querySelector('[data-balance-error="eth"]'),
        },
        bsc: {
          native: document.querySelector('[data-balance="bsc-native"]'),
          usdt: document.querySelector('[data-balance="bsc-usdt"]'),
          error: document.querySelector('[data-balance-error="bsc"]'),
        },
        base: {
          native: document.querySelector('[data-balance="base-native"]'),
          usdt: document.querySelector('[data-balance="base-usdt"]'),
          error: document.querySelector('[data-balance-error="base"]'),
        },
      };

      async function api(path, options = {}) {
        const res = await fetch(path, {
          headers: { "content-type": "application/json" },
          ...options,
        });

        const data = await res.json().catch(() => ({}));
        if (!res.ok || !data.ok) {
          const apiError = new Error(data.error || `璇锋眰澶辫触: ${res.status}`);
          apiError.isApiError = true;
          throw apiError;
        }
        return data;
      }

      function readUserErrorMessage(error, fallback) {
        if (error && typeof error === "object" && error.isApiError === true) {
          return fallback;
        }
        const message = error instanceof Error ? String(error.message || "").trim() : "";
        return message || fallback;
      }

      function formatCreatedAt(iso) {
        if (typeof iso !== "string" || iso.trim().length === 0) {
          return "-";
        }
        const date = new Date(iso);
        if (Number.isNaN(date.getTime())) {
          return iso;
        }
        return date.toLocaleString("zh-CN", { hour12: false });
      }

      function resetBalances(placeholder = "-") {
        Object.values(balanceEls).forEach((item) => {
          item.native.textContent = placeholder;
          item.usdt.textContent = placeholder;
          item.error.textContent = "";
        });
        balanceUpdatedEl.textContent = "灏氭湭鏌ヨ";
      }

      function renderBalances(balances) {
        if (!balances || !balances.chains) {
          resetBalances();
          return;
        }

        ["eth", "bsc", "base"].forEach((key) => {
          const item = balances.chains[key] || {};
          balanceEls[key].native.textContent = item.nativeBalance || "-";
          balanceEls[key].usdt.textContent = item.usdtBalance || "-";

          const errors = [];
          if (typeof item.nativeError === "string" && item.nativeError.length > 0) {
            errors.push("鍘熺敓甯佷綑棰濇殏鏃舵棤娉曡幏鍙?);
          }
          if (typeof item.usdtError === "string" && item.usdtError.length > 0) {
            errors.push("USDT 浣欓鏆傛椂鏃犳硶鑾峰彇");
          }
          balanceEls[key].error.textContent = errors.join("锛?);
        });

        balanceUpdatedEl.textContent = balances.updatedAt
          ? `鏇存柊鏃堕棿: ${formatCreatedAt(balances.updatedAt)}`
          : "鏇存柊鏃堕棿: -";
      }

      function renderWallet(wallet) {
        const exists = Boolean(wallet && wallet.exists);
        walletExists = exists;
        addressEl.textContent = exists ? wallet.address || "-" : "鏈敓鎴?;
        createdEl.textContent = exists ? formatCreatedAt(wallet.createdAt) : "-";
        if (generateBtn) {
          generateBtn.disabled = exists;
          generateBtn.textContent = exists ? "宸茬敓鎴? : "鐢熸垚閽卞寘";
        }
      }

      function setRunning(running) {
        if (generateBtn) {
          if (walletExists) {
            generateBtn.disabled = true;
            generateBtn.textContent = "宸茬敓鎴?;
          } else {
            generateBtn.disabled = running;
            generateBtn.textContent = running ? "鐢熸垚涓?.." : "鐢熸垚閽卞寘";
          }
        }
        if (reloadBtn) {
          reloadBtn.disabled = running;
        }
      }

      async function loadBalances() {
        const data = await api("/api/local/wallet/balances");
        renderBalances(data.balances || null);
      }

      async function loadWallet() {
        metaEl.textContent = "姝ｅ湪璇诲彇閽卞寘鐘舵€?..";
        const data = await api("/api/local/wallet");
        const wallet = data.wallet || {};
        renderWallet(wallet);

        if (wallet.exists) {
          await loadBalances();
          metaEl.textContent = "宸插瓨鍦ㄩ挶鍖咃紝宸茶鍙栦綑棰濅俊鎭€?;
        } else {
          resetBalances("鏈敓鎴?);
          metaEl.textContent = "褰撳墠灏氭湭鐢熸垚閽卞寘锛岀偣鍑烩€滅敓鎴愰挶鍖呪€濆垱寤恒€?;
        }
      }

      async function generateWallet() {
        setRunning(true);
        metaEl.textContent = "姝ｅ湪鐢熸垚閽卞寘骞朵繚瀛橀厤缃?..";

        try {
          const data = await api("/api/local/wallet/generate", {
            method: "POST",
            body: JSON.stringify({}),
          });
          renderWallet(data.wallet || {});

          if (typeof data.privateKey === "string" && data.privateKey.length > 0) {
            privateKeyEl.value = data.privateKey;
            secretWrapEl.classList.remove("hidden");
          }

          await loadBalances();
          metaEl.textContent = "閽卞寘宸茬敓鎴愬苟淇濆瓨锛屼綑棰濆凡鏇存柊銆?;
        } catch (error) {
          const message = error instanceof Error ? error.message : String(error);
          if (message.includes("宸插瓨鍦ㄩ挶鍖?)) {
            await loadWallet();
            metaEl.textContent = "宸插瓨鍦ㄩ挶鍖咃紝鏃犻渶閲嶅鐢熸垚銆?;
          } else {
            metaEl.textContent = readUserErrorMessage(error, "鐢熸垚澶辫触锛岃绋嶅悗閲嶈瘯銆?);
          }
        } finally {
          setRunning(false);
        }
      }

      if (generateBtn) {
        generateBtn.addEventListener("click", () => {
          void generateWallet();
        });
      }

      if (reloadBtn) {
        reloadBtn.addEventListener("click", () => {
          void loadWallet();
        });
      }

      void loadWallet();
    </script>
  </body>
</html>
