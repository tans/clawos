<!doctype html>
<html lang="zh-CN" data-theme="silk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ClawOS 钱包</title>
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.7.2/css/all.min.css" />
  </head>
  <body class="bg-base-100 text-base-content overflow-x-auto">
    <div class="grid min-h-screen min-w-[980px] grid-cols-[240px_1fr]">
      <aside class="flex flex-col gap-4 border-r border-base-200 bg-base-100 px-4 py-4">
        <div class="text-sm text-base-content/60">loading...</div>
      </aside>

      <main class="flex min-h-screen flex-col">
        <header class="flex flex-wrap items-center justify-between gap-3 border-b border-base-200 px-6 py-4">
          <h1 class="text-lg font-semibold">钱包</h1>
        </header>

        <section class="flex-1 p-6">
          <div class="card card-compact border border-base-200 bg-base-100">
            <div class="card-body gap-4">
              <h2 class="card-title text-base">本地钱包</h2>
              <div class="text-sm text-base-content/75">
                默认生成一个 EVM 钱包，私钥会先反转再混淆转码后写入 <code>clawos.json</code>。
              </div>

              <div class="flex flex-wrap gap-2">
                <button class="btn btn-primary btn-sm" type="button" data-action="generate-wallet">生成钱包</button>
                <button class="btn btn-outline btn-sm" type="button" data-action="reload-wallet">刷新</button>
              </div>

              <div class="grid gap-2 text-sm">
                <div class="rounded-lg border border-base-200 bg-base-200/20 px-3 py-2">
                  <div class="text-xs text-base-content/60">钱包地址</div>
                  <div class="font-mono break-all" data-wallet-address>-</div>
                </div>
                <div class="rounded-lg border border-base-200 bg-base-200/20 px-3 py-2">
                  <div class="text-xs text-base-content/60">私钥混淆算法</div>
                  <div class="font-mono" data-wallet-algorithm>-</div>
                </div>
                <div class="rounded-lg border border-base-200 bg-base-200/20 px-3 py-2">
                  <div class="text-xs text-base-content/60">混淆后密钥预览</div>
                  <div class="font-mono break-all" data-wallet-obfuscated>-</div>
                </div>
                <div class="rounded-lg border border-base-200 bg-base-200/20 px-3 py-2">
                  <div class="text-xs text-base-content/60">创建时间</div>
                  <div class="font-mono" data-wallet-created>-</div>
                </div>
              </div>

              <div class="hidden rounded-lg border border-warning/40 bg-warning/10 px-3 py-3" data-wallet-secret-wrap>
                <div class="mb-1 text-xs font-semibold text-warning">本次生成私钥（仅本次返回）</div>
                <textarea class="textarea textarea-bordered h-20 w-full font-mono text-xs" readonly data-wallet-privatekey></textarea>
              </div>

              <div class="text-xs text-base-content/70" data-wallet-meta>正在读取钱包状态...</div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="/sidebar-update.js"></script>

    <script>
      const addressEl = document.querySelector("[data-wallet-address]");
      const algorithmEl = document.querySelector("[data-wallet-algorithm]");
      const obfuscatedEl = document.querySelector("[data-wallet-obfuscated]");
      const createdEl = document.querySelector("[data-wallet-created]");
      const metaEl = document.querySelector("[data-wallet-meta]");
      const secretWrapEl = document.querySelector("[data-wallet-secret-wrap]");
      const privateKeyEl = document.querySelector("[data-wallet-privatekey]");
      const generateBtn = document.querySelector('[data-action="generate-wallet"]');
      const reloadBtn = document.querySelector('[data-action="reload-wallet"]');

      async function api(path, options = {}) {
        const res = await fetch(path, {
          headers: { "content-type": "application/json" },
          ...options,
        });

        const data = await res.json().catch(() => ({}));
        if (!res.ok || !data.ok) {
          throw new Error(data.error || `请求失败: ${res.status}`);
        }
        return data;
      }

      function formatCreatedAt(iso) {
        if (typeof iso !== "string" || iso.trim().length === 0) {
          return "-";
        }
        const date = new Date(iso);
        if (Number.isNaN(date.getTime())) {
          return iso;
        }
        return date.toLocaleString("zh-CN", { hour12: false });
      }

      function renderWallet(wallet) {
        const exists = Boolean(wallet && wallet.exists);
        addressEl.textContent = exists ? wallet.address || "-" : "未生成";
        algorithmEl.textContent = exists ? wallet.algorithm || "-" : "-";
        obfuscatedEl.textContent = exists ? wallet.privateKeyObfuscatedPreview || "-" : "-";
        createdEl.textContent = exists ? formatCreatedAt(wallet.createdAt) : "-";
      }

      function setRunning(running) {
        if (generateBtn) {
          generateBtn.disabled = running;
          generateBtn.textContent = running ? "生成中..." : "生成钱包";
        }
        if (reloadBtn) {
          reloadBtn.disabled = running;
        }
      }

      async function loadWallet() {
        metaEl.textContent = "正在读取钱包状态...";
        const data = await api("/api/local/wallet");
        renderWallet(data.wallet || {});
        metaEl.textContent = data.wallet?.exists
          ? "已读取当前钱包信息。"
          : "当前尚未生成钱包，点击“生成钱包”创建。";
      }

      async function generateWallet() {
        setRunning(true);
        metaEl.textContent = "正在生成钱包并写入 clawos.json...";

        try {
          const data = await api("/api/local/wallet/generate", {
            method: "POST",
            body: JSON.stringify({}),
          });
          renderWallet(data.wallet || {});

          if (typeof data.privateKey === "string" && data.privateKey.length > 0) {
            privateKeyEl.value = data.privateKey;
            secretWrapEl.classList.remove("hidden");
          }

          metaEl.textContent = "钱包已生成并保存。若再次生成会覆盖上一次钱包。";
        } catch (error) {
          const message = error instanceof Error ? error.message : String(error);
          metaEl.textContent = `生成失败: ${message}`;
        } finally {
          setRunning(false);
        }
      }

      if (generateBtn) {
        generateBtn.addEventListener("click", () => {
          void generateWallet();
        });
      }

      if (reloadBtn) {
        reloadBtn.addEventListener("click", () => {
          void loadWallet();
        });
      }

      void loadWallet();
    </script>
  </body>
</html>
