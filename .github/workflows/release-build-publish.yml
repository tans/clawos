name: Release Build And Publish

on:
  workflow_dispatch:
    inputs:
      build_env:
        description: "Build env used for artifact detection"
        required: true
        default: "stable"
        type: choice
        options:
          - stable
          - canary
      release_channel:
        description: "Release channel to publish"
        required: true
        default: "stable"
        type: choice
        options:
          - stable
          - beta
          - alpha

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build executable
        run: bun run build:exe

      - name: Build diagnostics
        shell: bash
        run: |
          set -euo pipefail
          echo "[diag] bun version: $(bun --version)"
          echo "[diag] target file:"
          ls -lh dist/clawos.exe
          echo "[diag] bytes: $(stat -c '%s' dist/clawos.exe)"
          echo "[diag] file type: $(file dist/clawos.exe)"
          echo "[diag] sha256: $(sha256sum dist/clawos.exe | awk '{print $1}')"

      - name: Resolve built version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          built_version="$(node -p "require('./package.json').version")"
          echo "value=$built_version" >> "$GITHUB_OUTPUT"
          echo "built_version=$built_version"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: clawos-${{ steps.version.outputs.value }}-windows-x64
          path: dist/clawos.exe
          if-no-files-found: error

      - name: Publish endpoint diagnostics
        env:
          PUBLISH_BASE_URL: ${{ vars.PUBLISH_BASE_URL }}
        shell: bash
        run: |
          set -euo pipefail
          target="${PUBLISH_BASE_URL:-https://clawos.minapp.xin}"
          echo "[diag] publish target: ${target}"
          echo "[diag] dns lookup:"
          host "$(echo "$target" | sed -E 's#^https?://([^/]+).*#\1#')" || true
          echo "[diag] head request:"
          curl -I --max-time 20 "$target" || true

      - name: Publish installer and config
        env:
          PUBLISH_BASE_URL: ${{ vars.PUBLISH_BASE_URL }}
          UPLOAD_TIMEOUT_MS: "1200000"
          UPLOAD_HEARTBEAT_MS: "15000"
          BUILD_ENV: ${{ github.event.inputs.build_env || 'stable' }}
          RELEASE_CHANNEL: ${{ github.event.inputs.release_channel || 'stable' }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${PUBLISH_BASE_URL:-}" ]]; then
            bun run publish -- --base-url "${PUBLISH_BASE_URL}" --build-env "${BUILD_ENV}" --release-channel "${RELEASE_CHANNEL}" --timeout-ms "${UPLOAD_TIMEOUT_MS}" --heartbeat-ms "${UPLOAD_HEARTBEAT_MS}"
          else
            bun run publish -- --build-env "${BUILD_ENV}" --release-channel "${RELEASE_CHANNEL}" --timeout-ms "${UPLOAD_TIMEOUT_MS}" --heartbeat-ms "${UPLOAD_HEARTBEAT_MS}"
          fi
