name: Release Build And Publish

on:
  workflow_dispatch:

jobs:
  build-and-publish:
    name: Build & Publish (${{ matrix.release_channel }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - release_channel: stable
            build_env: stable
          - release_channel: beta
            build_env: canary
    runs-on: windows-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install app dependencies
        working-directory: app
        run: bun install --frozen-lockfile

      - name: Download Electrobun assets (Windows only)
        working-directory: app
        run: bun run electrobun:download -- --targets=win-x64

      - name: Build desktop artifact
        working-directory: app
        shell: bash
        env:
          BUILD_ENV: ${{ matrix.build_env }}
        run: |
          set -euo pipefail
          bun run webview:build
          bun run electrobun -- build --env "${BUILD_ENV}"

      - name: Resolve release version
        id: release
        env:
          RELEASE_CHANNEL: ${{ matrix.release_channel }}
        shell: bash
        run: |
          set -euo pipefail
          base_version="$(node -p "require('./package.json').version")"
          channel="${RELEASE_CHANNEL}"

          if [[ "${channel}" == "beta" ]]; then
            publish_version="${base_version}-beta.${GITHUB_RUN_NUMBER}"
          else
            publish_version="${base_version}-stable.${GITHUB_RUN_NUMBER}"
          fi

          echo "base=${base_version}" >> "$GITHUB_OUTPUT"
          echo "version=${publish_version}" >> "$GITHUB_OUTPUT"
          echo "publish_version=${publish_version}"

      - name: Build diagnostics
        shell: bash
        run: |
          set -euo pipefail
          echo "[diag] bun version: $(bun --version)"
          for dir in artifacts build dist; do
            if [[ -d "$dir" ]]; then
              echo "[diag] files in $dir:"
              find "$dir" -maxdepth 2 -type f | head -n 30 || true
            fi
          done

      - name: Publish endpoint diagnostics
        shell: bash
        run: |
          set -euo pipefail
          target="https://relay.global.minapp.xin"
          echo "[diag] publish target: ${target}"
          echo "[diag] dns lookup:"
          host "$(echo "$target" | sed -E 's#^https?://([^/]+).*#\1#')" || true
          echo "[diag] head request:"
          curl -I --max-time 20 "$target" || true

      - name: Publish installer and config
        env:
          # 跨境链路抖动时，单分片上传可能较慢；提高超时并缩小分片降低失败率
          # 中转部署可参考 docs/upload-relay-guide.md
          UPLOAD_TIMEOUT_MS: "2700000"
          UPLOAD_HEARTBEAT_MS: "15000"
          UPLOAD_CHUNK_SIZE_MB: "4"
          UPLOAD_CHUNK_THRESHOLD_MB: "8"
          BUILD_ENV: ${{ matrix.build_env }}
          RELEASE_CHANNEL: ${{ matrix.release_channel }}
          CLAWOS_VERSION: ${{ steps.release.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          bun run publish -- --base-url "https://relay.global.minapp.xin" --build-env "${BUILD_ENV}" --release-channel "${RELEASE_CHANNEL}" --version "${CLAWOS_VERSION}" --timeout-ms "${UPLOAD_TIMEOUT_MS}" --heartbeat-ms "${UPLOAD_HEARTBEAT_MS}"
