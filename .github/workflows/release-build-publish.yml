name: Release Build And Publish

on:
  workflow_dispatch:
    inputs:
      build_env:
        description: "Build env used for artifact detection"
        required: true
        default: "canary"
        type: choice
        options:
          - stable
          - canary
      release_channel:
        description: "Release channel to publish"
        required: true
        default: "beta"
        type: choice
        options:
          - beta
          - stable

jobs:
  build-and-publish:
    runs-on: windows-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install app dependencies
        working-directory: app
        run: bun install --frozen-lockfile

      - name: Download Electrobun assets (Windows only)
        working-directory: app
        run: bun run electrobun:download -- --targets=win-x64

      - name: Build desktop artifact
        working-directory: app
        shell: bash
        env:
          BUILD_ENV: ${{ github.event.inputs.build_env || 'stable' }}
        run: |
          set -euo pipefail
          bun run webview:build
          bun run electrobun -- build --env "${BUILD_ENV}"

      - name: Resolve release version
        id: release
        env:
          RELEASE_CHANNEL: ${{ github.event.inputs.release_channel || 'stable' }}
        shell: bash
        run: |
          set -euo pipefail
          base_version="$(node -p "require('./package.json').version")"
          channel="${RELEASE_CHANNEL}"

          if [[ "${channel}" == "beta" ]]; then
            publish_version="${base_version}-beta.${GITHUB_RUN_NUMBER}"
          else
            publish_version="${base_version}-stable.${GITHUB_RUN_NUMBER}"
          fi

          echo "base=${base_version}" >> "$GITHUB_OUTPUT"
          echo "version=${publish_version}" >> "$GITHUB_OUTPUT"
          echo "publish_version=${publish_version}"

      - name: Build diagnostics
        shell: bash
        run: |
          set -euo pipefail
          echo "[diag] bun version: $(bun --version)"
          for dir in artifacts build dist; do
            if [[ -d "$dir" ]]; then
              echo "[diag] files in $dir:"
              find "$dir" -maxdepth 2 -type f | head -n 30 || true
            fi
          done

      - name: Publish endpoint diagnostics
        env:
          PUBLISH_BASE_URL: ${{ vars.PUBLISH_BASE_URL }}
        shell: bash
        run: |
          set -euo pipefail
          target="${PUBLISH_BASE_URL:-https://clawos.minapp.xin}"
          echo "[diag] publish target: ${target}"
          echo "[diag] dns lookup:"
          host "$(echo "$target" | sed -E 's#^https?://([^/]+).*#\1#')" || true
          echo "[diag] head request:"
          curl -I --max-time 20 "$target" || true

      - name: Publish installer and config
        env:
          PUBLISH_BASE_URL: ${{ vars.PUBLISH_BASE_URL }}
          UPLOAD_TIMEOUT_MS: "1200000"
          UPLOAD_HEARTBEAT_MS: "15000"
          BUILD_ENV: ${{ github.event.inputs.build_env || 'stable' }}
          RELEASE_CHANNEL: ${{ github.event.inputs.release_channel || 'stable' }}
          CLAWOS_VERSION: ${{ steps.release.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${PUBLISH_BASE_URL:-}" ]]; then
            bun run publish -- --base-url "${PUBLISH_BASE_URL}" --build-env "${BUILD_ENV}" --release-channel "${RELEASE_CHANNEL}" --version "${CLAWOS_VERSION}" --timeout-ms "${UPLOAD_TIMEOUT_MS}" --heartbeat-ms "${UPLOAD_HEARTBEAT_MS}"
          else
            bun run publish -- --build-env "${BUILD_ENV}" --release-channel "${RELEASE_CHANNEL}" --version "${CLAWOS_VERSION}" --timeout-ms "${UPLOAD_TIMEOUT_MS}" --heartbeat-ms "${UPLOAD_HEARTBEAT_MS}"
          fi
