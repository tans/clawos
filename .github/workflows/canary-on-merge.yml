name: Auto Canary Release On Merge

on:
  push:
    branches:
      - main
    paths:
      - "package.json"
      - "bun.lock"
      - "scripts/**"
      - "desktop/**"
      - "app/**"
      - ".github/workflows/canary-on-merge.yml"
      - ".github/workflows/release-build-publish.yml"

jobs:
  canary-release:
    runs-on: windows-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install app dependencies
        working-directory: app
        run: bun install --frozen-lockfile


      - name: Download Electrobun assets (Windows only)
        working-directory: app
        run: bun run electrobun:download -- --targets=win-x64

      - name: Build desktop artifact (canary)
        working-directory: app
        shell: bash
        run: |
          set -euo pipefail
          bun run webview:build
          bun run electrobun -- build --env=canary

      - name: Resolve canary version
        id: canary
        shell: bash
        run: |
          set -euo pipefail
          base_version="$(node -p "require('./package.json').version")"
          canary_version="${base_version}-canary.${GITHUB_RUN_NUMBER}"
          echo "base=${base_version}" >> "$GITHUB_OUTPUT"
          echo "version=${canary_version}" >> "$GITHUB_OUTPUT"
          echo "canary_version=${canary_version}"

      - name: Publish canary artifacts
        env:
          # 跨境链路抖动时，单分片上传可能较慢；提高超时并缩小分片降低失败率
          # 中转部署可参考 docs/upload-relay-guide.md
          UPLOAD_TIMEOUT_MS: "2700000"
          UPLOAD_HEARTBEAT_MS: "15000"
          UPLOAD_CHUNK_SIZE_MB: "4"
          UPLOAD_CHUNK_THRESHOLD_MB: "8"
          BUILD_ENV: "canary"
          RELEASE_CHANNEL: "canary"
          CLAWOS_VERSION: ${{ steps.canary.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          bun run publish -- --base-url "https://relay.global.minapp.xin" --build-env "${BUILD_ENV}" --release-channel "${RELEASE_CHANNEL}" --version "${CLAWOS_VERSION}" --timeout-ms "${UPLOAD_TIMEOUT_MS}" --heartbeat-ms "${UPLOAD_HEARTBEAT_MS}"
