name: Auto Alpha Release On Merge

on:
  push:
    branches:
      - main

jobs:
  alpha-release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build executable
        run: bun run build:exe

      - name: Resolve alpha version
        id: alpha
        shell: bash
        run: |
          set -euo pipefail
          base_version="$(node -p "require('./package.json').version")"
          alpha_version="${base_version}-alpha.${GITHUB_RUN_NUMBER}"
          echo "base=${base_version}" >> "$GITHUB_OUTPUT"
          echo "version=${alpha_version}" >> "$GITHUB_OUTPUT"
          echo "alpha_version=${alpha_version}"

      - name: Publish alpha artifacts
        env:
          PUBLISH_BASE_URL: ${{ vars.PUBLISH_BASE_URL }}
          UPLOAD_TIMEOUT_MS: "1200000"
          UPLOAD_HEARTBEAT_MS: "15000"
          BUILD_ENV: "canary"
          RELEASE_CHANNEL: "alpha"
          CLAWOS_VERSION: ${{ steps.alpha.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${PUBLISH_BASE_URL:-}" ]]; then
            bun run publish -- --base-url "${PUBLISH_BASE_URL}" --build-env "${BUILD_ENV}" --release-channel "${RELEASE_CHANNEL}" --version "${CLAWOS_VERSION}" --timeout-ms "${UPLOAD_TIMEOUT_MS}" --heartbeat-ms "${UPLOAD_HEARTBEAT_MS}"
          else
            bun run publish -- --build-env "${BUILD_ENV}" --release-channel "${RELEASE_CHANNEL}" --version "${CLAWOS_VERSION}" --timeout-ms "${UPLOAD_TIMEOUT_MS}" --heartbeat-ms "${UPLOAD_HEARTBEAT_MS}"
          fi
