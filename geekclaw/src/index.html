<!doctype html>
<html lang="zh-CN" data-theme="silk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GeekClaw | 极客超算魔方</title>
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="relative mx-auto w-full max-w-[720px] overflow-hidden px-4 py-5">
      <div class="pointer-events-none absolute inset-0 -z-10 overflow-hidden">
        <div class="hero-grid absolute inset-0 opacity-45"></div>
        <div class="neon-orb neon-orb-left"></div>
        <div class="neon-orb neon-orb-right"></div>
        <div class="neon-core"></div>
      </div>

      <header class="page-fade rounded-2xl border border-white/20 bg-black/35 px-4 py-3 backdrop-blur-sm">
        <div class="flex items-center justify-between gap-3">
          <div class="flex items-center gap-3">
            <img src="/logo.png" alt="GeekClaw Logo" class="size-10 rounded-xl object-cover" />
            <div>
              <p class="text-lg font-semibold tracking-tight">GeekClaw</p>
              <p class="text-xs text-white/70">AI 智能体电脑</p>
            </div>
          </div>
          <a href="https://www.geekclaw.ai" target="_blank" rel="noreferrer" class="btn btn-sm border-white/30 bg-white/10 text-white hover:bg-white/20">
            www.geekclaw.ai
          </a>
        </div>
      </header>

      <section class="page-fade page-fade-delay-1 relative mt-5 rounded-3xl border border-[#7f60ff]/35 bg-black/45 p-4 backdrop-blur-sm">
        <div class="relative">
          <div class="product-glow absolute inset-0 -z-10"></div>
          <img src="/screenshot2.jpg" alt="极客超算魔方发布海报" class="w-full rounded-2xl border border-white/20 shadow-2xl shadow-[#6f4bff]/40" loading="eager" decoding="async" />
        </div>
      </section>

      <section class="page-fade page-fade-delay-2 mt-4 space-y-4">
        <img src="/screenshot1.jpg" alt="GeekClaw 产品视觉图" class="w-full rounded-2xl border border-white/15 object-cover" loading="lazy" decoding="async" />
        <div class="rounded-2xl border border-white/15 bg-black/40 p-5">
          <a href="/presale" class="btn mb-4 w-full border-[#c8b8ff]/60 bg-[#6d45ff]/55 text-white hover:bg-[#7b5bff]">立即预售（支付宝）</a>
          <a href="https://www.geekclaw.ai" target="_blank" rel="noreferrer" class="inline-block text-xl font-black text-[#c6b2ff] underline decoration-[#6d45ff]/70 underline-offset-4">www.geekclaw.ai</a>
        </div>
      </section>
    </main>
  </body>
</html>
