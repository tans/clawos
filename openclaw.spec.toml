# openclaw.spec.toml
# OpenClaw ConfigSpec (TOML) — "配置描述语言/标准"
#
# 目标：
# 1) 用 TOML（接近 TOML 的简洁/可读）表达 openclaw.json(JSON5) 的结构
# 2) 同时携带“如何配置/如何使用”的规范化说明（供人类与 AI 消费）
# 3) 支持扩展（channels/skills/plugins 等可以注册自己的 schema + UI hints）
#
# 重要事实（来自官方文档）：
# - 运行时配置文件：~/.openclaw/openclaw.json，格式为 JSON5（支持注释/尾逗号）
# - Gateway 严格按 schema 验证：未知键/类型错误/无效值会导致 Gateway 拒绝启动
# - Gateway 通过 `config.schema` 暴露完整 JSON Schema（含 UI hints），用于控制台表单渲染
#
# 这份 spec 的定位：
# - 它是“配置规范的稳定载体”（给人/AI/代码生成器）
# - “覆盖全部字段”的权威来源应以运行时 `config.schema` 返回的 JSON Schema 为准（因为它会包含已安装插件/渠道的 schema）
# - 本文件列出：全部顶层模块 + 主要子结构 + 对扩展点的规范化表达方式
#
# 你可以把它当作：Config IDL（接口定义语言），然后用生成器导出
# - openclaw.json（JSON5）
# - openclaw.configref.toml（字段参考）
# - JSON Schema / OpenAPI schema（可选）

[spec]
id = "openclaw.configspec"
version = "0.2.0"
runtime_config = "~/.openclaw/openclaw.json"
runtime_format = "json5"
strict_validation = true
unknown_keys = "error"            # unknown keys -> gateway refuses to start
schema_is_dynamic = true          # schema depends on installed channels/plugins/skills

[spec.schema_source]
kind = "gateway_rpc"
rpc = "config.schema"
notes = [
  "运行 `openclaw gateway call config.schema --params '{}'` 可获取完整 JSON Schema（含 UI hints）。",
  "该 schema 是“覆盖全部字段”的权威来源，尤其是插件/渠道扩展字段。",
]

[doc]
title = "OpenClaw 配置描述规范（TOML）"
language = "toml"
audience = ["humans", "llms", "codegen"]
conventions = [
  "用点路径表达嵌套结构：gateway.auth.mode",
  "用 `?` 标记可空（nullable）",
  "用 `@enum/@range/@regex/@sensitive` 表达约束与 UI hints",
]

# -----------------------------
# 语义：类型系统（最小集合）
# -----------------------------
[types]
bool = "boolean"
int = "integer"
float = "number"
string = "string"
duration = "string"     # duration string or false（以字段定义为准）
path = "string"
url = "string"
json = "object"

# -----------------------------
# 语义：扩展点
# -----------------------------
[extension_points]
# 这些部分的 schema 可能由“已安装组件”动态扩展：
channels = { dynamic = true, reason = "各 provider 注册自己的字段 + UI hints" }
tools = { dynamic = true, reason = "工具提供商/组/策略可扩展" }
skills = { dynamic = true, reason = "skills entries 可以由 skill 包注册 schema" }
plugins = { dynamic = true, reason = "extensions 注册 plugin config schema" }

# -----------------------------
# Root（顶层）— 覆盖全部顶层模块（按官方配置参考目录）
# -----------------------------
[root]
type = "object"
additional_properties = false

# 顶层键（全部）
# 注：每个 section 的细节在下方 schema.<section> 中定义；对动态扩展的 section 保留可扩展口径。
[root.fields]
# Channels
channels = { type = "object", doc = "Channels：各通讯渠道与访问策略（DM/group）。" }

# Session / messages
session = { type = "object", doc = "Session：会话行为、分段、上下文等。" }
messages = { type = "object", doc = "Messages：响应前缀、ack reaction、入站去抖等。" }

# Tools（含 profiles/groups/policies/providers）
tools = { type = "object", doc = "Tools：工具策略、分组、providers、执行与安全。" }

# Models / providers
models = { type = "object", doc = "Models：自定义提供商、基础 URL、模型别名、示例。" }

# Skills / Plugins
skills = { type = "object", doc = "Skills：技能加载/安装/entries。" }
plugins = { type = "object", doc = "Plugins：扩展插件加载/allow/deny/entries。" }

# Browser / UI / Gateway
browser = { type = "object", doc = "Browser：浏览器/调试/配置。" }
ui = { type = "object", doc = "UI：控制台/展示信息/主题等。" }
gateway = { type = "object", doc = "Gateway：端口/绑定/鉴权/OpenAI兼容 endpoints/隔离/钩子等。" }

# Hooks / Gmail / Canvas host
hooks = { type = "object", doc = "Hooks：webhook/事件回调。" }
gmail = { type = "object", doc = "Gmail integration：集成配置。" }
canvasHost = { type = "object", doc = "Canvas host：LAN/tailnet 文件服务与热重载。" }

# Discovery (mDNS / wide-area)
discovery = { type = "object", doc = "Discovery：Bonjour/mDNS 与广域 DNS-SD。" }

# Environment / Auth storage / Logging / Wizard / Identity / Cron
environment = { type = "object", doc = "Environment：内联 env、shellEnv、变量替换等。" }
auth = { type = "object", doc = "Auth storage：认证存储与 profiles。" }
logging = { type = "object", doc = "Logging：日志配置。" }
wizard = { type = "object", doc = "Wizard：引导配置/安装助手输出。" }
identity = { type = "object", doc = "Identity：智能体身份（name/theme/emoji/avatar）。" }
cron = { type = "object", doc = "Cron：网关调度器。" }

# Config includes
include = { type = "object", doc = "Config includes：$include 拆分与合并语义（JSON5 层）。" }

# -----------------------------
# schema: Channels（公共约束 + providers 扩展）
# -----------------------------
[schema.channels]
type = "object"
doc = "每个 provider 的 config section 存在时自动启动（除非 enabled=false）。"

[schema.channels.fields]
defaults = { type = "object?", doc = "channels.defaults：默认策略。" }
modelByChannel = { type = "object?", doc = "channels.modelByChannel：按 channel id 固定模型。" }

# 通用策略（所有 channels 支持）
[schema.channels.shared]
dmPolicy = { type = "enum(pairing,allowlist,open,disabled)", default = "pairing" }
groupPolicy = { type = "enum(allowlist,open,disabled)", default = "allowlist" }
allowFrom = { type = "list<string>?", doc = "allowlist/open 时使用；open 需包含 \"*\"。" }

# providers（动态扩展；这里只列出已在参考文档中出现的 provider 名称占位）
[schema.channels.providers]
whatsapp = { dynamic = true }
telegram = { dynamic = true }
discord = { dynamic = true }
slack = { dynamic = true }
sms = { dynamic = true }
web = { dynamic = true }

# -----------------------------
# schema: Session
# -----------------------------
[schema.session]
type = "object"
doc = "会话行为：如何按 sender 分 session、历史/裁剪、模型 override 等（以 schema 为准）。"
dynamic = true

# -----------------------------
# schema: Messages
# -----------------------------
[schema.messages]
type = "object"
doc = "消息与响应：前缀、ack reaction、入站去抖、TTS、Talk 等。"
dynamic = true

# -----------------------------
# schema: Tools
# -----------------------------
[schema.tools]
type = "object"
doc = "工具系统：profiles/groups/allow/deny/byProvider/elevated/exec/loopDetection/web/media/agentToAgent/sessions/subagents。"
dynamic = true

# -----------------------------
# schema: Models
# -----------------------------
[schema.models]
type = "object"
doc = "模型与提供商：自定义 baseUrl/provider aliases、OpenAI-compatible providers 等。"
dynamic = true

# -----------------------------
# schema: Skills
# -----------------------------
[schema.skills]
type = "object"
doc = "技能：allowBundled、load.extraDirs、install、entries。"
dynamic = true

# -----------------------------
# schema: Plugins
# -----------------------------
[schema.plugins]
type = "object"
doc = "插件扩展：load.paths/allow/deny/entries；插件可注册自己的 config schema。"
dynamic = true

# -----------------------------
# schema: Browser / UI / Gateway / Discovery / Environment / Auth / Logging / Wizard / Identity / Cron
# （这些在 schema 里有具体字段；这里作为“全部覆盖”的模块级定义）
# -----------------------------
[schema.browser]
type = "object"
dynamic = true

[schema.ui]
type = "object"
dynamic = true

[schema.gateway]
type = "object"
dynamic = true

[schema.discovery]
type = "object"
dynamic = true

[schema.environment]
type = "object"
dynamic = true

[schema.auth]
type = "object"
dynamic = true

[schema.logging]
type = "object"
dynamic = true

[schema.wizard]
type = "object"
dynamic = true

[schema.identity]
type = "object"
dynamic = true

[schema.cron]
type = "object"
dynamic = true

# -----------------------------
# includes: $include（配置拆分语义）
# -----------------------------
[schema.include]
key = "$include"
type = "oneof(string,list<string>)"
doc = "对象可用 $include 引入文件：单文件=替换；数组=按顺序深度合并（后者覆盖前者）；同级键在 include 后再合并覆盖；最多 10 层；路径需在主配置目录边界内解析。"
