<!doctype html>
<html lang="zh-CN" data-theme="silk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ClawOS &#27983;&#35272;&#22120;</title>
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="/pages-shell.css" />
  </head>
  <body class="clawos-page-shell">
    <div class="clawos-page-layout">
      <aside class="clawos-page-sidebar flex flex-col">
        <div class="text-sm text-base-content/60">&#21152;&#36733;&#20013;...</div>
      </aside>

      <main class="clawos-page-main flex min-h-screen flex-col">
        <section class="clawos-page-content flex-1">
        <section class="card card-compact clawos-panel">
            <div class="card-body gap-4">
              <div class="flex flex-wrap items-center justify-between gap-3">
                <h2 class="card-title text-base">&#26816;&#27979;&#19982;&#20462;&#22797;</h2>
                <div class="flex flex-wrap gap-2">
                <button class="btn btn-outline btn-sm" data-browser-action="detect">&#26816;&#27979;</button>
                <button class="btn btn-outline btn-sm" data-browser-action="repair">&#20462;&#22797;</button>
                <button class="btn btn-primary btn-sm" data-browser-action="open-cdp">&#25171;&#24320; CDP</button>
              </div>
              </div>

              <div
                class="text-xs text-base-content/70 rounded-md border border-base-200 bg-base-200/20 px-3 py-2"
                data-browser-op-status
              >
                &#31561;&#24453;&#25191;&#34892;...
              </div>

              <div class="text-xs text-base-content/70" data-browser-task-meta>&#24403;&#21069;&#26080;&#20219;&#21153;</div>
              <progress class="progress progress-neutral hidden w-full" value="0" max="100" data-browser-task-progress></progress>
              <pre
                class="max-h-80 overflow-auto rounded-lg border border-base-200 bg-base-200/30 p-3 text-[11px] leading-5"
                data-browser-task-output
              >&#25805;&#20316;&#35760;&#24405;&#20250;&#26174;&#31034;&#22312;&#36825;&#37324;...</pre>
            </div>
          </section>

          <section class="card card-compact clawos-panel mt-4">
            <div class="card-body gap-4">
              <div class="flex flex-wrap items-center justify-between gap-3">
                <h2 class="card-title text-base">&#26700;&#38754;&#25511;&#21046;</h2>
                <div class="flex flex-wrap gap-2">
                  <button class="btn btn-primary btn-sm" type="button" data-desktop-mcp-start>&#25171;&#24320; MCP</button>
                </div>
              </div>

              <div
                class="text-xs text-base-content/70 rounded-md border border-base-200 bg-base-200/20 px-3 py-2"
                data-desktop-mcp-status
              >
                &#26410;&#21551;&#21160; MCP...
              </div>

              <div class="text-xs text-base-content/70" data-desktop-mcp-meta>&#31561;&#24453;&#21551;&#21160;</div>
              <pre
                class="max-h-80 overflow-auto rounded-lg border border-base-200 bg-base-200/30 p-3 text-[11px] leading-5"
                data-desktop-mcp-output
              >MCP &#35843;&#29992;&#35760;&#24405;&#20250;&#26174;&#31034;&#22312;&#36825;&#37324;...</pre>
            </div>
          </section>
        </section>
      </main>
    </div>

    <script src="/sidebar-update.js"></script>

    <script>
      const browserOpStatusEl = document.querySelector("[data-browser-op-status]");
      const browserTaskMetaEl = document.querySelector("[data-browser-task-meta]");
      const browserTaskProgressEl = document.querySelector("[data-browser-task-progress]");
      const browserTaskOutputEl = document.querySelector("[data-browser-task-output]");
      const desktopMcpStatusEl = document.querySelector("[data-desktop-mcp-status]");
      const desktopMcpMetaEl = document.querySelector("[data-desktop-mcp-meta]");
      const desktopMcpOutputEl = document.querySelector("[data-desktop-mcp-output]");
      const desktopMcpStartBtn = document.querySelector("[data-desktop-mcp-start]");
      let taskPollTimer = null;
      let desktopMcpPollTimer = null;

      async function api(path, options = {}) {
        const res = await fetch(path, {
          headers: { "content-type": "application/json" },
          ...options,
        });

        const data = await res.json().catch(() => ({}));
        if (!res.ok || !data.ok) {
          const apiError = new Error(data.error || `\u8bf7\u6c42\u5931\u8d25: ${res.status}`);
          apiError.isApiError = true;
          throw apiError;
        }
        return data;
      }

      function readUserErrorMessage(error, fallback) {
        if (error && typeof error === "object" && error.isApiError === true) {
          return fallback;
        }
        const message = error instanceof Error ? String(error.message || "").trim() : "";
        return message || fallback;
      }

      function stopTaskPolling() {
        if (taskPollTimer) {
          clearInterval(taskPollTimer);
          taskPollTimer = null;
        }
      }

      function stopDesktopMcpPolling() {
        if (desktopMcpPollTimer) {
          clearInterval(desktopMcpPollTimer);
          desktopMcpPollTimer = null;
        }
      }

      function renderDesktopMcpStatus(status, task) {
        if (
          !(desktopMcpStatusEl instanceof HTMLElement) ||
          !(desktopMcpMetaEl instanceof HTMLElement) ||
          !(desktopMcpOutputEl instanceof HTMLElement)
        ) {
          return;
        }

        const running = status?.running === true;
        const host = typeof status?.host === "string" ? status.host : "0.0.0.0";
        const port = Number.isFinite(status?.port) ? status.port : 8100;
        const url = typeof status?.url === "string" && status.url.trim() ? status.url : `http://${host}:${port}/mcp`;

        desktopMcpStatusEl.textContent = running
          ? `MCP 已启动，监听 ${host}:${port}`
          : `MCP 未启动，默认监听 ${host}:${port}`;

        if (task && typeof task === "object") {
          const logs = Array.isArray(task.logs) ? task.logs : [];
          const statusText =
            task.status === "running"
              ? "运行中"
              : task.status === "success"
                ? "已完成"
                : task.status === "failed"
                  ? "失败"
                  : "等待中";
          desktopMcpMetaEl.textContent = `接口: ${url} | 任务状态: ${statusText}`;
          desktopMcpOutputEl.textContent =
            logs.map((item) => `[${item.timestamp}] ${String(item.level || "info").toUpperCase()} ${item.message}`).join("\n") ||
            "暂无调用记录";
        } else {
          desktopMcpMetaEl.textContent = `接口: ${url}`;
          desktopMcpOutputEl.textContent = running ? "等待 MCP 调用..." : "MCP 调用记录会显示在这里...";
        }

        desktopMcpOutputEl.scrollTop = desktopMcpOutputEl.scrollHeight;
      }

      async function pollDesktopMcpTask(taskId, status) {
        if (!taskId) {
          renderDesktopMcpStatus(status, null);
          return;
        }

        stopDesktopMcpPolling();

        const tick = async () => {
          try {
            const data = await api(`/api/tasks/${taskId}`);
            renderDesktopMcpStatus(status, data.task || null);
          } catch (error) {
            stopDesktopMcpPolling();
            if (desktopMcpMetaEl instanceof HTMLElement) {
              desktopMcpMetaEl.textContent = readUserErrorMessage(error, "MCP 日志刷新失败，请稍后重试。");
            }
          }
        };

        await tick();
        desktopMcpPollTimer = setInterval(tick, 1000);
      }

      async function loadDesktopMcpStatus() {
        const data = await api("/api/desktop-control/mcp/status");
        const status = data.status || {};
        renderDesktopMcpStatus(status, null);
        if (status.taskId) {
          await pollDesktopMcpTask(status.taskId, status);
        } else {
          stopDesktopMcpPolling();
        }
      }

      async function startDesktopMcp() {
        if (!(desktopMcpStatusEl instanceof HTMLElement)) {
          return;
        }

        desktopMcpStatusEl.textContent = "正在启动 MCP...";
        if (desktopMcpMetaEl instanceof HTMLElement) {
          desktopMcpMetaEl.textContent = "正在提交启动请求...";
        }

        const data = await api("/api/desktop-control/mcp/start", {
          method: "POST",
          body: JSON.stringify({}),
        });
        const status = data.status || {};
        renderDesktopMcpStatus(status, data.task || null);
        if (data.taskId) {
          await pollDesktopMcpTask(data.taskId, status);
        }
      }

      function renderTask(task) {
        const logs = Array.isArray(task?.logs) ? task.logs : [];
        const step = Number.isFinite(task?.step) ? task.step : 0;
        const totalSteps = Number.isFinite(task?.totalSteps) ? task.totalSteps : 0;
        const percent = totalSteps > 0 ? Math.round((step / totalSteps) * 100) : 0;
        const status = typeof task?.status === "string" ? task.status : "unknown";
        const title = typeof task?.title === "string" ? task.title : "\u672a\u77e5\u4efb\u52a1";
        const running = status === "running" || status === "pending";
        const statusText =
          status === "running" || status === "pending"
            ? "\u6267\u884c\u4e2d"
            : status === "success"
              ? "\u5df2\u5b8c\u6210"
              : status === "failed"
                ? "\u5931\u8d25"
                : "\u672a\u77e5";

        browserTaskProgressEl.value = percent;
        browserTaskProgressEl.classList.toggle("hidden", !running);
        browserTaskMetaEl.textContent = `${title}\uff0c${statusText}`;

        const lines = logs.map((item) => `[${item.timestamp}] ${String(item.level || "info").toUpperCase()} ${item.message}`);
        browserTaskOutputEl.textContent = lines.join("\n") || "\u6682\u65e0\u65e5\u5fd7";
        browserTaskOutputEl.scrollTop = browserTaskOutputEl.scrollHeight;
      }

      async function pollTask(taskId) {
        stopTaskPolling();

        const tick = async () => {
          try {
            const data = await api(`/api/tasks/${taskId}`);
            const task = data.task || {};
            renderTask(task);

            if (task.status === "success" || task.status === "failed") {
              stopTaskPolling();
              if (task.status === "success") {
                browserOpStatusEl.textContent = "\u64cd\u4f5c\u5b8c\u6210\u3002";
              } else {
                browserOpStatusEl.textContent = "\u64cd\u4f5c\u672a\u5b8c\u6210\uff0c\u8bf7\u7a0d\u540e\u91cd\u8bd5\u3002";
              }
            }
          } catch (error) {
            stopTaskPolling();
            browserTaskProgressEl.classList.add("hidden");
            browserTaskMetaEl.textContent = readUserErrorMessage(error, "\u72b6\u6001\u5237\u65b0\u5931\u8d25\uff0c\u8bf7\u7a0d\u540e\u91cd\u8bd5\u3002");
            browserOpStatusEl.textContent = readUserErrorMessage(error, "\u64cd\u4f5c\u5931\u8d25\uff0c\u8bf7\u7a0d\u540e\u91cd\u8bd5\u3002");
          }
        };

        await tick();
        taskPollTimer = setInterval(tick, 1000);
      }

      async function runBrowserAction(action) {
        const label =
          action === "detect"
            ? "\u68c0\u6d4b"
            : action === "repair"
              ? "\u4fee\u590d"
              : action === "open-cdp"
                ? "\u6253\u5f00 CDP"
                : action;
        browserOpStatusEl.textContent = `\u6b63\u5728\u6267\u884c\uff1a${label}`;
        browserTaskOutputEl.textContent = "\u4efb\u52a1\u542f\u52a8\u4e2d...";
        browserTaskMetaEl.textContent = "\u4efb\u52a1\u542f\u52a8\u4e2d...";
        browserTaskProgressEl.classList.remove("hidden");
        browserTaskProgressEl.value = 0;

        const endpoint = "/api/browser/action";
        const body = action === "detect" ? { action } : { action, confirmed: true };
        const data = await api(endpoint, {
          method: "POST",
          body: JSON.stringify(body),
        });

        if (!data.taskId) {
          throw new Error("\u670d\u52a1\u7aef\u672a\u8fd4\u56de\u4efb\u52a1 ID");
        }

        if (data.reused) {
          browserOpStatusEl.textContent = `\u68c0\u6d4b\u5230\u540c\u7c7b\u4efb\u52a1\u6b63\u5728\u6267\u884c\uff0c\u5df2\u5207\u6362\u65e5\u5fd7\uff1a${label}`;
        }

        await pollTask(data.taskId);
      }

      function confirmBrowserAction(action) {
        if (
          action !== "detect" &&
          action !== "repair" &&
          action !== "open-cdp" &&
          action !== "restart" &&
          action !== "restart-browser" &&
          action !== "restart-cdp" &&
          action !== "reset" &&
          action !== "reset-config"
        ) {
          return true;
        }

        return window.confirm(
          action === "repair"
            ? "\u4fee\u590d\u4f1a\u914d\u7f6e 9222 \u7aef\u53e3\u8f6c\u53d1\u3001\u9632\u706b\u5899\u653e\u884c\uff0c\u5e76\u66f4\u65b0 openclaw \u6d4f\u89c8\u5668\u914d\u7f6e\uff0c\u662f\u5426\u7ee7\u7eed\uff1f"
            : "\u6253\u5f00 CDP \u4f1a\u91cd\u542f Chrome\uff0c\u662f\u5426\u7ee7\u7eed\uff1f"
        );
      }

      document.querySelectorAll("[data-browser-action]").forEach((button) => {
        button.addEventListener("click", async () => {
          const action = button.getAttribute("data-browser-action");
          if (!action) {
            return;
          }

          if (!confirmBrowserAction(action)) {
            browserTaskProgressEl.classList.add("hidden");
            browserTaskMetaEl.textContent = "\u5df2\u53d6\u6d88\u672c\u6b21\u64cd\u4f5c\u3002";
            browserOpStatusEl.textContent = "\u5df2\u53d6\u6d88\u672c\u6b21\u64cd\u4f5c\u3002";
            return;
          }

          button.disabled = true;
          try {
            await runBrowserAction(action);
          } catch (error) {
            browserTaskProgressEl.classList.add("hidden");
            browserTaskMetaEl.textContent = readUserErrorMessage(error, "\u64cd\u4f5c\u5931\u8d25\uff0c\u8bf7\u7a0d\u540e\u91cd\u8bd5\u3002");
            browserOpStatusEl.textContent = readUserErrorMessage(error, "\u64cd\u4f5c\u5931\u8d25\uff0c\u8bf7\u7a0d\u540e\u91cd\u8bd5\u3002");
          } finally {
            button.disabled = false;
          }
        });
      });

      if (desktopMcpStartBtn instanceof HTMLButtonElement) {
        desktopMcpStartBtn.addEventListener("click", async () => {
          desktopMcpStartBtn.disabled = true;
          try {
            await startDesktopMcp();
          } catch (error) {
            if (desktopMcpStatusEl instanceof HTMLElement) {
              desktopMcpStatusEl.textContent = readUserErrorMessage(error, "MCP 启动失败，请稍后重试。");
            }
          } finally {
            desktopMcpStartBtn.disabled = false;
          }
        });
      }

      void loadDesktopMcpStatus().catch((error) => {
        if (desktopMcpStatusEl instanceof HTMLElement) {
          desktopMcpStatusEl.textContent = readUserErrorMessage(error, "MCP 状态初始化失败。");
        }
      });
    </script>
  </body>
</html>
