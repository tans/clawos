<!doctype html>
<html lang="zh-CN" data-theme="silk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ClawOS &#35774;&#32622;</title>
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="/pages-shell.css" />
  </head>
  <body class="clawos-page-shell">
    <div class="clawos-page-layout">
      <aside class="clawos-page-sidebar flex flex-col">
        <div class="text-sm text-base-content/60">&#21152;&#36733;&#20013;...</div>
      </aside>

      <main class="clawos-page-main flex min-h-screen flex-col">
        <header class="clawos-page-header flex flex-wrap items-center justify-end gap-2">
          <button class="btn btn-outline btn-xs" type="button" data-action="reload">&#37325;&#26032;&#21152;&#36733;</button>
          <button class="btn btn-primary btn-xs" type="button" data-action="save">&#20445;&#23384;&#35774;&#32622;</button>
        </header>

        <section class="clawos-page-content flex-1 space-y-4">
          <section class="card card-compact clawos-panel">
            <div class="card-body gap-4">
              <h2 class="card-title text-base">&#26381;&#21153;&#21442;&#25968;</h2>
              <div class="grid gap-3">
                <div class="rounded-lg border border-base-200 bg-base-200/10 p-3">
                  <div class="grid gap-3 xl:grid-cols-[220px_minmax(0,1fr)] xl:items-center">
                    <div class="space-y-1">
                      <div class="text-sm font-medium">openclaw Token</div>
                    </div>
                    <input
                      class="input input-bordered input-sm w-full font-mono"
                      type="text"
                      data-field="openclaw-token"
                      placeholder="xiake"
                    />
                  </div>
                </div>

                <div class="rounded-lg border border-base-200 bg-base-200/10 p-3">
                  <div class="grid gap-3 xl:grid-cols-[220px_minmax(0,1fr)] xl:items-center">
                    <div class="space-y-1">
                      <div class="text-sm font-medium">&#25480;&#26435;&#25511;&#21046;&#22320;&#22336;</div>
                    </div>
                    <input
                      class="input input-bordered input-sm w-full font-mono"
                      type="text"
                      data-field="controller-address"
                      placeholder="0x..."
                    />
                  </div>
                </div>

                <div class="rounded-lg border border-base-200 bg-base-200/10 p-3">
                  <div class="grid gap-3 xl:grid-cols-[220px_minmax(0,1fr)] xl:items-start">
                    <div class="space-y-1">
                      <div class="text-sm font-medium">&#24320;&#26426;&#21518;&#33258;&#21160;&#21551;&#21160; ClawOS</div>
                    </div>
                    <div class="space-y-2">
                      <label class="label cursor-pointer justify-start gap-3 p-0">
                        <input id="clawos-autostart" type="checkbox" class="toggle toggle-primary" />
                        <span class="label-text text-sm">&#21551;&#29992;</span>
                      </label>
                      <div class="text-xs text-base-content/60" data-autostart-status>&#27491;&#22312;&#35835;&#21462;&#29366;&#24577;...</div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </section>

          <div class="rounded-lg border border-base-200 bg-base-100 px-4 py-3 text-xs text-base-content/70" data-meta>
            &#27491;&#22312;&#35835;&#21462;&#35774;&#32622;...
          </div>
        </section>
      </main>
    </div>

    <script src="/sidebar-update.js"></script>

    <script>
      const metaEl = document.querySelector("[data-meta]");
      const reloadBtn = document.querySelector('[data-action="reload"]');
      const saveBtn = document.querySelector('[data-action="save"]');
      const openCompanyHomeBtn = document.querySelector('[data-action="open-company-home"]');
      const companyHomeLinkEl = document.querySelector('[data-link="company-home"]');

      const tokenInput = document.querySelector('[data-field="openclaw-token"]');
      const controllerAddressInput = document.querySelector('[data-field="controller-address"]');
      const companyAddressInput = document.querySelector('[data-field="company-address"]');
      
      const autoStartCheckbox = document.querySelector("#clawos-autostart");
      const autoStartStatusEl = document.querySelector("[data-autostart-status]");

      function setMeta(text) {
        if (metaEl) {
          metaEl.textContent = text;
        }
      }

      async function api(path, options = {}) {
        const res = await fetch(path, {
          headers: { "content-type": "application/json" },
          ...options,
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok || !data.ok) {
          const apiError = new Error(data.error || `\u8bf7\u6c42\u5931\u8d25: ${res.status}`);
          apiError.isApiError = true;
          throw apiError;
        }
        return data;
      }

      function readUserErrorMessage(error, fallback) {
        if (error && typeof error === "object" && error.isApiError === true) {
          return fallback;
        }
        const message = error instanceof Error ? String(error.message || "").trim() : "";
        return message || fallback;
      }

      function setSaving(saving) {
        if (saveBtn) {
          saveBtn.disabled = saving;
          saveBtn.textContent = saving ? "\u4fdd\u5b58\u4e2d..." : "\u4fdd\u5b58\u8bbe\u7f6e";
        }
      }


      function buildCompanyHomeUrl() {
        const companyAddress = companyAddressInput ? String(companyAddressInput.value || '').trim() : '';
        if (!companyAddress) {
          return null;
        }
        return companyAddress;
      }

      function updateCompanyLinks() {
        const companyHomeUrl = buildCompanyHomeUrl();
        const display = companyHomeUrl || '\u672a\u914d\u7f6e';

        if (companyHomeLinkEl) {
          companyHomeLinkEl.textContent = display;
          companyHomeLinkEl.href = companyHomeUrl || '#';
        }
      }

      async function loadSettings() {
        const [settingsData, autoStartData] = await Promise.all([
          api("/api/local/settings"),
          api("/api/system/autostart/clawos"),
        ]);

        const settings = settingsData.settings || {};
        if (tokenInput) {
          tokenInput.value = typeof settings.openclawToken === "string" ? settings.openclawToken : "xiake";
        }
        if (controllerAddressInput) {
          controllerAddressInput.value =
            typeof settings.controllerAddress === "string" ? settings.controllerAddress : "";
        }

        if (companyAddressInput) {
          const legacyCompanyBaseUrl = typeof settings.companyBaseUrl === "string" ? settings.companyBaseUrl : "";
          const legacyFarmAddress = typeof settings.farmAddress === "string" ? settings.farmAddress : "";
          const legacyFarmBaseUrl = typeof settings.farmBaseUrl === "string" ? settings.farmBaseUrl : "";
          companyAddressInput.value =
            typeof settings.companyAddress === "string"
              ? settings.companyAddress
              : legacyCompanyBaseUrl || legacyFarmAddress || legacyFarmBaseUrl;
        }
        updateCompanyLinks();

        const state = autoStartData.state || {};
        if (autoStartCheckbox) {
          if (!state.supported) {
            autoStartCheckbox.checked = false;
            autoStartCheckbox.disabled = true;
            if (autoStartStatusEl) {
              autoStartStatusEl.textContent = "\u5f53\u524d\u7cfb\u7edf\u4e0d\u652f\u6301\u6b64\u529f\u80fd\uff08\u4ec5 Windows \u53ef\u7528\uff09\u3002";
            }
          } else {
            autoStartCheckbox.disabled = false;
            autoStartCheckbox.checked = Boolean(state.enabled);
            if (autoStartStatusEl) {
              autoStartStatusEl.textContent = state.enabled
                ? "\u5df2\u542f\u7528\uff1a\u5f00\u673a\u540e\u4f1a\u81ea\u52a8\u542f\u52a8 ClawOS\u3002"
                : "\u672a\u542f\u7528\uff1a\u5f00\u673a\u540e\u4e0d\u4f1a\u81ea\u52a8\u542f\u52a8 ClawOS\u3002";
            }
          }
        }
      }

      async function saveSettings() {
        if (!tokenInput || !controllerAddressInput) {
          return;
        }

        const openclawToken = tokenInput.value.trim();
        if (!openclawToken) {
          throw new Error("openclaw Token \u4e0d\u80fd\u4e3a\u7a7a\u3002");
        }

        const controllerAddress = controllerAddressInput.value.trim();
        if (controllerAddress && !/^0x[a-fA-F0-9]{40}$/.test(controllerAddress)) {
          throw new Error("\u6388\u6743\u63a7\u5236\u5730\u5740\u683c\u5f0f\u4e0d\u5408\u6cd5\uff0c\u5fc5\u987b\u662f 0x \u5f00\u5934\u7684 40 \u4f4d\u5341\u516d\u8fdb\u5236\u5730\u5740\u3002");
        }

        const companyAddress = companyAddressInput ? companyAddressInput.value.trim() : undefined;
        await api("/api/local/settings", {
          method: "PUT",
          body: JSON.stringify({
            openclawToken,
            controllerAddress,
            companyAddress,
          }),
        });
      }

      async function saveAutoStart(enabled) {
        const data = await api("/api/system/autostart/clawos", {
          method: "PUT",
          body: JSON.stringify({ enabled: Boolean(enabled) }),
        });
        const state = data.state || {};
        if (autoStartStatusEl) {
          autoStartStatusEl.textContent = state.enabled
            ? "\u5df2\u542f\u7528\uff1a\u5f00\u673a\u540e\u4f1a\u81ea\u52a8\u542f\u52a8 ClawOS\u3002"
            : "\u672a\u542f\u7528\uff1a\u5f00\u673a\u540e\u4e0d\u4f1a\u81ea\u52a8\u542f\u52a8 ClawOS\u3002";
        }
      }

      if (companyAddressInput) {
        companyAddressInput.addEventListener("input", updateCompanyLinks);
      }

      if (openCompanyHomeBtn) {
        openCompanyHomeBtn.addEventListener("click", () => {
          const companyHomeUrl = buildCompanyHomeUrl();
          if (!companyHomeUrl) {
            setMeta("\u8bf7\u5148\u586b\u5199 Company \u901a\u8baf\u5730\u5740\u3002\u4fdd\u5b58\u540e\u53ef\u76f4\u63a5\u6253\u5f00\u9875\u9762\u3002");
            return;
          }
          window.open(companyHomeUrl, "_blank", "noopener,noreferrer");
        });
      }

      if (reloadBtn) {
        reloadBtn.addEventListener("click", async () => {
          try {
            setMeta("\u6b63\u5728\u8bfb\u53d6\u8bbe\u7f6e...");
            await loadSettings();
            setMeta("\u8bbe\u7f6e\u5df2\u5237\u65b0\u3002");
          } catch (error) {
            setMeta(readUserErrorMessage(error, "\u8bfb\u53d6\u5931\u8d25\uff0c\u8bf7\u68c0\u67e5\u670d\u52a1\u72b6\u6001\u540e\u91cd\u8bd5\u3002"));
          }
        });
      }

      if (saveBtn) {
        saveBtn.addEventListener("click", async () => {
          try {
            setSaving(true);
            setMeta("\u6b63\u5728\u4fdd\u5b58\u8bbe\u7f6e...");
            await saveSettings();
            updateCompanyLinks();
            setMeta("\u8bbe\u7f6e\u5df2\u4fdd\u5b58\u3002openclaw Token\u3001\u6388\u6743\u63a7\u5236\u5730\u5740\u4e0e Company \u901a\u8baf\u5730\u5740\u5df2\u66f4\u65b0\u3002");
          } catch (error) {
            setMeta(readUserErrorMessage(error, "\u4fdd\u5b58\u5931\u8d25\uff0c\u8bf7\u7a0d\u540e\u91cd\u8bd5\u3002"));
          } finally {
            setSaving(false);
          }
        });
      }

      if (autoStartCheckbox) {
        autoStartCheckbox.addEventListener("change", async () => {
          const next = autoStartCheckbox.checked;
          autoStartCheckbox.disabled = true;
          if (autoStartStatusEl) {
            autoStartStatusEl.textContent = "\u6b63\u5728\u4fdd\u5b58\u5f00\u673a\u81ea\u542f\u52a8\u72b6\u6001...";
          }
          try {
            await saveAutoStart(next);
            setMeta("\u5f00\u673a\u81ea\u542f\u52a8\u72b6\u6001\u5df2\u66f4\u65b0\u3002");
          } catch (error) {
            autoStartCheckbox.checked = !next;
            if (autoStartStatusEl) {
              autoStartStatusEl.textContent = readUserErrorMessage(error, "\u4fdd\u5b58\u5931\u8d25\uff0c\u8bf7\u7a0d\u540e\u91cd\u8bd5\u3002");
            }
          } finally {
            autoStartCheckbox.disabled = false;
          }
        });
      }

      (async function init() {
        try {
          await loadSettings();
          setMeta("\u8bbe\u7f6e\u5df2\u52a0\u8f7d\u3002\u53ef\u4ee5\u4fee\u6539\u540e\u70b9\u51fb\u201c\u4fdd\u5b58\u8bbe\u7f6e\u201d\u3002");
        } catch (error) {
          setMeta(readUserErrorMessage(error, "\u521d\u59cb\u5316\u5931\u8d25\uff0c\u8bf7\u5237\u65b0\u9875\u9762\u91cd\u8bd5\u3002"));
        }
      })();
    </script>
  </body>
</html>
